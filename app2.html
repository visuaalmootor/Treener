/* ============================================================
   EESMÄRKIDE TRACKER
============================================================ */
function renderGoalsTracker() {
  const user      = STATE.user ?? {};
  const weightLog = lsGet('weight_log') ?? [];

  const curWeight  = user.weight_kg ?? null;
  const goalWeight = user.goal_weight_kg ?? 78;
  const startWeight = weightLog.length > 0
    ? weightLog.reduce((a, b) => a.date < b.date ? a : b).weight_kg
    : curWeight;

  if (!curWeight || !startWeight) return '';

  const totalChange = goalWeight - startWeight;
  const achieved    = curWeight - startWeight;
  const pct         = totalChange !== 0
    ? Math.min(Math.max(Math.round((achieved / totalChange) * 100), 0), 100)
    : 100;

  const kgLeft = (goalWeight - curWeight).toFixed(1);
  const color  = pct >= 100 ? 'var(--green)' : pct >= 50 ? 'var(--accent)' : 'var(--amber)';

  // Mõõtude eesmärgid (kui andmeid on)
  const hasMeasurements = weightLog.some(e => e.shoulder_cm || e.bicep_cm || e.waist_cm);
  let measureRows = '';
  if (hasMeasurements) {
    const latest  = [...weightLog].sort((a, b) => b.date.localeCompare(a.date))[0];
    const earliest = weightLog[0];

    const measFields = [
      { key: 'shoulder_cm', label: '💪 Õlg', goal: 120, unit: 'cm', dir: 1 },
      { key: 'bicep_cm',    label: '💪 Biitseps', goal: 36, unit: 'cm', dir: 1 },
      { key: 'waist_cm',    label: '📏 Vöö', goal: 80, unit: 'cm', dir: -1 },
    ];

    measureRows = measFields.map(f => {
      const cur   = latest?.[f.key];
      const start = earliest?.[f.key];
      if (!cur) return '';
      const g = f.goal;
      const startVal = start ?? cur;
      const totalChg = (g - startVal) * f.dir;
      const doneChg  = (cur - startVal) * f.dir;
      const p = totalChg !== 0 ? Math.min(Math.max(Math.round((doneChg / totalChg) * 100), 0), 100) : 100;
      const col = p >= 100 ? 'var(--green)' : 'var(--accent)';
      return `
        <div class="goal-row">
          <div class="goal-label-row">
            <span class="goal-label">${f.label}</span>
            <span class="goal-sub">${cur} ${f.unit} / eesmärk ${g} ${f.unit} · ${p}%</span>
          </div>
          <div class="goal-bar-track">
            <div class="goal-bar-fill" style="width:${p}%;background:${col};"></div>
          </div>
          <div class="goal-values"><span>${startVal} ${f.unit}</span><span>${g} ${f.unit}</span></div>
        </div>`;
    }).filter(Boolean).join('');
  }

  return `
    <div class="chart-card">
      <div class="chart-title">🎯 Eesmärgid</div>
      <div class="goal-row">
        <div class="goal-label-row">
          <span class="goal-label">⚖️ Kaal</span>
          <span class="goal-sub">${curWeight} kg → ${goalWeight} kg · veel ${kgLeft > 0 ? '+' : ''}${kgLeft} kg</span>
        </div>
        <div class="goal-bar-track">
          <div class="goal-bar-fill" style="width:${pct}%;background:${color};"></div>
        </div>
        <div class="goal-values"><span>${startWeight} kg</span><span>${goalWeight} kg</span></div>
      </div>
      ${measureRows}
    </div>`;
}

/* ============================================================
   PR (ISIKLIK REKORD) SEKTSIOON
============================================================ */
function renderPRSection() {
  const tlog    = lsGet('training_log') ?? [];
  const exIndex = STATE.exercises?.exercises ?? {};

  if (!tlog.length) return '';

  // Kogu kõikide harjutuste kohta: max raskus + sellega tehtud max kordused
  const prMap = {}; // { exercise_id: { weight_kg, reps, date } }

  tlog.forEach(session => {
    (session.exercises ?? []).forEach(ex => {
      const id = String(ex.exercise_id);
      (ex.sets ?? []).forEach(set => {
        if (!set.weight_kg && !set.reps) return;
        const prev = prMap[id];
        if (!prev || set.weight_kg > (prev.weight_kg ?? 0) ||
           (set.weight_kg === prev.weight_kg && set.reps > (prev.reps ?? 0))) {
          prMap[id] = { weight_kg: set.weight_kg ?? 0, reps: set.reps ?? 0, date: session.date };
        }
      });
    });
  });

  if (!Object.keys(prMap).length) return `
    <div class="chart-card">
      <div class="chart-title">🏆 Isiklikud rekordid</div>
      <div class="chart-empty">Treeningukirjed puuduvad<br><span style="font-size:11px;">Alusta treenimist Tab 3-s</span></div>
    </div>`;

  // Grupeeri kategooria järgi
  const CAT_ORDER = ['Rind', 'Selg', 'Alaselg', 'Õlad', 'Biitseps', 'Triitseps', 'Jalad', 'Core'];
  const grouped = {};
  Object.entries(prMap).forEach(([id, pr]) => {
    const ex  = exIndex[id];
    if (!ex) return;
    const cat = ex.category;
    if (!grouped[cat]) grouped[cat] = [];
    grouped[cat].push({ id, ex, pr });
  });

  const catSections = CAT_ORDER
    .filter(cat => grouped[cat]?.length)
    .map(cat => {
      const rows = grouped[cat].map(({ ex, pr }) => {
        const wLabel = pr.weight_kg > 0 ? `${pr.weight_kg} kg` : '';
        const rLabel = pr.reps > 0 ? `${pr.reps} k` : '';
        const badge  = [wLabel, rLabel].filter(Boolean).join(' × ');
        const dateStr = pr.date ? pr.date.slice(5).replace('-', '.') : '';
        return `
          <div class="pr-row">
            <div class="pr-emoji">${ex.emoji ?? '💪'}</div>
            <div class="pr-name">${ex.name}</div>
            <div class="pr-badge">${badge || '—'}</div>
            <div class="pr-date">${dateStr}</div>
          </div>`;
      }).join('');
      return `
        <div class="pr-cat-header">${cat}</div>
        ${rows}`;
    }).join('');

  return `
    <div class="pr-card">
      <div style="padding:var(--sp-sm) var(--sp-md);border-bottom:0.5px solid var(--border);display:flex;align-items:center;justify-content:space-between;">
        <span style="font-size:14px;font-weight:700;">🏆 Isiklikud rekordid</span>
        <span style="font-size:11px;color:var(--text-3);">max raskus × kordused</span>
      </div>
      ${catSections}
    </div>`;
}

/* ============================================================
   TREENINGU STATISTIKA (nädalane sessioonide arv)
============================================================ */
function renderTrainingStatsChart(weeks) {
  var tlog     = lsGet('training_log') ?? [];
  var now      = new Date();
  var todayStr = _localDateStr(now);

  // BtB sihtmaht per treening: faasi seeriad × harjutuste arv
  var phase     = STATE.btbPhase ?? 1;
  var week      = STATE.btbWeek  ?? 1;
  var phaseData = STATE.btbPhaseData && STATE.btbPhaseData.phases
    ? STATE.btbPhaseData.phases[String(phase)] : null;
  var weekProg  = phaseData && phaseData.week_progression
    ? phaseData.week_progression.find(function(w) { return w.week === week; }) : null;
  var setsPerEx = weekProg ? weekProg.sets : 3;
  var planKey   = STATE.activePlan ?? 'B';
  var trainKey  = STATE.currentTraining ?? 'A';
  var planExs   = (STATE.trainingPlan && STATE.trainingPlan.plans &&
                   STATE.trainingPlan.plans[planKey] &&
                   STATE.trainingPlan.plans[planKey].trainings &&
                   STATE.trainingPlan.plans[planKey].trainings[trainKey])
    ? (STATE.trainingPlan.plans[planKey].trainings[trainKey]['phase_' + phase] ?? []) : [];
  var exCount   = planExs.length || 7;
  var TARGET    = exCount * setsPerEx;

  // Filtreeri sessioonid perioodi järgi
  var raw = tlog.filter(function(s) {
    if (!s.done) return false;
    if (weeks === 0) return (s.date ?? '').slice(0, 10) === todayStr;
    var cutoff = new Date(now);
    cutoff.setDate(cutoff.getDate() - weeks * 7);
    return new Date(s.date) >= cutoff;
  });
  raw.sort(function(a, b) { return new Date(a.date) - new Date(b.date); });

  var sessions = raw.map(function(s) {
    var sets = (s.exercises ?? []).reduce(function(sum, ex) {
      return sum + (ex.sets ? ex.sets.length : 0);
    }, 0);
    return { date: (s.date ?? '').slice(0, 10), sets: sets };
  });

  var totalSess = sessions.length;
  var avgSets   = totalSess > 0
    ? (sessions.reduce(function(s, x) { return s + x.sets; }, 0) / totalSess).toFixed(1)
    : '—';

  if (totalSess === 0) {
    return '<div class="chart-card">' +
      '<div class="chart-title">📅 Treeningustatistika</div>' +
      '<div class="chart-sub">Setti/trenn vs BtB sihtmaht · Roheline joon = täiuslik</div>' +
      '<div style="text-align:center;padding:24px 0;color:var(--text-3);font-size:13px;">Sellel perioodil pole logitud trenne</div>' +
      '</div>';
  }

  // Sujuv värv kõrvalekalde järgi: roheline (keskjoonel) → oranž → punane (kaugel)
  function ptColor(sets) {
    var dev = Math.abs(sets / TARGET - 1.0); // 0 = täiuslik, 1+ = kaugel
    var t   = Math.min(dev / 0.6, 1.0);     // 0–1 vahemik (0.6 kõrvalekalle = täis punane)
    var r, g, b;
    if (t < 0.5) {
      // roheline #22C55E (34,197,94) → oranž #F97316 (249,115,22)
      var s = t * 2;
      r = Math.round(34  + s * (249 - 34));
      g = Math.round(197 + s * (115 - 197));
      b = Math.round(94  + s * (22  - 94));
    } else {
      // oranž #F97316 (249,115,22) → punane #EF4444 (239,68,68)
      var s = (t - 0.5) * 2;
      r = Math.round(249 + s * (239 - 249));
      g = Math.round(115 + s * (68  - 115));
      b = Math.round(22  + s * (68  - 22));
    }
    return 'rgb(' + r + ',' + g + ',' + b + ')';
  }

  // SVG mõõtmed
  var SVG_W = 340, SVG_H = 140;
  var pL = 10, pR = 10, pT = 20, pB = 30;
  var cW = SVG_W - pL - pR;
  var cH = SVG_H - pT - pB;
  var midY = pT + cH / 2;
  var yScale = (cH / 2) / 0.65; // 65% kõrvalekalle = graafiku serv

  function ptY(sets) {
    var dy = (sets / TARGET - 1.0) * yScale;
    return Math.max(pT + 5, Math.min(pT + cH - 5, midY - dy));
  }

  function ptX(i) {
    if (sessions.length === 1) return pL + cW / 2;
    return pL + (i / (sessions.length - 1)) * cW;
  }

  // Punktide koordinaadid
  var pts = sessions.map(function(s, i) {
    return { x: ptX(i), y: ptY(s.sets), c: ptColor(s.sets), sets: s.sets, date: s.date };
  });

  // Joonesegmendid gradientidega: iga segment läheb p1 värvist p2 värvi
  var defs = '<defs>';
  var lines = '';
  for (var i = 0; i < pts.length - 1; i++) {
    var p1 = pts[i], p2 = pts[i + 1];
    var gid = 'tsg' + i;
    defs += '<linearGradient id="' + gid + '" gradientUnits="userSpaceOnUse"' +
            ' x1="' + p1.x.toFixed(1) + '" y1="' + p1.y.toFixed(1) +
            '" x2="' + p2.x.toFixed(1) + '" y2="' + p2.y.toFixed(1) + '">' +
            '<stop offset="0%" stop-color="' + p1.c + '"/>' +
            '<stop offset="100%" stop-color="' + p2.c + '"/>' +
            '</linearGradient>';
    lines += '<line x1="' + p1.x.toFixed(1) + '" y1="' + p1.y.toFixed(1) +
             '" x2="' + p2.x.toFixed(1) + '" y2="' + p2.y.toFixed(1) +
             '" stroke="url(#' + gid + ')" stroke-width="2.5" stroke-linecap="round"/>';
  }
  defs += '</defs>';

  // Punktid + seti arv
  var dotsHtml = '';
  pts.forEach(function(p) {
    var lblY = p.y > midY ? p.y - 8 : p.y + 14;
    dotsHtml += '<circle cx="' + p.x.toFixed(1) + '" cy="' + p.y.toFixed(1) +
                '" r="5" fill="' + p.c + '" stroke="var(--bg-2)" stroke-width="1.5">' +
                '<title>' + p.date.slice(5).replace('-', '/') + ': ' + p.sets + ' setti</title></circle>';
    if (sessions.length <= 12) {
      dotsHtml += '<text x="' + p.x.toFixed(1) + '" y="' + lblY.toFixed(1) +
                  '" text-anchor="middle" font-size="9" fill="' + p.c + '">' + p.sets + '</text>';
    }
  });

  // Kuupäeva sildid X-teljel
  var xLabels = '';
  var lblStep = sessions.length <= 6 ? 1 : Math.ceil(sessions.length / 5);
  pts.forEach(function(p, i) {
    if (i % lblStep === 0 || i === pts.length - 1) {
      xLabels += '<text x="' + p.x.toFixed(1) + '" y="' + (pT + cH + 18) +
                 '" text-anchor="middle" font-size="9" fill="var(--text-3)">' +
                 p.date.slice(5).replace('-', '/') + '</text>';
    }
  });

  // "üle" ja "alla" noodid + "täiuslik" joon
  var annotations =
    '<line x1="' + pL + '" y1="' + midY + '" x2="' + (SVG_W - pR) + '" y2="' + midY +
    '" stroke="#22C55E" stroke-width="1" stroke-dasharray="4,3" opacity="0.45"/>' +
    '<text x="' + (SVG_W - pR) + '" y="' + (midY - 4) +
    '" text-anchor="end" font-size="9" fill="#22C55E" opacity="0.75">täiuslik ' + TARGET + '</text>' +
    '<text x="' + pL + '" y="' + (pT + 10) +
    '" text-anchor="start" font-size="9" fill="#EF4444" opacity="0.5">↑ üle</text>' +
    '<text x="' + pL + '" y="' + (pT + cH - 3) +
    '" text-anchor="start" font-size="9" fill="#EF4444" opacity="0.5">↓ alla</text>';

  var svg = '<svg viewBox="0 0 ' + SVG_W + ' ' + SVG_H +
    '" xmlns="http://www.w3.org/2000/svg" style="width:100%;display:block;">' +
    defs + annotations + lines + dotsHtml + xLabels + '</svg>';

  var statsRow = '<div class="chart-stat-row" style="margin-top:var(--sp-sm);">' +
    '<div class="chart-stat"><div class="chart-stat-val">' + totalSess +
    '</div><div class="chart-stat-label">Trenne kokku</div></div>' +
    '<div class="chart-stat"><div class="chart-stat-val">' + avgSets +
    '</div><div class="chart-stat-label">Kesk setti/trenn</div></div>' +
    '<div class="chart-stat"><div class="chart-stat-val">' + TARGET +
    '</div><div class="chart-stat-label">BtB siht (F' + phase + ' N' + week + ')</div></div>' +
    '</div>';

  return '<div class="chart-card">' +
    '<div class="chart-title">📅 Treeningustatistika</div>' +
    '<div class="chart-sub">Setti treening vs BtB sihtmaht · Roheline = täiuslik · Punane = kaugel ideaalist</div>' +
    svg + statsRow + '</div>';
}

  return `<div class="card" style="border-radius:var(--r-lg);overflow:hidden;">

    ${warning}
  </div>`;

/* v0.9.4.4: valikuline kuupäev → selle päeva nädala võti (esmaspäevapõhine, kohalik aeg) */
function _localDateStr(d) {
  const p = n => String(n).padStart(2, '0');
  return `${d.getFullYear()}-${p(d.getMonth() + 1)}-${p(d.getDate())}`;
}
function getAlkoholWeekKey(dateStr) {
  const d = dateStr ? new Date(dateStr + 'T12:00:00') : new Date();
  const dow = d.getDay() === 0 ? 6 : d.getDay() - 1;
  const mon = new Date(d); mon.setDate(d.getDate() - dow);
  // kohalik kuupäev, mitte UTC — toISOString andis 00:00–03:00 vahel VALE nädalavõtme
  return 'alkohol_week_' + _localDateStr(mon);
}

/* Nädala esmaspäev offset'iga (0 = jooksev, -1 = eelmine) + selle nädala 7 päeva */
function alkoholMonday(offset) {
  const d = new Date();
  const dow = d.getDay() === 0 ? 6 : d.getDay() - 1;
  const mon = new Date(d);
  mon.setDate(d.getDate() - dow + (offset || 0) * 7);
  mon.setHours(12, 0, 0, 0);
  return mon;
}
function alkoholWeekDays(offset) {
  const mon = alkoholMonday(offset);
  return Array.from({ length: 7 }, (_, i) => {
    const x = new Date(mon); x.setDate(mon.getDate() + i);
    return _localDateStr(x);
  });
}
function setAlkoholWeek(off) {
  STATE.alkoholWeekOffset = off;
  STATE.alkoholDay = null; // vali automaatselt uue nädala vaikepäev
  renderTab('mina');
}
function setAlkoholDay(dateStr) {
  STATE.alkoholDay = dateStr;
  renderTab('mina');
}
function removeAlkoholEntry(weekKey, idx) {
  const log = lsGet(weekKey) ?? [];
  if (idx < 0 || idx >= log.length) return;
  const removed = log.splice(idx, 1)[0];
  lsSet(weekKey, log);
  if (removed?.date) { lsSet('kcal_today_' + removed.date, calcEatenKcal(removed.date)); }
  updateDayStats();
  renderTab('mina');
}

function addAlkohol(label) {
  // v0.9.4.4: lisa VALITUD päeva peale (vaikimisi täna) — võimaldab tagantjärele logimist
  const offset = STATE.alkoholWeekOffset ?? 0;
  const weekDays = alkoholWeekDays(offset);
  const today = _localDateStr(new Date());
  const targetDate = (STATE.alkoholDay && weekDays.includes(STATE.alkoholDay))
    ? STATE.alkoholDay
    : (offset === 0 ? today : weekDays[0]);

  const key = getAlkoholWeekKey(targetDate);
  const log = lsGet(key) ?? [];
  const now = new Date();
  const wd = new Date(targetDate + 'T12:00:00').toLocaleDateString('et-EE', { weekday: 'short' });
  const time = wd + ' ' + now.getHours().toString().padStart(2, '0') + ':' + now.getMinutes().toString().padStart(2, '0');
  log.push({ label, time, date: targetDate });
  lsSet(key, log);
  // alkoholi kcal jõuab kohe selle päeva kaloribilanssi (header + Kodu + Toitumine)
  lsSet('kcal_today_' + targetDate, calcEatenKcal(targetDate));
  updateDayStats();
  const kcal = label === 'Vein/kange' ? 200 : 180;
  showToast(targetDate === today
    ? `🍺 ${label} lisatud (+${kcal} kcal)`
    : `🍺 ${label} lisatud ${wd} peale (+${kcal} kcal)`);
  renderTab('mina');
}

function removeLastAlkohol() {
  const key = getAlkoholWeekKey();
  const log = lsGet(key) ?? [];
  if (log.length > 0) { log.pop(); lsSet(key, log); }
  // v0.9.4.2 fix: värskenda päeva kaloribilanss ka eemaldamisel
  const t = _localDateStr(new Date());
  lsSet('kcal_today_' + t, calcEatenKcal(t));
  updateDayStats();
  renderTab('mina');
}

function renderMinaStatGrids() {
  /* Treeningustatistika 2×2 + Söömise/joomise 2×2 (Quiet Data) */
  const tlog = lsGet('training_log') ?? [];
  const workouts = tlog.filter(e => e.done).length;
  let setsTotal = 0, volumeKg = 0;
  tlog.forEach(e => (e.exercises ?? []).forEach(ex => (ex.sets ?? []).forEach(s => {
    setsTotal++;
    volumeKg += (s.weight_kg ?? 0) * (s.reps ?? 0);
  })));
  const volumeT = (volumeKg / 1000).toFixed(1).replace('.', ',');
  const avgSets = workouts ? Math.round(setsTotal / workouts) : 0;

  const kcalTarget = calcKcalTarget();
  let daysLogged = 0, daysOnTarget = 0, waterSum = 0, waterDays = 0;
  for (let i = 0; i < 30; i++) {
    const d = _localDateStr(new Date(Date.now() - i * 86400000));
    const kc = calcEatenKcal(d);
    if (kc > 0) { daysLogged++; if (kc >= kcalTarget * 0.95) daysOnTarget++; }
    const w = (lsGet('water_today_' + d) ?? 0) + (lsGet('coffee_today_' + d) ?? 0) * 200;
    if (w > 0) { waterSum += w; waterDays++; }
  }
  const avgWater = waterDays ? (waterSum / waterDays / 1000).toFixed(1).replace('.', ',') : '—';
  const alkWeek = (lsGet(getAlkoholWeekKey()) ?? []).length;

  const tile = (lbl, val, unit, color) => `
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--r-md);padding:12px 13px;box-shadow:var(--shadow);">
      <div style="font:500 9px/1 var(--font);color:var(--text-3);text-transform:uppercase;letter-spacing:0.4px;">${lbl}</div>
      <div style="font:700 20px/1.2 var(--font-mono);color:${color ?? 'var(--text-1)'};margin-top:5px;">${val}<span style="font-size:10px;color:var(--text-3);font-weight:500;">${unit ? ' ' + unit : ''}</span></div>
    </div>`;
  return `
    <div style="font:600 11px/1 var(--font);letter-spacing:0.6px;color:var(--text-3);text-transform:uppercase;margin:16px 0 8px;padding:0 2px;">Treeningustatistika</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
      ${tile('Trennid kokku', workouts, 'tk')}
      ${tile('Maht kokku', volumeT, 't')}
      ${tile('Seeriaid kokku', setsTotal, 'tk')}
      ${tile('Ø seeriat / trenn', avgSets, 'tk')}
    </div>
    <div style="font:600 11px/1 var(--font);letter-spacing:0.6px;color:var(--text-3);text-transform:uppercase;margin:16px 0 8px;padding:0 2px;">Söömise ja joomise statistika · 30 päeva</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:var(--sp-sm);">
      ${tile('Päevi logitud', daysLogged, '/ 30')}
      ${tile('Ø vesi / päev', avgWater, 'L')}
      ${tile('Alkohol nädalas', alkWeek, 'jooki', alkWeek > 2 ? 'var(--red)' : alkWeek > 0 ? 'var(--amber)' : 'var(--green)')}
      ${tile('Päevi sihis', daysOnTarget, 'tk', 'var(--accent)')}
    </div>`;
}

function _t2min(t) { const [h, m] = String(t).split(':').map(Number); return h * 60 + (m || 0); }
function _min2t(min) {
  min = Math.max(0, Math.min(23 * 60 + 45, Math.round(min)));
  return String(Math.floor(min / 60)).padStart(2, '0') + ':' + String(min % 60).padStart(2, '0');
}

/* Kellaaja muutmisel: nihuta HILISEMAD ajad automaatselt sama vahedega (soovitus — kasutaja saab üle kirjutada) */
function mealTimeChanged(sid) {
  const order = ['S01', 'S02', 'S03', 'S04', 'S05'];
  const i = order.indexOf(sid);
  const inp = document.getElementById('mt-' + sid);
  if (i < 0 || !inp?.value) return;
  inp.style.background = 'var(--surface)';
  let cur = _t2min(inp.value);
  for (let j = i + 1; j < order.length; j++) {
    const gap = _t2min(MEAL_TIME_DEFAULTS[order[j]]) - _t2min(MEAL_TIME_DEFAULTS[order[j - 1]]);
    cur += gap;
    const el = document.getElementById('mt-' + order[j]);
    if (el) { el.value = _min2t(cur); el.style.background = 'var(--accent-bg)'; }
  }
  const hint = document.getElementById('mt-hint');
  if (hint) hint.style.display = i < order.length - 1 ? 'flex' : 'none';
}

/* Arvuta "on track" % viimase 7 päeva andmete põhjal */
function calcOnTrack(weeks) {
  // weeks: 0=täna, 1=7p, 4=28p, 8=56p, 12=84p — sama loogika mis teistel graafikutel
  const days = weeks === 0 ? 1 : (weeks || 1) * 7;
  const today = new Date();
  const daysArr = Array.from({length: days}, (_,i) => {
    const d = new Date(today); d.setDate(d.getDate()-i);
    return _localDateStr(d);
  });

  const nutLog     = lsGet('nutrition_log') || {};
  const trainLog   = lsGet('training_log')  || [];
  const waterTarget = STATE.user?.water_target_ml || 2750;

  // Vesi — keskmine päevas
  // Vesi — keskmista ainult päevade üle kus on andmeid (mitte kõigi perioodipäevade üle)
  let waterDaysCount = 0, waterTotalMl = 0;
  daysArr.forEach(d => {
    const w = lsGet(`water_today_${d}`) || 0;
    const c = (lsGet(`coffee_today_${d}`) || 0) * 200;
    if (w > 0 || c > 0) { waterDaysCount++; waterTotalMl += w + c; }
  });
  const totalWaterAvg = waterDaysCount > 0 ? waterTotalMl / waterDaysCount : 0;
  const vesiPct = waterDaysCount > 0 ? Math.round(Math.min(totalWaterAvg / waterTarget, 1) * 100) : 0;

  // Toitumine — % söödud slottidest kõigist VÕIMALIKEST slottidest (5 × päevade arv)
  const FOOD_SLOTS = ['S01','S02','S03','S04','S05'];
  let eatSlotsDone = 0, eatSlotsTotal = 0, eatDays = 0, eatDaysWithData = 0;
  daysArr.forEach(d => {
    const day = nutLog[d] || {};
    const hasAny = FOOD_SLOTS.some(s => day[s] != null);
    if (hasAny) {
      eatDaysWithData++;
      const eaten = FOOD_SLOTS.filter(s => day[s] === 'eaten').length;
      eatSlotsDone += eaten;
      eatSlotsTotal += FOOD_SLOTS.length; // alati 5, mitte ainult logitud
      if (eaten >= 3) eatDays++;
    }
  });
  const toitPct = eatSlotsTotal > 0 ? Math.round(eatSlotsDone / eatSlotsTotal * 100) : 0;

  // Treening — alati viimase 7 päeva vastu (3×/näd sihtmaht), perioodist sõltumata
  const trainWindow = Array.from({length:7}, (_,i) => {
    const d = new Date(today); d.setDate(d.getDate()-i);
    return _localDateStr(d);
  });
  const trainDone = trainWindow.filter(d => trainLog.some(e => e.date === d && e.done)).length;
  const trennExpected = 3;
  const trennPct = Math.round(Math.min(trainDone / trennExpected, 1) * 100);

  // Kaal — viimane delta vs BtB tsoon (perioodist sõltumatu — võrdleb lähimaid mõõtmisi)
  const weightLog = lsGet('weight_log') || [];
  let kaalPct = 50;
  if (weightLog.length >= 2) {
    const last  = weightLog[weightLog.length-1].weight_kg;
    const prev  = weightLog[weightLog.length-2].weight_kg;
    const delta = last - prev;
    if      (delta >= 0.5 && delta <= 2.3) kaalPct = 100;
    else if (delta > 0 && delta < 0.5)     kaalPct = 60;
    else if (delta > 2.3)                  kaalPct = 40;
    else                                   kaalPct = 20;
  }

  // Kaalutud koondskoor
  const total = Math.round(trennPct*0.35 + toitPct*0.30 + vesiPct*0.20 + kaalPct*0.15);
  return { total, toitPct, trennPct, vesiPct, kaalPct, trainDone, trennExpected, eatDays, eatDaysWithData, eatSlotsDone, eatSlotsTotal };
}

/* On Track kaart */
/* ── KALORITE TULPDIAGRAMM ──────────────────────────────────────── */
function renderKcalChart(weeks) {
  const target  = calcKcalTarget();
  const dayMs   = 86400000;
  const now     = new Date();

  // Kogu päevade nimekiri (daily) või nädala bucketid (4+ nädalat)
  const useWeekly = weeks >= 4;
  const days      = weeks === 0 ? 1 : weeks * 7;

  // Päevad → {date, kcal, pct, label}
  const dailyData = [];
  for (let i = days - 1; i >= 0; i--) {
    const d    = new Date(now.getTime() - i * dayMs);
    const key  = _localDateStr(d);
    const kcal = lsGet('kcal_today_' + key) ?? 0;
    const pct  = target > 0 ? Math.round(kcal / target * 100) : 0;
    dailyData.push({
      date:  key,
      kcal,
      pct,
      label: `${d.getDate()}.${d.getMonth() + 1}`,
      hasData: kcal > 0
    });
  }

  // Nädala koondamine (4/8/12 nädal)
  let bars;
  if (useWeekly) {
    const numWeeks = weeks;
    bars = [];
    for (let w = 0; w < numWeeks; w++) {
      const slice   = dailyData.slice(w * 7, w * 7 + 7);
      const withData = slice.filter(d => d.hasData);
      const avg     = withData.length > 0
        ? Math.round(withData.reduce((s, d) => s + d.kcal, 0) / withData.length)
        : 0;
      const pct     = target > 0 ? Math.round(avg / target * 100) : 0;
      const start   = slice[0];
      const end     = slice[slice.length - 1];
      bars.push({
        kcal:    avg,
        pct,
        hasData: withData.length > 0,
        label:   `${start.label}–${end.label}`,
        days:    withData.length,
        isWeekly: true
      });
    }
  } else {
    bars = dailyData;
  }

  const hasAny = bars.some(b => b.hasData);
  if (!hasAny) {
    return `
      <div class="chart-card">
        <div class="chart-title">🔥 Kalorite ajalugu</div>
        <div class="chart-empty">Kalorite logi puudub<br>
          <span style="font-size:11px;">Märgi söögid Toitumiskava tabis</span></div>
      </div>`;
  }

  // ── SVG ──
  const W = 370, H = 180;
  const PAD = { top: 34, right: 8, bottom: 30, left: 44 };
  const pw  = W - PAD.left - PAD.right;
  const ph  = H - PAD.top  - PAD.bottom;
  const n   = bars.length;
  const gap = n > 7 ? 2 : 4;
  const bw  = Math.max(4, Math.floor((pw - gap * (n - 1)) / n));
  const maxKcal = Math.max(target * 1.1, ...bars.map(b => b.kcal), 100);

  function barColor(pct, hasData) {
    if (!hasData) return 'var(--border)';
    if (pct >= 95) return '#22c55e';
    if (pct >= 70) return '#f59e0b';
    return '#ef4444';
  }
  function y(kcal) {
    return PAD.top + ph - Math.round((kcal / maxKcal) * ph);
  }

  // Y-akse labels
  const ySteps = [0, 0.25, 0.5, 0.75, 1.0].map(f => Math.round(maxKcal * f));
  const yLabels = ySteps.map(v =>
    `<text x="${PAD.left - 4}" y="${y(v) + 4}" text-anchor="end"
      font-size="9" fill="var(--text-3)">${v >= 1000 ? (v/1000).toFixed(1)+'k' : v}</text>
     <line x1="${PAD.left}" y1="${y(v)}" x2="${PAD.left + pw}" y2="${y(v)}"
      stroke="var(--border)" stroke-width="0.5" stroke-dasharray="${v === 0 ? 'none' : '3,3'}"/>`
  ).join('');

  // Sihtmäärjooon
  const ty = y(target);
  const targetLine = `
    <line x1="${PAD.left}" y1="${ty}" x2="${PAD.left + pw}" y2="${ty}"
      stroke="#22c55e" stroke-width="1.5" stroke-dasharray="5,4" opacity="0.7"/>
    <text x="${PAD.left + pw + 2}" y="${ty + 4}" font-size="9" fill="#22c55e">eesmärk</text>`;

  // Tulbad
  const barsSvg = bars.map((b, i) => {
    const x   = PAD.left + i * (bw + gap);
    const bh  = b.hasData ? Math.max(3, Math.round((b.kcal / maxKcal) * ph)) : 0;
    const by  = PAD.top + ph - bh;
    const col = barColor(b.pct, b.hasData);
    const numStr = b.kcal >= 1000
      ? (b.kcal / 1000).toFixed(1) + 'k'
      : b.kcal > 0 ? String(b.kcal) : '';
    // Numbri asetus: peale tulba kui tulp kõrge, muidu peale
    const numY    = bh > 22 ? by + bh - 5 : by - 4;
    const numFill = bh > 22 ? 'white' : 'var(--text-2)';
    const numSize = n > 7 ? 7 : 9;
    // X label
    const lbl    = n <= 7 ? b.label : (i % Math.ceil(n / 4) === 0 ? b.label : '');
    return `
      <rect x="${x}" y="${by}" width="${bw}" height="${bh}" fill="${col}" rx="3" ry="3"
        opacity="${b.hasData ? 1 : 0.3}">
        <title>${b.label}: ${b.kcal} kcal (${b.pct}% eesmärgist)</title>
      </rect>
      ${numStr && bh > 0 ? `<text x="${x + bw/2}" y="${numY}" text-anchor="middle"
        font-size="${numSize}" font-weight="600" fill="${numFill}">${numStr}</text>` : ''}
      ${lbl ? `<text x="${x + bw/2}" y="${PAD.top + ph + 14}" text-anchor="middle"
        font-size="8" fill="var(--text-3)">${lbl}</text>` : ''}`;
  }).join('');

  const svg = `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto;overflow:visible;">
    ${yLabels}
    ${targetLine}
    ${barsSvg}
  </svg>`;

  // ── Tabel (ainult päevavaade ≤ 7 rida) ──
  let table = '';
  if (!useWeekly) {
    const rows = dailyData.filter(d => d.hasData).map(d => {
      const col = d.pct >= 95 ? '#22c55e' : d.pct >= 70 ? '#f59e0b' : '#ef4444';
      const ico = d.pct >= 95 ? '✅' : d.pct >= 70 ? '🟡' : '🔴';
      return `<tr>
        <td style="color:var(--text-2);font-size:12px;padding:4px 6px;">${d.label}</td>
        <td style="font-weight:600;font-size:12px;padding:4px 6px;">${d.kcal}</td>
        <td style="font-size:12px;padding:4px 6px;color:var(--text-3);">/ ${target}</td>
        <td style="font-size:12px;padding:4px 6px;color:${col};font-weight:700;">${d.pct}%</td>
        <td style="font-size:12px;padding:4px 6px;">${ico}</td>
      </tr>`;
    }).join('');
    if (rows) {
      table = `
        <table style="width:100%;border-collapse:collapse;margin-top:8px;">
          <thead><tr style="border-bottom:1px solid var(--border);">
            <th style="font-size:10px;color:var(--text-3);font-weight:600;padding:3px 6px;text-align:left;">Kuupäev</th>
            <th style="font-size:10px;color:var(--text-3);font-weight:600;padding:3px 6px;text-align:left;">Söödud</th>
            <th style="font-size:10px;color:var(--text-3);font-weight:600;padding:3px 6px;"></th>
            <th style="font-size:10px;color:var(--text-3);font-weight:600;padding:3px 6px;text-align:left;">%</th>
            <th style="font-size:10px;color:var(--text-3);font-weight:600;padding:3px 6px;"></th>
          </tr></thead>
          <tbody>${rows}</tbody>
        </table>`;
    }
  } else {
    // Nädala koondtabel
    const rows = bars.filter(b => b.hasData).map((b, i) => {
      const col = b.pct >= 95 ? '#22c55e' : b.pct >= 70 ? '#f59e0b' : '#ef4444';
      const ico = b.pct >= 95 ? '✅' : b.pct >= 70 ? '🟡' : '🔴';
      return `<tr>
        <td style="color:var(--text-2);font-size:11px;padding:3px 6px;">Nädal ${i+1} (${b.label})</td>
        <td style="font-weight:600;font-size:12px;padding:3px 6px;">${b.kcal} kcal</td>
        <td style="font-size:11px;color:var(--text-3);padding:3px 6px;">Ø ${b.days} päeva</td>
        <td style="font-size:12px;padding:3px 6px;color:${col};font-weight:700;">${b.pct}% ${ico}</td>
      </tr>`;
    }).join('');
    if (rows) {
      table = `
        <table style="width:100%;border-collapse:collapse;margin-top:8px;">
          <thead><tr style="border-bottom:1px solid var(--border);">
            <th style="font-size:10px;color:var(--text-3);font-weight:600;padding:3px 6px;text-align:left;">Periood</th>
            <th style="font-size:10px;color:var(--text-3);font-weight:600;padding:3px 6px;text-align:left;">Päeva Ø</th>
            <th style="font-size:10px;color:var(--text-3);font-weight:600;padding:3px 6px;text-align:left;">Andmed</th>
            <th style="font-size:10px;color:var(--text-3);font-weight:600;padding:3px 6px;text-align:left;">%</th>
          </tr></thead>
          <tbody>${rows}</tbody>
        </table>`;
    }
  }

  // Kokkuvõte (keskmine % + päevade arv)
  const withData  = bars.filter(b => b.hasData);
  const avgPct    = withData.length > 0
    ? Math.round(withData.reduce((s, b) => s + b.pct, 0) / withData.length)
    : 0;
  const avgCol    = avgPct >= 95 ? '#22c55e' : avgPct >= 70 ? '#f59e0b' : '#ef4444';
  const summary = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
      <div>
        <div style="font-size:11px;color:var(--text-3);">Perioodi keskmine</div>
        <div style="font-size:22px;font-weight:700;color:${avgCol};">${avgPct}%</div>
      </div>
      <div style="text-align:right;">
        <div style="font-size:11px;color:var(--text-3);">Eesmärk</div>
        <div style="font-size:16px;font-weight:600;">${target} kcal</div>
      </div>
    </div>
    <div style="display:flex;gap:12px;font-size:11px;color:var(--text-3);margin-bottom:8px;">
      <span>🟢 ≥95%</span><span>🟡 70–94%</span><span>🔴 &lt;70%</span>
      <span style="margin-left:auto;">📅 ${withData.length} päeva andmeid</span>
    </div>`;

  return `
    <div class="chart-card">
      <div class="chart-title">🔥 Kalorite ajalugu</div>
      <div class="chart-sub">${useWeekly ? 'Nädala keskväärtused' : 'Päevased kalorid'} · Katkendlik joon = päeva eesmärk (${target} kcal)</div>
      ${summary}
      ${svg}
      ${table}
    </div>`;
}

function renderOnTrackCard(weeks) {
  const s = calcOnTrack(weeks);
  const col = s.total >= 80 ? 'var(--green)' : s.total >= 50 ? 'var(--amber)' : 'var(--red)';
  const emoji = s.total >= 80 ? '🔥' : s.total >= 50 ? '📈' : '💡';
  const msg   = s.total >= 80 ? 'Väga hea nädal!' : s.total >= 50 ? 'Heas tempos' : 'Vajab tähelepanu';

  const bar = (pct, color) => `
    <div style="height:6px;background:var(--border);border-radius:3px;overflow:hidden;">
      <div style="height:100%;width:${pct}%;background:${color};border-radius:3px;transition:width .4s;"></div>
    </div>`;

  const row = (label, pct, detail) => `
    <div style="margin-bottom:10px;">
      <div style="display:flex;justify-content:space-between;margin-bottom:4px;">
        <span style="font-size:12px;color:var(--text-2);">${label}</span>
        <span style="font-size:12px;font-weight:600;color:${pct>=70?'var(--green)':pct>=40?'var(--amber)':'var(--red)'};">${pct}%</span>
      </div>
      ${bar(pct, pct>=70?'var(--green)':pct>=40?'var(--amber)':'var(--red)')}
      <div style="font-size:11px;color:var(--text-3);margin-top:3px;">${detail}</div>
    </div>`;

  return `
    <div class="card" style="overflow:hidden;margin-bottom:var(--sp-sm);">
      <div style="padding:var(--sp-sm) var(--sp-md);border-bottom:0.5px solid var(--border);display:flex;align-items:center;justify-content:space-between;">
        <span style="font-size:14px;font-weight:700;">🎯 Eesmärgiga vastavus</span>
        <span style="font-size:11px;color:var(--text-3);">${weeks===0?"täna":weeks===1?"viimane nädal":"viimased "+weeks+" nädalat"}</span>
      </div>
      <div style="padding:var(--sp-md);text-align:center;border-bottom:0.5px solid var(--border);">
        <div style="font-size:52px;font-weight:800;color:${col};line-height:1;">${s.total}%</div>
        <div style="font-size:13px;color:var(--text-2);margin-top:4px;">${emoji} ${msg}</div>
      </div>
      <div style="padding:var(--sp-md);">
        ${row('💪 Treening', s.trennPct, `${s.trainDone}/${s.trennExpected} treeningut (oodatav)`)}
        ${row('🍽️ Toitumine', s.toitPct, `${s.eatSlotsDone}/${s.eatSlotsTotal} söögikorda söödud`)}
        ${row('💧 Vesi', s.vesiPct, `Keskmine vedelik vs ${Math.round((STATE.user?.water_target_ml||2750)/100)/10} L eesmärk`)}
        ${row('⚖️ Kaal', s.kaalPct, s.kaalPct===50?'Lisa kaaluandmeid Progress tabis':s.kaalPct>=80?'BtB kuldses tsoonis ✅':'Vaatab seire vajalik')}
      </div>
    </div>`;
}

/* Claude analüüsikaart — loeb analysis.json */
function renderRuleBasedAnalysis() {
  const today = new Date();
  const days14 = Array.from({length:14}, (_,i) => {
    const d = new Date(today); d.setDate(d.getDate() - i);
    return _localDateStr(d);
  }).reverse();
  const days7 = days14.slice(7);

  const nutLog    = lsGet('nutrition_log') || {};
  const trainLog  = lsGet('training_log')  || [];
  const weightLog = lsGet('weight_log')    || [];
  const waterTarget = STATE.user?.water_target_ml || 2750;

  // ── TOITUMINE ────────────────────────────────────────────────
  const daysWithData = days14.filter(d => {
    const day = nutLog[d] || {};
    return Object.keys(day).filter(k => !k.startsWith('_')).length > 0;
  });

  const slotEaten = {S01:0,S02:0,S03:0,S04:0,S05:0};
  const slotSeen  = {S01:0,S02:0,S03:0,S04:0,S05:0};
  daysWithData.forEach(d => {
    const day = nutLog[d] || {};
    ['S01','S02','S03','S04','S05'].forEach(s => {
      if (day[s] != null) { slotSeen[s]++; if (day[s] === 'eaten') slotEaten[s]++; }
    });
  });
  let weakSlot = null, weakPct = 101;
  Object.keys(slotEaten).forEach(s => {
    if (slotSeen[s] > 1) {
      const p = slotEaten[s] / slotSeen[s] * 100;
      if (p < weakPct) { weakPct = p; weakSlot = s; }
    }
  });
  const slotLabel = {S01:'hommikusöök',S02:'lõunasöök',S03:'pärastlõunane eine',S04:'õhtusöök',S05:'enne und'};

  // Nädalavahetuse vs tööpäeva toitumismuster
  let wkendE=0,wkendT=0,wkdayE=0,wkdayT=0;
  daysWithData.forEach(d => {
    const dow = new Date(d).getDay();
    const day = nutLog[d] || {};
    const slots = ['S01','S02','S03','S04','S05'].filter(s => day[s] != null);
    const eaten = slots.filter(s => day[s] === 'eaten').length;
    if (dow===0||dow===6) { wkendE+=eaten; wkendT+=slots.length; }
    else                  { wkdayE+=eaten; wkdayT+=slots.length; }
  });

  const goodEatDays = daysWithData.filter(d => {
    const day = nutLog[d] || {};
    return ['S01','S02','S03','S04','S05'].filter(s => day[s]==='eaten').length >= 3;
  }).length;

  // ── TREENING ─────────────────────────────────────────────────
  const trainDone7 = days7.filter(d => trainLog.some(e => e.date===d && e.done)).length;
  const wkendTrainDays = days14.filter(d => {
    const dow = new Date(d).getDay();
    return (dow===0||dow===6) && trainLog.some(e => e.date===d && e.done);
  }).length;
  const wkendDaysTotal = days14.filter(d => { const dow=new Date(d).getDay(); return dow===0||dow===6; }).length;

  // ── VESI ─────────────────────────────────────────────────────
  const waterVals = days7.map(d =>
    (lsGet(`water_today_${d}`) || 0) + (lsGet(`coffee_today_${d}`) || 0) * 200
  );
  const avgWater    = waterVals.reduce((a,b) => a+b, 0) / 7;
  const waterGoodDays = waterVals.filter(w => w >= waterTarget).length;

  // ── KAAL ─────────────────────────────────────────────────────
  let weightTrend = null, weightDelta = null;
  if (weightLog.length >= 2) {
    const last = weightLog[weightLog.length-1].weight_kg;
    const prev = weightLog[weightLog.length-2].weight_kg;
    weightDelta = Math.round((last - prev) * 10) / 10;
    if      (weightDelta >= 0.5 && weightDelta <= 2.3) weightTrend = 'golden';
    else if (weightDelta > 2.3)                        weightTrend = 'fast';
    else if (weightDelta > 0)                          weightTrend = 'slow';
    else                                               weightTrend = 'drop';
  }

  // ── ALKOHOL ──────────────────────────────────────────────────
  const alkWeekLog = lsGet(getAlkoholWeekKey()) ?? [];
  const alkCount   = alkWeekLog.length;
  const alkKcal    = alkWeekLog.reduce((s, e) => s + (e.label === 'Vein/kange' ? 200 : 180), 0);

  // ── ANDMEID POLE ─────────────────────────────────────────────
  const hasData = daysWithData.length > 0 || trainDone7 > 0 || waterVals.some(w => w > 0);
  if (!hasData) return `
    <div class="card" style="overflow:hidden;margin-bottom:var(--sp-sm);">
      <div style="padding:var(--sp-sm) var(--sp-md);border-bottom:0.5px solid var(--border);">
        <span style="font-size:14px;font-weight:700;">📊 Nädalaanalüüs</span>
      </div>
      <div style="padding:var(--sp-lg);text-align:center;">
        <div style="font-size:28px;margin-bottom:8px;">📋</div>
        <div style="font-size:13px;color:var(--text-2);line-height:1.5;">
          Täida toitumist, treeningut ja kaalu —<br>analüüs ilmub automaatselt.
        </div>
      </div>
    </div>`;

  // ── INSIGHTS ─────────────────────────────────────────────────
  const insights = [];

  // Toitumine
  if (daysWithData.length > 0) {
    const eatPct = Math.round(goodEatDays / daysWithData.length * 100);
    if (eatPct >= 80) {
      insights.push({emoji:'🍽️', tekst:`Toitumine tugev — ${goodEatDays}/${daysWithData.length} päeval ≥3 söögikorda söödud.`});
    } else if (weakSlot && weakPct < 65) {
      insights.push({emoji:'🍽️', tekst:`${slotLabel[weakSlot]} jääb kõige rohkem vahele (${Math.round(weakPct)}% söödud). ${goodEatDays}/${daysWithData.length} päeval sai ≥3 korda.`});
    } else {
      insights.push({emoji:'🍽️', tekst:`${goodEatDays}/${daysWithData.length} päeval ≥3 söögikorda söödud (${eatPct}%).`});
    }
    // Nädalavahetuse muster
    if (wkendT > 2 && wkdayT > 2) {
      const wkendR = wkendE/wkendT, wkdayR = wkdayE/wkdayT;
      if (wkdayR - wkendR > 0.2) {
        insights.push({emoji:'📅', tekst:`Nädalavahetustel söömine nõrgem (${Math.round(wkendR*100)}%) vs tööpäevad (${Math.round(wkdayR*100)}%). Nädalavahetus vajab eraldi kava.`});
      }
    }
  }

  // Treening
  if (trainLog.length > 0 || trainDone7 > 0) {
    if (trainDone7 >= 3) {
      insights.push({emoji:'💪', tekst:`Treening täis — ${trainDone7}/3 treeningut nädalas. BtB sihtmaht täidetud.`});
    } else if (trainDone7 === 0) {
      insights.push({emoji:'💪', tekst:`Treeningut pole viimase 7 päeva jooksul logitud.`});
    } else {
      const wkendHint = (wkendTrainDays === 0 && wkendDaysTotal >= 2)
        ? ' Nädalavahetused on veel kasutamata.'
        : '';
      insights.push({emoji:'💪', tekst:`${trainDone7}/3 treeningut tehtud — ${3-trainDone7} puudu.${wkendHint}`});
    }
  }

  // Vesi
  if (waterVals.some(w => w > 0)) {
    const avgL  = Math.round(avgWater / 100) / 10;
    const targL = Math.round(waterTarget / 100) / 10;
    if (waterGoodDays >= 5) {
      insights.push({emoji:'💧', tekst:`Vesi heas korras — ${waterGoodDays}/7 päeval eesmärk täidetud (${avgL} L keskmine).`});
    } else {
      insights.push({emoji:'💧', tekst:`Vedelik keskmiselt ${avgL} L/päev — eesmärk ${targL} L. ${waterGoodDays}/7 päeval täidetud.`});
    }
  }

  // Kaal
  if (weightTrend) {
    if      (weightTrend==='golden') insights.push({emoji:'⚖️', tekst:`Kaal tõuseb BtB kuldses tsoonis (+${weightDelta} kg). Täpselt plaani järgi.`});
    else if (weightTrend==='fast')   insights.push({emoji:'⚖️', tekst:`Kaal tõuseb kiiresti (+${weightDelta} kg/nädal) — jälgi vöömõõtu et rasv ei koguneks.`});
    else if (weightTrend==='slow')   insights.push({emoji:'⚖️', tekst:`Kaal tõuseb aeglaselt (+${weightDelta} kg) — eesmärk 0.5–2.3 kg/nädal. Lisa kalorid.`});
    else                             insights.push({emoji:'⚖️', tekst:`Kaal langes (${weightDelta} kg) — kontrolli kas kõik söögid on täidetud.`});
  } else if (weightLog.length === 0) {
    insights.push({emoji:'⚖️', tekst:`Lisa kaaluandmeid Progress tabis — näen siis kas tõus on BtB kuldses tsoonis.`});
  }

  // Alkohol
  if (alkCount > 2) {
    insights.push({emoji:'🍺', tekst:`${alkCount} jooki sel nädalas (${alkKcal} kcal) — üle soovitatud 2 piiri. Testosteroon ja taastumine kannatavad.`});
  } else if (alkCount > 0) {
    insights.push({emoji:'🍺', tekst:`${alkCount} jook${alkCount === 1 ? '' : 'i'} sel nädalas (${alkKcal} kcal). Piiri sees — jätka mõõdukalt.`});
  }

  // ── SOOVITUSED ───────────────────────────────────────────────
  const soovitused = [];
  if (trainDone7 < 3)
    soovitused.push({emoji:'💪', tekst: trainDone7===0
      ? 'Treeningut pole logitud. Alusta B-plaaniga kodus — 30 min piisab.'
      : `${3-trainDone7} treeningut puudu. Planeeri need juba kalendrisse.`});
  if (weakSlot && weakPct < 65)
    soovitused.push({emoji:'🍽️', tekst:`${slotLabel[weakSlot].charAt(0).toUpperCase()+slotLabel[weakSlot].slice(1)} (${Math.round(weakPct)}% söödud) — valmista ette eelmisel õhtul.`});
  if (avgWater < waterTarget * 0.75)
    soovitused.push({emoji:'💧', tekst:`Vedelik alla 75% eesmärgist. Lisa 500 ml pudel laua peale päeva alguses.`});
  if (weightTrend==='slow')
    soovitused.push({emoji:'⚖️', tekst:'Kaalutõus aeglane. Proovi lisada 300–500 kcal/päev — banaan + peotäis pähkleid.'});
  if (weightTrend==='drop' || !weightTrend && weightLog.length===0)
    soovitused.push({emoji:'⚖️', tekst:'Kaaluandmed puuduvad või kaal langeb. Kaalumine kord nädalas annab vajaliku pildi.'});
  if (alkCount > 2)
    soovitused.push({emoji:'🍺', tekst:`${alkCount} jooki nädalas on liiga palju. Iga jook = ~180–200 kcal + testosterooni langus + halvem uni.`});

  // ── BtB MOTIVATSIOON ─────────────────────────────────────────
  const onT = calcOnTrack(1).total;
  const ph  = STATE.btbPhase || 1;
  const motivPool = onT >= 75
    ? [`Faas ${ph} on just see koht kus hardgainerid teevad murdepunkti. Jätka täpselt nii.`,
       'Kõige raskem osa on konsistentsus — sul on see nüüd. Keha reageerib.',
       'BtB põhimõte: väikesed sammud iga päev löövad üle korraolevad maratonid.']
    : onT >= 40
    ? [`Hardgainerid kasvavad aeglaselt aga kindlalt — iga treening loeb.`,
       `Faas ${ph}: su keha harjub koormuse ja toitumisega. Siin ei ole kiirteed.`,
       'Üks hea nädal ei tee tulemust, aga üks halb ka ei riku. Jätka.']
    : [`Hardgainerid vajavad süsteemi, mitte motivatsiooni. Vali üks asi mida parandad.`,
       'BtB õpetab: konsistentsus > intensiivsus. Isegi 60% on parem kui 0%.',
       `Iga nädal on uus algus. Faas ${ph} ootab — alusta tänasest.`];
  const _mDay = _localDateStr(new Date());
  const _mSeed = (function(){ let h=0; for(let i=0;i<_mDay.length;i++) h=(h*31+_mDay.charCodeAt(i))>>>0; return h; })();
  const motivation = motivPool[_mSeed % motivPool.length];

  // ── RENDER ───────────────────────────────────────────────────
  const row = (emoji, tekst) => `
    <div style="display:flex;gap:10px;padding:9px 0;border-bottom:0.5px solid var(--border);">
      <span style="font-size:15px;flex-shrink:0;">${emoji}</span>
      <span style="font-size:12px;color:var(--text-2);line-height:1.55;">${tekst}</span>
    </div>`;

  const top3 = soovitused.slice(0,3);

  return `
    <div class="card" style="overflow:hidden;margin-bottom:var(--sp-sm);">
      <div style="padding:var(--sp-sm) var(--sp-md);border-bottom:0.5px solid var(--border);display:flex;align-items:center;justify-content:space-between;">
        <span style="font-size:14px;font-weight:700;">📊 Nädalaanalüüs</span>
        <span style="font-size:11px;color:var(--text-3);">viimased 14 päeva</span>
      </div>
      ${insights.length ? `<div style="padding:0 var(--sp-md);">${insights.map(i => row(i.emoji,i.tekst)).join('')}</div>` : ''}
      <div style="margin:var(--sp-sm) var(--sp-md);background:var(--accent-bg);border-radius:var(--r-md);padding:10px var(--sp-md);">
        <div style="font-size:10px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:3px;">💬 BtB</div>
        <div style="font-size:12px;color:var(--text-1);line-height:1.6;font-style:italic;">"${motivation}"</div>
      </div>
      ${top3.length ? `
        <div style="padding:0 var(--sp-md) var(--sp-md);">
          <div style="font-size:10px;font-weight:700;color:var(--text-3);text-transform:uppercase;letter-spacing:0.5px;padding-top:var(--sp-xs);margin-bottom:2px;">Soovitused</div>
          ${top3.map(s => row(s.emoji,s.tekst)).join('')}
        </div>` : ''}
    </div>`;
}

/* BtB 20-nädala roadmap */
function renderBtbRoadmap() {
  const phase  = STATE.btbPhase || 1;
  const week   = STATE.btbWeek  || 1;
  const progWeek = (phase - 1) * 5 + week; // 1–20

  // Kaaluprognoos
  const weightLog = lsGet('weight_log') || [];
  const startW = STATE.user?.weight_kg || 63;
  const goalW  = STATE.user?.goal_weight_kg || 78;
  const currentW = weightLog.length ? weightLog[weightLog.length-1].weight_kg : startW;
  const remaining = goalW - currentW;

  // Alustamiskuupäev — btb_start_date või täna - progWeek nädalat
  let startDate = STATE.btbStartDate ? new Date(STATE.btbStartDate) : null;
  if (!startDate) {
    startDate = new Date();
    startDate.setDate(startDate.getDate() - (progWeek - 1) * 7);
  }
  const goalDateOpt  = new Date(startDate); goalDateOpt.setDate(goalDateOpt.getDate()  + Math.ceil(remaining/2.3)*7);
  const goalDatePess = new Date(startDate); goalDatePess.setDate(goalDatePess.getDate() + Math.ceil(remaining/0.5)*7);

  const fmtDate = d => d.toLocaleDateString('et-EE', {month:'short', year:'numeric'});

  // Faasi info
  const phaseInfo = [
    { n:1, nimi:'Faas 1', kirjeldus:'Nõrk progressioon, 12→10 kordust, 2→4 seeriat, 60s puhkus', color:'var(--green)' },
    { n:2, nimi:'Faas 2', kirjeldus:'Kahekordne progressioon, 10→8 kordust, 2→3 seeriat, 90s puhkus', color:'var(--amber)' },
    { n:3, nimi:'Faas 3', kirjeldus:'Jõufaas, 6→4 kordust, raskemad kaalud', color:'#8B5CF6' },
    { n:4, nimi:'Faas 4', kirjeldus:'Tipp-faas — maksimaalne koormus', color:'var(--red)' },
  ];

  // Joonista 20-nädala ajajoon
  const timelineHTML = phaseInfo.map(p => {
    const weeks = [1,2,3,4,5].map(w => {
      const gw = (p.n-1)*5 + w;
      const isActive = gw === progWeek;
      const isDone   = gw < progWeek;
      const isCS     = p.n >= 3 && STATE.btbPhaseData?.phases?.[String(p.n)]?.coming_soon;
      return `<div style="
        width: calc(20% - 3px);
        height: 28px;
        border-radius: 4px;
        display:flex;align-items:center;justify-content:center;
        font-size:10px;font-weight:${isActive?'800':'500'};
        background: ${isActive ? p.color : isDone ? p.color+'33' : isCS ? 'var(--border)' : 'var(--bg)'};
        border: 1.5px solid ${isActive ? p.color : isDone ? p.color+'66' : 'var(--border)'};
        color: ${isActive ? '#fff' : isDone ? p.color : 'var(--text-3)'};
        ${isActive ? 'box-shadow: 0 2px 8px '+p.color+'66;' : ''}
      ">${isActive ? '📍' : isDone ? '✓' : isCS ? '🔒' : `N${w}`}</div>`;
    }).join('');
    return `
      <div style="margin-bottom:10px;">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;">
          <span style="width:8px;height:8px;border-radius:50%;background:${p.color};flex-shrink:0;display:inline-block;"></span>
          <span style="font-size:12px;font-weight:600;">${p.nimi}</span>
          <span style="font-size:11px;color:var(--text-3);">${p.kirjeldus}</span>
        </div>
        <div style="display:flex;gap:3px;">${weeks}</div>
      </div>`;
  }).join('');

  return `
    <div class="card" style="overflow:hidden;margin-bottom:var(--sp-sm);">
      <div style="padding:var(--sp-sm) var(--sp-md);border-bottom:0.5px solid var(--border);display:flex;align-items:center;justify-content:space-between;">
        <span style="font-size:14px;font-weight:700;">🗺️ BtB teekond</span>
        <span style="font-size:11px;color:var(--text-3);">Programminädal ${progWeek}/20</span>
      </div>
      <div style="padding:var(--sp-md);">
        ${timelineHTML}
        <div style="display:flex;gap:var(--sp-sm);margin-top:var(--sp-md);">
          <div style="flex:1;background:var(--bg);border-radius:var(--r-md);padding:var(--sp-sm);text-align:center;">
            <div style="font-size:11px;color:var(--text-3);margin-bottom:2px;">Praegu</div>
            <div style="font-size:16px;font-weight:700;">${currentW} kg</div>
          </div>
          <div style="flex:1;background:var(--bg);border-radius:var(--r-md);padding:var(--sp-sm);text-align:center;">
            <div style="font-size:11px;color:var(--text-3);margin-bottom:2px;">Eesmärk</div>
            <div style="font-size:16px;font-weight:700;color:var(--green);">${goalW} kg</div>
          </div>
          <div style="flex:1;background:var(--bg);border-radius:var(--r-md);padding:var(--sp-sm);text-align:center;">
            <div style="font-size:11px;color:var(--text-3);margin-bottom:2px;">Puudub</div>
            <div style="font-size:16px;font-weight:700;color:var(--accent);">+${Math.round(remaining*10)/10} kg</div>
          </div>
        </div>
        <div style="margin-top:var(--sp-sm);background:var(--accent-bg);border-radius:var(--r-md);padding:var(--sp-sm) var(--sp-md);">
          <div style="font-size:11px;color:var(--text-2);">
            📅 Kaaluprognoos: <strong>${fmtDate(goalDateOpt)}</strong> (kiire tempo) — <strong>${fmtDate(goalDatePess)}</strong> (aeglane tempo)
          </div>
        </div>
      </div>
    </div>`;
}

/* Kaalukirje salvestamine (v0.9.6.6: toetab ka olemasoleva kirje muutmist) */
function saveWeightEntry() {
  const wEl = document.getElementById('inp-weight');
  const weight = parseFloat(wEl?.value);
  if (!weight || weight < 30 || weight > 300) {
    wEl?.focus();
    return;
  }

  // v0.9.6.6 fix: muutuja EI TOHI olla nimega 'log' — see varjutab globaalse
  // log() funktsiooni, mistõttu allolev log(...) kutse viskab vea ja renderTab
  // jääb käivitamata (vt sama viga v0.9.4.7 juures custom-toidu lisamisel).
  const targetDate = STATE.editingWeightDate || _localDateStr(new Date());
  const weightLog  = lsGet('weight_log') ?? [];

  // Asenda kui sellel kuupäeval juba on kirje
  const idx = weightLog.findIndex(e => e.date === targetDate);
  const entry = {
    date:         targetDate,
    weight_kg:    weight,
    shoulder_cm:  parseFloat(document.getElementById('inp-shoulder')?.value) || null,
    bicep_cm:     parseFloat(document.getElementById('inp-bicep')?.value)    || null,
    waist_cm:     parseFloat(document.getElementById('inp-waist')?.value)    || null,
    updated_at:   Date.now() // v0.9.6.7: vajalik kustutamise-tombstone võrdluseks (vt _mergeByKey)
  };

  if (idx >= 0) weightLog[idx] = entry;
  else weightLog.push(entry);

  weightLog.sort((a, b) => a.date.localeCompare(b.date));
  lsSet('weight_log', weightLog);
  log(`Kaalukirje salvestatud: ${targetDate} → ${weight} kg`, 'dbg-ok');

  // Uuenda kasutaja praegune kaal headeris (ei kirjuta user.json-i)
  if (STATE.user) STATE.user.weight_kg = weight;
  STATE.editingWeightDate = null;

  renderTab('mina');
}

/* v0.9.6.6: täidab vormi olemasoleva kirje andmetega, et seda muuta */

/* Viimane logi kirje selle harjutuse kohta */
function getExerciseLastLog(exerciseId) {
  const log = lsGet('training_log') ?? [];
  for (let i = log.length - 1; i >= 0; i--) {
    const entry = log[i];
    const found = (entry.exercises ?? []).find(e => String(e.exercise_id) === String(exerciseId));
    if (found && found.sets?.length) return { date: entry.date, sets: found.sets };
  }
  return null;
}

/* Eelmine max raskus selle harjutuse kohta */
function getLastWeight(exerciseId) {
  const last = getExerciseLastLog(exerciseId);
  if (!last) return null;
  const weights = last.sets.map(s => s.weight_kg ?? 0).filter(w => w > 0);
  return weights.length ? Math.max(...weights) : null;
}

/* Eelmine max kordused */
function getLastMaxReps(exerciseId) {
  const last = getExerciseLastLog(exerciseId);
  if (!last) return null;
  const reps = last.sets.map(s => s.reps ?? 0).filter(r => r > 0);
  return reps.length ? Math.min(...reps) : null; // min = konservatiivseim mõõt
}

/* Soovita järgmist raskust (double progression) */
function suggestNextWeight(ex, planEx) {
  const lastW = getLastWeight(planEx.id);
  const lastReps = getLastMaxReps(planEx.id);
  if (!lastW) return null;
  if (lastReps === null) return null;
  if (lastReps >= planEx.reps_max) {
    // Kõik kordused täis — tõsta raskust
    const increment = ex.warning === 'overhead' ? 2.5 : (ex.is_bodyweight ? 0 : 2.5);
    return lastW + increment;
  }
  return null;
}

   Loeb/kirjutab SAMA ttm_training_log struktuuri mis saveExerciseLog.

/* Aktiivse plaani/treeningu harjutused circuit-järjekorras (flat) */
function _trennExList() {
  const plan = STATE.trainingPlan?.plans?.[STATE.activePlan ?? 'B'];
  const training = plan?.trainings?.[STATE.currentTraining ?? 'A'];
  if (!training) return [];
  const exercises = training[`phase_${STATE.btbPhase}`] ?? training.exercises ?? [];
  const groups = {}, order = [];
  exercises.forEach(pe => {
    const g = pe.circuit ?? 'X';
    if (!groups[g]) { groups[g] = []; order.push(g); }
    groups[g].push(pe);
  });
  const out = [];
  order.forEach(g => groups[g].forEach((pe, i) =>
    out.push({ planEx: pe, label: `${g}${groups[g].length > 1 ? i + 1 : ''}` })));
  return out;
}

function openExerciseDetail(idx) {
  STATE.exDetailIdx = idx;
  stopRestTimer();
  renderTab('trenn');
  document.getElementById('content')?.scrollTo(0, 0);

function closeExerciseDetail() {
  STATE.exDetailIdx = null;
  stopRestTimer();

function exDetailNav(d) {

/* Seeria salvestamine detailvaatest — sama struktuur mis saveExerciseLog */
function exSaveSet(exerciseId, setNo) {
  const kgInp = document.getElementById(`det-kg-${setNo}`);
  const rpInp = document.getElementById(`det-reps-${setNo}`);
  const reps = parseInt(rpInp?.value) || 0;
  const weight = parseFloat(String(kgInp?.value ?? '').replace(',', '.')) || 0;
  if (!reps) { rpInp?.focus(); return; }

  const today = _localDateStr(new Date());
  let tlog = lsGet('training_log') ?? [];
  let todayEntry = tlog.find(e => e.date === today && e.plan === STATE.activePlan && e.treening === STATE.currentTraining);
  if (!todayEntry) {
    todayEntry = { date: today, plan: STATE.activePlan, treening: STATE.currentTraining, done: false, exercises: [] };
    tlog.push(todayEntry);
  }
  let exEntry = todayEntry.exercises.find(e => String(e.exercise_id) === String(exerciseId));
  if (!exEntry) {
    exEntry = { exercise_id: Number(exerciseId), sets: [] };
    todayEntry.exercises.push(exEntry);
  }
  exEntry.sets.push({ reps, weight_kg: weight });
  lsSet('training_log', tlog);
  updateDayStats();
  renderTab('trenn');
  // Auto-start puhketaimer (faasi rest_s)
  const rest = STATE.btbPhaseData?.phases?.[String(STATE.btbPhase)]?.rest_s ?? 60;
  setTimeout(() => startRestTimer(rest), 80);
}

/* ---- Puhketaimer ---- */
let _restInterval = null;
function _fmtRest(s) { return String(Math.floor(s / 60)).padStart(2, '0') + ':' + String(s % 60).padStart(2, '0'); }
function _restEl() { return document.getElementById('rest-timer-display'); }
function startRestTimer(sec) {
  stopRestTimer();
  STATE.restRemain = sec;
  const el = _restEl();
  if (el) { el.textContent = _fmtRest(sec); el.style.color = '#fff'; }
  _restInterval = setInterval(() => {
    STATE.restRemain--;
    const el2 = _restEl();
    if (!el2) { stopRestTimer(); return; }
    if (STATE.restRemain <= 0) {
      el2.textContent = '00:00';
      el2.style.color = 'var(--green)';
      stopRestTimer();
      showToast('💪 Puhkus läbi — järgmine seeria!');
      return;
    }
    el2.textContent = _fmtRest(STATE.restRemain);
  }, 1000);
}
function addRestTime(s) {
  if (_restInterval && STATE.restRemain > 0) {
    STATE.restRemain += s;
    const el = _restEl();
    if (el) el.textContent = _fmtRest(STATE.restRemain);
  } else {
    const rest = STATE.btbPhaseData?.phases?.[String(STATE.btbPhase)]?.rest_s ?? 60;
    startRestTimer(rest + s);
  }
}
function stopRestTimer() {
  if (_restInterval) clearInterval(_restInterval);
  _restInterval = null;
}
function toggleRestTimer() {
  if (_restInterval) {
    stopRestTimer();
  } else {
    const rest = STATE.restRemain > 0 ? STATE.restRemain : (STATE.btbPhaseData?.phases?.[String(STATE.btbPhase)]?.rest_s ?? 60);
    startRestTimer(rest);
  }
}

function renderExerciseDetail() {
  const list = _trennExList();
  const idx = STATE.exDetailIdx;
  if (idx == null || idx < 0 || idx >= list.length) return null;
  const { planEx, label } = list[idx];
  const exData = STATE.exercises?.exercises?.[String(planEx.id)];
  if (!exData) return null;

  const weekCfg = getBtbWeekConfig();
  const sets    = weekCfg?.sets ?? planEx.sets ?? 3;
  const repsMin = weekCfg?.reps_min ?? planEx.reps_min ?? 8;
  const repsMax = weekCfg?.reps_max ?? planEx.reps_max ?? 12;
  const restS   = weekCfg?.rest_s ?? 60;
  const tempo   = weekCfg?.tempo ?? '301';
  const isBw    = exData.is_bodyweight;
  const lastW   = getLastWeight(String(planEx.id));
  const defaultW = lastW ?? planEx.start_weight_kg ?? 0;

  // Tänased logitud seeriad
  const today = _localDateStr(new Date());
  const tlog  = lsGet('training_log') ?? [];
  const todayEntry = tlog.find(e => e.date === today && e.plan === STATE.activePlan && e.treening === STATE.currentTraining);
  const todaySets = todayEntry?.exercises?.find(e => String(e.exercise_id) === String(planEx.id))?.sets ?? [];

  // Eelmine sessioon (viimane varasem päev kus see harjutus logitud)
  let prevSets = null, prevDate = null;
  const prevEntries = tlog
    .filter(e => e.date < today && e.exercises?.some(x => String(x.exercise_id) === String(planEx.id) && x.sets?.length))
    .sort((a, b) => b.date.localeCompare(a.date));
  if (prevEntries.length) {
    prevDate = prevEntries[0].date;
    prevSets = prevEntries[0].exercises.find(x => String(x.exercise_id) === String(planEx.id)).sets;
  }

  // Progressiooni soovitus (double progression)
  let suggestion;
  if (prevSets) {
    const allAtMax = prevSets.length >= sets && prevSets.every(s => (s.reps ?? 0) >= repsMax);
    const prevW = prevSets[0]?.weight_kg ?? 0;
    if (isBw) {
      suggestion = allAtMax
        ? `<span style="color:var(--green);font-weight:700;">↑ Kõik seeriad maksimumis — lisa kordusi või raskust (vest/ketas)</span>`
        : `<span style="color:var(--text-2);">→ Sihi ${repsMax} kordust igas seerias</span>`;
    } else if (allAtMax) {
      suggestion = `<span style="color:var(--green);font-weight:700;">↑ Soovitus: ${(prevW + 2.5).toFixed(1).replace('.0','')} kg (+2.5)</span> — kõik seeriad jõudsid ${repsMax}-ni`;
    } else {
      suggestion = `<span style="color:var(--text-2);">→ Sama raskus (${prevW} kg) — sihi ${repsMax} kordust igas seerias</span>`;
    }
  } else {
    suggestion = `<span style="color:var(--text-2);">Esimene kord — alusta ${isBw ? 'kehakaaluga' : (planEx.start_weight_kg ?? '?') + ' kg-ga'}, tehnika ees</span>`;
  }
  const prevLine = prevSets
    ? `Eelmine kord (${prevDate.slice(8,10)}.${prevDate.slice(5,7)}): <b>${prevSets[0]?.weight_kg ?? 0} kg</b> × ${prevSets.map(s => s.reps).join(', ')}`
    : 'Varasemat logi pole';

  // Seeriate read
  const setRows = Array.from({ length: Math.max(sets, todaySets.length) }, (_, i) => {
    const n = i + 1;
    const done = todaySets[i];
    if (done) {
      return `
      <div style="display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--track);">
        <span style="width:26px;font:700 11px/1 var(--font-mono);color:var(--text-3);">${n}.</span>
        <span style="flex:1;font:700 14px/1 var(--font-mono);color:var(--text-1);">${done.weight_kg ?? 0} kg × ${done.reps}</span>
        <span style="width:30px;height:30px;border-radius:9px;background:var(--green);color:#fff;display:flex;align-items:center;justify-content:center;font:700 13px/1 var(--font-mono);">✓</span>
      </div>`;
    }
    const isNextRow = i === todaySets.length;
    return `
      <div style="display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--track);${isNextRow ? '' : 'opacity:0.45;'}">
        <span style="width:26px;font:700 11px/1 var(--font-mono);color:${isNextRow ? 'var(--accent)' : 'var(--text-3)'};">${n}.</span>
        ${isBw
          ? `<span style="width:74px;font:500 11px/1 var(--font-mono);color:var(--text-3);">kehakaal</span>`

/* Salvestab ühe harjutuse logikirje */
function saveExerciseLog(exerciseId) {
  const repsInput = document.getElementById(`log-reps-${exerciseId}`);
  const wInput    = document.getElementById(`log-weight-${exerciseId}`);
  if (!repsInput) return;
  const reps = parseInt(repsInput.value) || 0;
  const weight = parseFloat(wInput?.value) || 0;
  if (!reps) { repsInput.focus(); return; }

  const today = _localDateStr(new Date());
  let tlog = lsGet('training_log') ?? [];
  let todayEntry = tlog.find(e => e.date === today && e.plan === STATE.activePlan && e.treening === STATE.currentTraining);
  if (!todayEntry) {
    todayEntry = { date: today, plan: STATE.activePlan, treening: STATE.currentTraining, done: false, exercises: [] };
    tlog.push(todayEntry);
  }
  let exEntry = todayEntry.exercises.find(e => String(e.exercise_id) === String(exerciseId));
  if (!exEntry) {
    exEntry = { exercise_id: Number(exerciseId), sets: [] };
    todayEntry.exercises.push(exEntry);
  }
  exEntry.sets.push({ reps, weight_kg: weight });
  lsSet('training_log', tlog);

  repsInput.value = '';
  if (wInput) wInput.value = '';
  updateDayStats();
  renderTab('trenn');
}

/* Märgib treeningu tehtuks */
function markTrainingDone() {
  const today = _localDateStr(new Date());
  let tlog = lsGet('training_log') ?? [];
  let todayEntry = tlog.find(e => e.date === today && e.plan === STATE.activePlan && e.treening === STATE.currentTraining);
  if (!todayEntry) {
    todayEntry = { date: today, plan: STATE.activePlan, treening: STATE.currentTraining, done: true, exercises: [] };
    tlog.push(todayEntry);
  } else {
    todayEntry.done = true;
  }
  lsSet('training_log', tlog);
  // Salvesta anabolilise akna aeg
  lsSet('training_done_time', new Date().toISOString());
  // Vahetab automaatselt järgmisele treeningule (A→B→A)
  const nextT = STATE.currentTraining === 'A' ? 'B' : 'A';
  STATE.currentTraining = nextT;
  lsSet('current_training', nextT);
  STATE.expandedExerciseId = null;
  updateDayStats();
  renderTab('trenn');
}

/* Tagastab aktiivsele faasile + nädalale vastavad parameetrid */
function getBtbWeekConfig() {
  const phaseData = STATE.btbPhaseData?.phases?.[String(STATE.btbPhase)];
  if (!phaseData || phaseData.coming_soon) return null;
  const weekCfg = phaseData.week_progression?.find(w => w.week === STATE.btbWeek);
  return weekCfg ? { ...weekCfg, rest_s: phaseData.rest_s, tempo: phaseData.tempo } : null;
}

/* BtB faas: liigu järgmisele nädalale / faasile */
function advanceBtbWeek() {
  const phaseData = STATE.btbPhaseData?.phases?.[String(STATE.btbPhase)];
  if (!phaseData || phaseData.coming_soon) return;
  const maxWeeks = phaseData.weeks ?? 5;
  if (STATE.btbWeek < maxWeeks) {
    STATE.btbWeek++;
    lsSet('btb_week', STATE.btbWeek);
  } else if (STATE.btbPhase < 2) {  // Faas 3-4 on coming soon
    STATE.btbPhase++;
    STATE.btbWeek = 1;
    STATE.btbStartDate = _localDateStr(new Date());
    lsSet('btb_phase',      STATE.btbPhase);
    lsSet('btb_week',       STATE.btbWeek);
    lsSet('btb_start_date', STATE.btbStartDate);
  }
  renderTab('trenn');
}

/* Ilmaprognoos tagasi: WMO wethercode → emoji */
function wmoIcon(code) {
  if (code === 0)            return '☀️';
  if (code <= 3)             return '⛅';
  if (code <= 48)            return '🌫️';
  if (code <= 67)            return '🌧️';
  if (code <= 77)            return '🌨️';
  if (code <= 82)            return '🌦️';
  return '⛈️';
}
function wmoDesc(code, rain) {
  const rainStr = rain > 0 ? ` · ${rain} mm vihma` : '';
  if (code === 0)  return 'Selge taevas' + rainStr;
  if (code <= 2)   return 'Poolpilves' + rainStr;
  if (code <= 3)   return 'Pilves' + rainStr;
  if (code <= 48)  return 'Udu' + rainStr;
  if (code <= 67)  return 'Vihm' + rainStr;
  if (code <= 77)  return 'Lumi' + rainStr;
  if (code <= 82)  return 'Hoovihmad' + rainStr;
  return 'Äike' + rainStr;
}

async function fetchWeather() {
  try {
    const url = 'https://api.open-meteo.com/v1/forecast?latitude=58.3726&longitude=26.7349' +
                '&daily=weathercode,temperature_2m_max,temperature_2m_min,precipitation_sum' +
                '&timezone=Europe%2FTallinn&forecast_days=2';
    const res  = await fetch(url);
    if (!res.ok) return null;
    const json = await res.json();
    return json;
  } catch { return null; }
}


/* v0.9.7.1: kui trennipäevad muutuvad, uuenda ka juba genereeritud toitumiskavas trennijoogi (S06)
   asukohta. Varem jäi S06 kinni sinna päeva, mis oli treeningplaanis valitud PLAANI GENEREERIMISE
   hetkel (mpGenerate loeb train_sched'i ainult siis) — hilisem trennipäevade muutmine Trennikavas
   ei liigutanud trennijooki toitumiskavas kaasa, mistõttu Ingmar nägi trennijooki vales kohas. */
function _resyncTrennijookSlots() {
  const trainSched = lsGet('train_sched') ?? [0, 2, 4];
  const plan = lsGet('meal_plan') ?? {};
  const m08  = MP_MEALS['M08'];
  let changed = false;
  Object.keys(plan).forEach(dateStr => {
    if (!plan[dateStr]) return;
    const jsDay  = new Date(dateStr + 'T12:00:00').getDay();
    const dowIdx = jsDay === 0 ? 6 : jsDay - 1; // 0=E..6=P, sama valem mis mujal failis
    const shouldHave = trainSched.includes(dowIdx);
    const has = !!plan[dateStr].S06;
    if (shouldHave && !has) {
      plan[dateStr].S06 = { recipe_id: 'M08', name: m08.name, kcal: m08.kcal, protein: m08.protein, carbs: m08.carbs, fat: m08.fat };
      changed = true;
    } else if (!shouldHave && has) {
      delete plan[dateStr].S06;
      changed = true;
    }
  });
  if (changed) {
    lsSet('meal_plan', plan);
    Object.keys(plan).forEach(_touchMealPlanDay); // v0.9.7.0 tombstone-mustri kohaselt, et sünk ei kirjutaks üle
  }
}

/* Nädala treening/puhkus ülevaade */
function toggleTrainSchedDay(dayIdx) {
  let sched = lsGet('train_sched') ?? [0,2,4]; // vaikimisi E,K,R
  const pos = sched.indexOf(dayIdx);
  if (pos >= 0) sched.splice(pos, 1); else sched.push(dayIdx);
  lsSet('train_sched', sched);
  _resyncTrennijookSlots();
  renderTab('trenn');
}

function resetTrainSched() {
  lsSet('train_sched', [0, 2, 4]);
  _resyncTrennijookSlots();
  renderTab('trenn');
}

function renderWeekSchedule() {
  const trainLog = lsGet('training_log') || [];
  const trainSched = lsGet('train_sched') ?? [0,2,4]; // 0=E,1=T,2=K,3=N,4=R,5=L,6=P
  const now      = new Date();
  const pad = n => String(n).padStart(2,'0');
  const localStr = d => `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
  const todayStr = localStr(now);

  // Leia nädala algus (esmaspäev) — getDay() on kohalik
  const dow = now.getDay(); // 0=pühapäev
  const monday = new Date(now);
  monday.setDate(now.getDate() - (dow === 0 ? 6 : dow - 1));
  monday.setHours(0,0,0,0);

  const DAY_LABELS = ['E','T','K','N','R','L','P'];

  const days = DAY_LABELS.map((label, i) => {
    const d = new Date(monday);
    d.setDate(monday.getDate() + i);
    const dateStr     = localStr(d);
    const isToday     = dateStr === todayStr;
    const isPast      = dateStr < todayStr;
    const isFuture    = dateStr > todayStr;
    const isPlanned   = trainSched.includes(i); // plaanitud treeningpäev
    const entry       = trainLog.find(e => e.date === dateStr);
    const done        = entry?.done ?? false;

    let icon, iconColor, bg, border, extraStyle = '', clickable = '';
    if (done) {
      // Tehtud trenn — roheline linnuke
      icon = '✓'; bg = 'rgba(34,197,94,0.12)'; border = 'var(--green)';
      iconColor = 'color:var(--green);font-size:18px;font-weight:700;';
    } else if (isPast) {
      // Minevik — vahele jäänud trenn või puhkepäev
      icon = isPlanned ? '💪' : '😊';
      bg = 'var(--bg)'; border = 'var(--border)';
      iconColor = 'opacity:0.3;font-size:15px;';
    } else if (isToday) {
      icon = isPlanned ? '💪' : '😊';
      bg = isPlanned ? 'var(--accent-bg)' : 'var(--bg)';
      border = isPlanned ? 'var(--accent)' : 'var(--border)'; iconColor = '';
      if (isPlanned) extraStyle = 'box-shadow:0 0 0 2px var(--accent-bg);';
    } else {
      // Tulevik — klikitav
      icon = isPlanned ? '💪' : '😊';
      bg = isPlanned ? 'rgba(99,102,241,0.05)' : 'transparent';
      border = isPlanned ? 'var(--accent)' : 'var(--border)';
      iconColor = '';
      clickable = `onclick="toggleTrainSchedDay(${i})" title="${isPlanned?'Eemalda treeningpäev':'Lisa treeningpäev'}"`;
      extraStyle = 'cursor:pointer;';
    }

    const labelColor = isPlanned && !isPast ? 'var(--accent)' : isToday ? 'var(--accent)' : 'var(--text-3)';
    const labelWeight = (isToday || isPlanned) ? '700' : '500';

    return `
      <div style="flex:1;text-align:center;">
        <div style="font-size:10px;font-weight:${labelWeight};color:${labelColor};margin-bottom:4px;">${label}</div>
        <div ${clickable} style="
          height:34px;border-radius:6px;
          background:${bg};border:1.5px solid ${border};
          display:flex;align-items:center;justify-content:center;
          font-size:16px;${iconColor}${extraStyle}
        ">${icon}</div>
      </div>`;
  });

  const trainedThisWeek = DAY_LABELS.reduce((acc, _, i) => {
    const d = new Date(monday); d.setDate(monday.getDate()+i);
    return acc + (trainLog.some(e => e.date === localStr(d) && e.done) ? 1 : 0);
  }, 0);
  const TARGET = 3; // BtB: 3 treeningut nädalas

  return `
    <div class="card" style="overflow:hidden;margin-bottom:var(--sp-sm);">
      <div style="padding:var(--sp-xs) var(--sp-md);border-bottom:0.5px solid var(--border);display:flex;align-items:center;justify-content:space-between;">
        <span style="font-size:13px;font-weight:700;">📅 See nädal</span>
        <span style="display:flex;align-items:center;gap:8px;">
          <span style="font-size:11px;color:${trainedThisWeek>=TARGET?'var(--green)':'var(--text-3)'};">${trainedThisWeek}/${TARGET} treeningut</span>
          <span onclick="resetTrainSched();" style="font-size:10px;color:var(--text-3);cursor:pointer;text-decoration:underline;" title="Lähtesta E/K/R">lähtesta</span>
        </span>
      </div>
      <div style="display:flex;gap:4px;padding:var(--sp-sm) var(--sp-md);">
        ${days.join('')}
      </div>
    </div>`;
}

function renderWeatherInner() {
  const d = STATE.weatherData;
  if (!d) return '<div class="weather-loading">🔄 Ilmaprognoos laadib...</div>';

  const days    = d.daily;
  const dates   = days.time ?? [];
  const codes   = days.weathercode ?? [];
  const maxT    = days.temperature_2m_max ?? [];
  const minT    = days.temperature_2m_min ?? [];
  const rain    = days.precipitation_sum ?? [];

  const today   = dates[0]; const tom = dates[1];
  const isBadWeather = (codes[0] >= 51 || rain[0] > 2 || maxT[0] < 2);
  const recClass = isBadWeather ? 'warn' : 'good';
  const recText  = isBadWeather
    ? '⚠ Halb ilm — kaalu kodutreeningut (plaan B)'
    : `✓ Sobib Karlovasse — ${STATE.trainingPlan?.plans?.A?.name ?? 'välitreening'}`;

  function dayHtml(i, label) {
    const r = Math.round(rain[i] ?? 0);
    return `
      <div class="weather-day">
        <span class="weather-icon">${wmoIcon(codes[i])}</span>
        <div class="weather-day-info">
          <div class="weather-day-title">${label}</div>
          <div class="weather-day-temp">${Math.round(maxT[i])}° / ${Math.round(minT[i])}°</div>
          <div class="weather-day-desc">${wmoDesc(codes[i], r)}</div>
        </div>
      </div>`;
  }

  return `
      <div class="weather-days">
        ${dayHtml(0, 'Täna, Karlova')}
        <div class="weather-divider"></div>
        ${dayHtml(1, 'Homme')}
      </div>
      <div class="weather-rec ${recClass}">${recText}</div>`;
}

function renderWeatherWidget() {
  return `<div class="weather-widget">${renderWeatherInner()}</div>`;
}

function renderPhaseIndicator() {

        <div class="phase-indicator-week-num">Nädal ${STATE.btbWeek}/${maxWeeks}</div>
        <div class="phase-indicator-week-dots">${dots}</div>
        <div style="font-size:9px;opacity:0.65;margin-top:2px;">${totalWeek}. programminädal</div>
      </div>
      <button class="phase-indicator-btn" onclick="event.stopPropagation();showPhaseMenu()" title="Faasi sätted">⋯</button>
    </div>`;

  if (!STATE.showPhasePanel) return indicator;

  // Nädala navigatsioonipaneel
  const weekBtns = Array.from({ length: maxWeeks }, (_, i) => {
    const w    = i + 1;
    const cfg  = phaseData.week_progression?.find(x => x.week === w);
    const cls  = w === STATE.btbWeek ? 'active' : w < STATE.btbWeek ? 'done' : '';
    const dlBadge = cfg?.deload ? ' 🛡️' : '';
    return `<button class="phase-week-btn ${cls}" onclick="setBtbWeek(${w})">N${w}${dlBadge}</button>`;
  }).join('');

  const isLastPhase = STATE.btbPhase >= 2;
  const phaseActions = isLastPhase
    ? `<div class="phase-panel-btn" style="opacity:0.5;cursor:default;">🔒 Faas 3 — Tulemas</div>`
    : `<button class="phase-panel-btn primary" onclick="setBtbPhase(${STATE.btbPhase + 1})">→ Liigu Faas ${STATE.btbPhase + 1}-te</button>`;

  const prevPhaseBtn = STATE.btbPhase > 1
    ? `<button class="phase-panel-btn" onclick="setBtbPhase(${STATE.btbPhase - 1})">← Tagasi Faas ${STATE.btbPhase - 1}</button>`
    : '';

  return `
    ${indicator}
    <div class="phase-panel">
      <div class="phase-panel-title">📅 Nädala valik · kokku ${totalWeek}. programminädal</div>
      <div class="phase-panel-weeks">${weekBtns}</div>
      <div class="phase-panel-focus">${phaseData.focus ?? ''}</div>
      <div class="phase-panel-actions">
        ${prevPhaseBtn}
        ${phaseActions}
        <button class="phase-panel-btn" onclick="STATE.showPhasePanel=false;renderTab('trenn')">Sulge</button>
      </div>
    </div>`;
}

function showPhaseMenu() {
  STATE.showPhasePanel = !STATE.showPhasePanel;
  renderTab('trenn');
}

function setBtbWeek(week) {
  STATE.btbWeek = week;
  lsSet('btb_week', week);
  // Uuenda start kuupäev vastavalt valitud nädalale
  const d = new Date();
  d.setDate(d.getDate() - (week - 1) * 7);
  STATE.btbStartDate = _localDateStr(d);
  lsSet('btb_start_date', STATE.btbStartDate);
  renderTab('trenn');
}

function setBtbPhase(phase) {
  if (phase < 1 || phase > 4) return;
  const phaseData = STATE.btbPhaseData?.phases?.[String(phase)];
  if (phaseData?.coming_soon) return;
  STATE.btbPhase     = phase;
  STATE.btbWeek      = 1;
  STATE.btbStartDate = _localDateStr(new Date());
  lsSet('btb_phase',      phase);
  lsSet('btb_week',       1);
  lsSet('btb_start_date', STATE.btbStartDate);
  STATE.showPhasePanel = false;
  renderTab('trenn');
}

/* Startib BtB programmi (kutsutakse kui kasutajal pole veel faasi) */
function startBtbProgram() {
  STATE.btbPhase     = 1;
  STATE.btbWeek      = 1;
  STATE.btbStartDate = _localDateStr(new Date());
  lsSet('btb_phase',      STATE.btbPhase);
  lsSet('btb_week',       STATE.btbWeek);
  lsSet('btb_start_date', STATE.btbStartDate);
  renderTab('trenn');
}
