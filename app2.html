============================================================ */

/* Renderdab ühe harjutuse slotti.
   circuitLabel: nt 'A1', 'A2', 'B1' — kuvatakse numbri asemel
   phaseConfig:  { sets, reps_min, reps_max } — faasist (overrides planEx) */
function renderExerciseSlot(planEx, exData, idx, circuitLabel, phaseConfig) {
  if (!exData) return '';

  const id = String(planEx.id);
  const isOpen = STATE.expandedExerciseId === id;
  const lastW = getLastWeight(id);
  const lastReps = getLastMaxReps(id);
  const nextW = suggestNextWeight(exData, planEx);
  const isOverhead = exData.warning === 'overhead';
  const isBodyweight = exData.is_bodyweight;

  // Kasuta faasi seeriad/kordused kui saadaval, muidu planEx oma
  const effectiveSets    = phaseConfig?.sets    ?? planEx.sets    ?? 3;
  const effectiveRepsMin = phaseConfig?.reps_min ?? planEx.reps_min;
  const effectiveRepsMax = phaseConfig?.reps_max ?? planEx.reps_max;

  // Repsid tekstina
  const repsText = effectiveRepsMin === effectiveRepsMax
    ? `${effectiveRepsMin} ${planEx.unit}`
    : `${effectiveRepsMin}–${effectiveRepsMax} ${planEx.unit}`;
  const setsText = `${effectiveSets}×${repsText}`;

  // Display number: circuitLabel ('A1') või idx
  const displayNum = circuitLabel ?? String(idx);

  // Kaaluinfo
  let weightBadge = '';
  if (!isBodyweight && planEx.start_weight_kg > 0) {
    const displayW = lastW ?? planEx.start_weight_kg;
    weightBadge = `<span class="exercise-weight-badge">${displayW} kg</span>`;
  }

  // Progress badge
  let progressBadge = '';
  if (nextW) {
    progressBadge = `<span class="exercise-progress-badge">↑ ${nextW} kg!</span>`;
  }

  // Warning badge
  const warningBadge = isOverhead
    ? `<span class="exercise-warning-badge">⚠️ kerge</span>` : '';

  // Ladinud selle treeningu ajal
  const today = _localDateStr(new Date());
  const tlog  = lsGet('training_log') ?? [];
  const todayEntry = tlog.find(e => e.date === today && e.plan === STATE.activePlan && e.treening === STATE.currentTraining);
  const todaySets  = todayEntry?.exercises?.find(e => String(e.exercise_id) === id)?.sets ?? [];
  const setsDone   = todaySets.length;
  const isDoneSlot = setsDone >= effectiveSets;

  // Logi kirjete loend — iga sett omareal
  const setsLogHtml = todaySets.length ? `
    <div style="margin-bottom:8px;">
      ${todaySets.map((s,i) => `
        <div style="display:flex;align-items:center;gap:8px;padding:3px 0;border-bottom:0.5px solid var(--border);font-size:12px;">
          <span style="font-weight:700;color:var(--text-3);min-width:48px;">Sett ${i+1}</span>
          <span style="color:var(--text-1);">${s.reps} kordust${s.weight_kg ? ` · <strong>${s.weight_kg} kg</strong>` : ''}</span>
        </div>`).join('')}
    </div>` : '';

  // Log form
  const showWeightInput = !isBodyweight && planEx.start_weight_kg > 0;
  const defaultWeight = lastW ?? planEx.start_weight_kg;
  const lastResult = lastW
    ? `Eelmine: ${lastW} kg${lastReps ? ` · ${lastReps}+ kordust` : ''}${nextW ? ` → <strong style="color:var(--green)">Tõsta ${nextW} kg-le!</strong>` : ''}`
    : `Soovituslik algkaal: ${planEx.start_weight_kg > 0 ? planEx.start_weight_kg + ' kg' : 'kehakaal'}`;

  const logForm = `
    <div class="log-form">
      <div class="log-form-title">Lisa sett (${setsDone}/${effectiveSets} tehtud)</div>
      ${setsLogHtml}
      <div class="log-form-inputs">
        <div class="log-input-group">
          <label>Kordused</label>
          <input id="log-reps-${id}" type="number" placeholder="${effectiveRepsMin}" inputmode="numeric" min="1" max="50">
        </div>
        ${showWeightInput ? `
        <div class="log-input-group">
          <label>Raskus (kg)</label>
          <input id="log-weight-${id}" type="number" placeholder="${defaultWeight}" inputmode="decimal" step="0.5" min="0">
        </div>` : ''}
        <button class="btn-log-save" onclick="saveExerciseLog(${id})">+ Lisa</button>
      </div>
      <div class="log-last-result">${lastResult}</div>
    </div>`;

  // Steps
  const stepsHtml = (exData.steps ?? []).map((s, i) =>
    `<div class="exercise-step"><span class="exercise-step-num">${i + 1}.</span><span>${s}</span></div>`
  ).join('');

  // Ingmar märkus
  const noteHtml = exData.ingmar_note
    ? `<div class="exercise-ingmar-note">💡 ${exData.ingmar_note}</div>` : '';

  // YouTube nupp
  let ytBtn = '';
  if (exData.youtube_url) {
    ytBtn = `<a href="${exData.youtube_url}" target="_blank" class="btn-youtube">▶ Vaata videot</a>`;
  } else if (exData.youtube_search) {
    const q = encodeURIComponent(exData.youtube_search);
    ytBtn = `<a href="https://www.youtube.com/results?search_query=${q}" target="_blank" class="btn-youtube">▶ Vaata videot</a>`;
  }

  // Warning banner
  const warningBanner = isOverhead ? `
    <div class="exercise-warning-banner">
      ⚠️ <strong>Õla tugevdamine — kerge koormus.</strong> Alusta 10 kg, tõsta +2,5 kg korraga ainult valuvabasid. Esmalt hea tehnika, siis raskus.
    </div>` : '';

  // Noodiviide planEx.note
  const planNoteHtml = planEx.note && !isOverhead
    ? `<div style="font-size:11px;color:var(--text-2);margin-bottom:var(--sp-sm);">📝 ${planEx.note}</div>` : '';

  return `
    <div class="exercise-slot ${isDoneSlot ? 'done-slot' : ''}">
      <div class="exercise-slot-header" onclick="${idx != null ? `openExerciseDetail(${idx})` : `toggleExercise('${id}')`}">
        <span class="exercise-num">${displayNum}</span>
        <div class="exercise-info">
          <div class="exercise-name">${exData.name}</div>
          <div class="exercise-meta">
            <span>${setsText}</span>
            ${weightBadge}
            ${progressBadge}
            ${warningBadge}
            ${isDoneSlot ? '<span style="color:var(--green);font-size:11px;font-weight:700;">✓</span>' : ''}
          </div>
        </div>
        <span class="exercise-chevron ${isOpen ? 'open' : ''}">›</span>
      </div>
      ${isOpen ? `
      <div class="exercise-expand">
        ${warningBanner}
        ${logForm}
        <div class="exercise-steps">${stepsHtml}</div>
        ${planNoteHtml}
        ${noteHtml}
        ${ytBtn}
      </div>` : ''}
    </div>`;
}

function isTodayTrainingDay() {
  const trainSched = lsGet('train_sched') ?? [0, 2, 4]; // 0=E,1=T,2=K,3=N,4=R,5=L,6=P
  const dow = new Date().getDay(); // 0=pühapäev, 1=esmaspäev...
  const mondayIdx = dow === 0 ? 6 : dow - 1; // teisenda esmaspäev-põhiseks
  return trainSched.includes(mondayIdx);
}

function toggleBmxSession() {
  if (STATE.bmxActive) {
    stopBmxSession();
  } else {
    startBmxSession();
  }
}

function startBmxSession() {
  STATE.bmxActive        = true;
  STATE.bmxStartTime     = new Date().toISOString();
  STATE.bmxShowRecovery  = false;
  lsSet('bmx_active', true);
  lsSet('bmx_start',  STATE.bmxStartTime);
  renderTab('trenn');
}

function stopBmxSession() {
  const startTime   = STATE.bmxStartTime ? new Date(STATE.bmxStartTime) : new Date();
  const endTime     = new Date();
  const durationMin = Math.max(1, Math.round((endTime - startTime) / 60000));
  const kcalEst     = Math.round((durationMin / 60) * 500); // ~500 kcal/h

  // Salvesta loogi
  const bmxLog = lsGet('bmx_log') ?? [];
  bmxLog.unshift({
    date: _localDateStr(endTime),
    start: STATE.bmxStartTime,
    end: endTime.toISOString(),
    duration_min: durationMin,
    kcal_est: kcalEst
  });
  lsSet('bmx_log', bmxLog.slice(0, 20));

  STATE.bmxActive       = false;
  STATE.bmxStartTime    = null;
  STATE.bmxShowRecovery = true;
  STATE.bmxLastKcal     = kcalEst;
  STATE.bmxLastDuration = durationMin;
  lsSet('bmx_active', false);
  lsSet('bmx_start',  null);
  renderTab('trenn');
}

function dismissBmxRecovery() {
  STATE.bmxShowRecovery = false;
  renderTab('trenn');
}

function renderBmxWidget() {
  // Näita taastumiskorvi kui sessioon äsja lõpetati
  if (STATE.bmxShowRecovery) {
    return renderBmxRecoveryBasket(STATE.bmxLastKcal, STATE.bmxLastDuration);
  }

  const isActive     = STATE.bmxActive;
  const isTodayTrain = isTodayTrainingDay();

  if (!isActive) {
    return `
      <div style="margin-bottom:var(--sp-sm);">
        <button onclick="toggleBmxSession()" style="
          width:100%;padding:12px var(--sp-md);
          background:var(--surface);border:1.5px solid var(--border);
          border-radius:var(--r-md);cursor:pointer;text-align:left;
          display:flex;align-items:center;justify-content:space-between;">
          <span style="display:flex;align-items:center;gap:10px;">
            <span style="font-size:22px;">🚴</span>
            <span>
              <span style="font-size:14px;font-weight:700;color:var(--text-1);display:block;">BMX sessioon</span>
              <span style="font-size:11px;color:var(--text-3);">${isTodayTrain
                ? '⚠️ Täna on treeningpäev — sessioon nihutab treeningu homseks'
                : 'Käivita sessiooni jälgimine'}</span>
            </span>
          </span>
          <span style="font-size:12px;font-weight:600;color:var(--accent);white-space:nowrap;">Alusta →</span>
        </button>
      </div>`;
  }

  // Aktiivne sessioon — banner
  const startTime  = STATE.bmxStartTime ? new Date(STATE.bmxStartTime) : new Date();
  const elapsedMin = Math.max(0, Math.round((Date.now() - startTime.getTime()) / 60000));
  const elapsedH   = Math.floor(elapsedMin / 60);
  const elapsedM   = elapsedMin % 60;
  const elapsedStr = elapsedH > 0 ? `${elapsedH} h ${elapsedM} min` : `${elapsedMin} min`;
  const kcalEst    = Math.round((elapsedMin / 60) * 500);

  return `
    <div style="margin-bottom:var(--sp-sm);padding:var(--sp-md);
      background:#FEF3C7;border:1.5px solid #F59E0B;border-radius:var(--r-md);">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;">
        <div style="display:flex;align-items:center;gap:10px;">
          <span style="font-size:24px;">🚴</span>
          <div>
            <div style="font-size:14px;font-weight:700;color:#92400E;">BMX sessioon käigus</div>
            <div style="font-size:12px;color:#92400E;">${elapsedStr} · est. ${kcalEst} kcal</div>
          </div>
        </div>
        <button onclick="toggleBmxSession()" style="
          padding:8px 14px;background:#92400E;color:white;
          border:none;border-radius:var(--r-sm);
          font-size:12px;font-weight:700;cursor:pointer;">
          Lõpeta
        </button>
      </div>
      <div style="font-size:12px;color:#92400E;background:rgba(146,64,14,0.08);
        border-radius:var(--r-sm);padding:8px;margin-bottom:${isTodayTrain ? '6px' : '0'};">
        💧 <strong>Joo rohkem!</strong> BMX ajal: +500 ml vett iga 45 min tagant
      </div>
      ${isTodayTrain ? `<div style="font-size:11px;color:#92400E;padding-top:6px;">
        ⚠️ Trenn nihkub homseks — BMX loetakse tänase koormusena
      </div>` : ''}
    </div>`;
}

function renderBmxRecoveryBasket(kcalNeeded, durationMin) {
  const RECOVERY = [
    { id: 'vadakupulber', label: 'Vadakupulber + täispiim (500ml)', kcal: 350, prep: '2 min', emoji: '🥛' },
    { id: 'banaanid',     label: 'Banaanid 2 tk',                   kcal: 180, prep: '0 min', emoji: '🍌' },
    { id: 'maapahklivoi', label: 'Maapähklivõi 2 spl + leib',       kcal: 300, prep: '2 min', emoji: '🥜' },
    { id: 'munad',        label: 'Munad 4 tk (keedetud/praetud)',    kcal: 280, prep: '5 min', emoji: '🥚' },
    { id: 'kodujuust',    label: 'Kodujuust 200g + mesi',            kcal: 260, prep: '1 min', emoji: '🍯' },
    { id: 'taispiim',     label: 'Täispiim 500ml',                   kcal: 175, prep: '0 min', emoji: '🥛' },
  ];

  const shopIds  = new Set((STATE.shopping?.products ?? []).map(p => p.id));
  const avail    = RECOVERY.filter(p => shopIds.has(p.id));
  if (!avail.length) return '';

  // Vali toidud kuni kcalNeeded täis
  let remaining = kcalNeeded;
  const suggestions = [];
  for (const item of avail) {
    if (remaining <= 0) break;
    suggestions.push(item);
    remaining -= item.kcal;
  }

  const totalSugg  = suggestions.reduce((a, s) => a + s.kcal, 0);
  const durStr     = durationMin >= 60
    ? `${Math.floor(durationMin / 60)} h ${durationMin % 60} min`
    : `${durationMin} min`;

  return `
    <div style="margin-bottom:var(--sp-sm);padding:var(--sp-md);
      background:rgba(34,197,94,0.06);border:1.5px solid var(--green);border-radius:var(--r-md);">
      <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px;">
        <div>
          <div style="font-size:14px;font-weight:700;color:#166534;">🏁 Sessioon lõpetatud!</div>
          <div style="font-size:12px;color:var(--text-2);margin-top:2px;">${durStr} · est. ${kcalNeeded} kcal põletatud</div>
        </div>
        <button onclick="dismissBmxRecovery()" style="
          background:none;border:none;font-size:20px;cursor:pointer;
          color:var(--text-3);padding:0 2px;line-height:1;">×</button>
      </div>
      <div style="font-size:12px;font-weight:700;color:var(--text-1);margin-bottom:4px;">
        🧺 Taastumiskorv — söö järgmise 30 min jooksul
      </div>
      <div style="font-size:11px;color:var(--text-2);margin-bottom:10px;">
        Eesmärk: <strong>~${kcalNeeded} kcal</strong> tagasi + valk lihaste taastumiseks
      </div>
      ${suggestions.map(s => `
        <div style="display:flex;align-items:center;gap:10px;
          padding:8px 0;border-bottom:0.5px solid rgba(34,197,94,0.25);">
          <span style="font-size:20px;">${s.emoji}</span>
          <div style="flex:1;">
            <div style="font-size:13px;font-weight:600;color:var(--text-1);">${s.label}</div>
            <div style="font-size:11px;color:var(--text-3);">${s.kcal} kcal · ${s.prep}</div>
          </div>
        </div>`).join('')}
      <div style="margin-top:10px;font-size:12px;color:var(--text-2);">
        Kokku: <strong style="color:#166534;">~${totalSugg} kcal</strong>
      </div>
      <div style="margin-top:8px;padding-top:8px;border-top:0.5px solid rgba(34,197,94,0.25);
        font-size:11px;color:var(--text-3);">
        💧 Joo ka 500–750 ml vett järgmise tunni jooksul
      </div>
    </div>`;
}

    </div>`;
}

/* ============================================================
   ANABOLILINE AKEN
============================================================ */
function renderAnabolicWindowCard() {
  const doneTime = lsGet('training_done_time');
  if (!doneTime) return '';
  const elapsed = Date.now() - new Date(doneTime).getTime();
  const windowMs = 4 * 3600 * 1000;
  if (elapsed >= windowMs) return '';

  const remaining = windowMs - elapsed;
  const hLeft = Math.floor(remaining / 3600000);
  const mLeft = Math.floor((remaining % 3600000) / 60000);
  const timeStr = hLeft > 0 ? `${hLeft}h ${mLeft}min` : `${mLeft} min`;
  const urgency = remaining < 3600000; // < 1h jäänud

  return `
    <div style="background:${urgency ? 'rgba(239,68,68,0.08)' : 'rgba(34,197,94,0.08)'};
                border:1px solid ${urgency ? 'var(--red,#ef4444)' : 'var(--green,#22c55e)'};
                border-radius:var(--r-md);padding:var(--sp-sm);margin-bottom:var(--sp-sm);">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;">
        <div style="display:flex;align-items:center;gap:8px;">
          <span style="font-size:18px;">⚡</span>
          <div>
            <div style="font-size:13px;font-weight:700;color:${urgency ? 'var(--red,#ef4444)' : '#166534'};">Anaboliline aken avatud</div>
            <div style="font-size:11px;color:var(--text-2);">Jäänud: <strong>${timeStr}</strong></div>
          </div>
        </div>
      </div>
      <div style="font-size:12px;color:var(--text);line-height:1.5;">
        🥛 <strong>30–40g valku</strong> kohe (vadakupulber + piim ideal)<br>
        🍌 <strong>Kiired süsivesikud</strong> (banaan, riis, mahlaklaas)<br>
        🚫 <strong>Väldi rasva</strong> — aeglustab valgu imendumist
      </div>
    </div>`;
}

function renderTrenn() {
  if (!STATE.trainingPlan || !STATE.exercises) {
    return renderTulemas('💪', 'Trennikava', 'Andmeid ei leitud...');
  }

  const plans       = STATE.trainingPlan.plans ?? {};
  const exData      = STATE.exercises.exercises ?? {};
  const activePlan  = STATE.activePlan ?? 'B';
  const curT        = STATE.currentTraining ?? 'A';
  const phaseKey    = `phase_${STATE.btbPhase}`;
  const weekCfg     = getBtbWeekConfig();
  const phaseCfg    = STATE.btbPhaseData?.phases?.[String(STATE.btbPhase)];
  const isComingSoon = phaseCfg?.coming_soon ?? false;

  // Plaanivalija
  const planBtns = ['A', 'B', 'C'].filter(p => plans[p]).map(p => {
    const pl = plans[p];
    return `<button class="plan-btn ${activePlan === p ? 'active' : ''}" onclick="selectPlan('${p}')">
      <span class="plan-btn-emoji">${pl.emoji}</span>
      <span class="plan-btn-name">${pl.name}</span>
    </button>`;
  }).join('');

  // Aktiivne plaan
  const plan = plans[activePlan];
  if (!plan) return renderTulemas('💪', 'Trennikava', 'Plaan puudub');

  const trainings = plan.trainings ?? {};
  const trainKeys = Object.keys(trainings);

  // A/B toggle
  const toggleBtns = trainKeys.map(t => {
    const tr = trainings[t];
    return `<button class="training-toggle-btn ${curT === t ? 'active' : ''}" onclick="selectTraining('${t}')">
      ${tr.name}
    </button>`;
  }).join('');

  // Aktiivsed harjutused — kasuta phase_1/phase_2 kui olemas, muidu legacy exercises
  const training = trainings[curT];
  if (!training) return `<p>Treening ${curT} puudub.</p>`;

  const exercises = training[phaseKey] ?? training.exercises ?? [];

  /* v0.9.4: harjutuse detailvaade avatud → näita seda kogu tabi asemel */
  if (STATE.exDetailIdx != null && !isComingSoon) {
    const dv = renderExerciseDetail();
    if (dv) return dv;
    STATE.exDetailIdx = null;
  }

  // Grupeeri harjutused circuit-i järgi (A, B, C, D)
  function buildCircuitGroups(exList) {
    const groups = {};
    const order  = [];
    exList.forEach(planEx => {
      const grp = planEx.circuit ?? 'X';
      if (!groups[grp]) { groups[grp] = []; order.push(grp); }
      groups[grp].push(planEx);
    });
    return order.map(g => ({ circuit: g, items: groups[g] }));
  }

  const circuitGroups = buildCircuitGroups(exercises);
  const restStr = phaseCfg?.rest_s ? `${phaseCfg.rest_s} sek puhkus` : '60 sek puhkus';

  let exSlotsHtml = '';
  if (isComingSoon) {
    exSlotsHtml = renderPhaseIndicator(); // näitab coming-soon sisu
  } else {
    let _flatIdx = 0; // v0.9.4: index detailvaate jaoks (sama järjekord mis _trennExList)
    circuitGroups.forEach(group => {
      const cName = group.circuit;
      const isFinisher = cName === 'D';
      const label = isFinisher
        ? `<span class="circuit-group-label">D — Finišer <span class="circuit-rest-badge">parim puhata rohkem</span></span>`
        : `<span class="circuit-group-label">${cName}-ring — alterneeritult <span class="circuit-rest-badge">${restStr}</span></span>`;

      const slots = group.items.map((planEx, subIdx) => {
        const ex           = exData[String(planEx.id)];
        const circLabel    = `${cName}${group.items.length > 1 ? subIdx + 1 : ''}`;
        return renderExerciseSlot(planEx, ex, _flatIdx++, circLabel, weekCfg);
      }).join('');

      exSlotsHtml += `<div class="circuit-group">${label}<div>${slots}</div></div>`;
    });
  }

  // Metrics
  const dur = plan.duration_min ?? '?';
  const loc = plan.location ?? '';

  // Treening tehtud nupp
  const today     = _localDateStr(new Date());
  const tlog      = lsGet('training_log') ?? [];
  const todayDone = tlog.some(e => e.date === today && e.plan === activePlan && e.treening === curT && e.done);

  // Nädala lõpu indikaator
  const isLastWeek  = STATE.btbWeek >= (phaseCfg?.weeks ?? 5);
  const weekEndHint = isLastWeek && !isComingSoon
    ? `<div style="background:rgba(34,197,94,0.08);border:0.5px solid var(--green);border-radius:var(--r-sm);padding:8px var(--sp-sm);margin-bottom:var(--sp-sm);font-size:12px;color:#166534;">
         🎉 <strong>Nädal ${STATE.btbWeek}/${phaseCfg?.weeks} lõpetatud!</strong> Järgmine aste ootab — vajuta <strong>⋯</strong> faasipaneelis.
       </div>` : '';

  const deloadBanner = weekCfg?.deload ? `
    <div style="background:rgba(245,158,11,0.08);border:1px solid var(--amber,#f59e0b);
                border-radius:var(--r-sm);padding:8px var(--sp-sm);margin-bottom:var(--sp-sm);
                font-size:12px;color:#92400e;">
      🛡️ <strong>Deload nädal</strong> — Tee ainult 2 töösetti, vähenda kaalu ~50–60% tavalisest.
      Keha taastub ja valmistub järgmisteks nädalateks. Ära hüppa üle!
    </div>` : '';

  /* ---- Quiet Data: pealkiri + nädalaloendur ---- */
  const weekTotalNum = (STATE.btbPhase - 1) * 5 + STATE.btbWeek;
  const titleBlock = `
    <div style="display:flex;justify-content:space-between;align-items:flex-start;padding:2px 2px 4px;">
      <div>
        <div style="font:700 23px/1.1 var(--font);color:var(--text-1);letter-spacing:-0.4px;">Treening ${curT}</div>
        <div style="font:500 11px/1 var(--font-mono);color:var(--text-3);margin-top:5px;letter-spacing:0.3px;">Full Body · Bony to Beastly · ${plan.name ?? ''}</div>
      </div>
      <div style="background:var(--chip);border:1px solid var(--border);border-radius:9px;padding:6px 10px;font:700 12px/1 var(--font-mono);color:var(--text-1);white-space:nowrap;">N ${weekTotalNum}<span style="color:var(--text-3);font-weight:500;">/20</span></div>
    </div>`;

  /* ---- Režiim (Jõutreening / BMX) ---- */
  const trennMode = STATE.trennMode ?? (STATE.bmxActive ? 'bmx' : 'joud');
  const modeSeg = `
    <div style="display:flex;gap:3px;background:var(--chip);border-radius:12px;padding:3px;">
      <button onclick="setTrennMode('joud')" style="flex:1;padding:9px 4px;border:none;border-radius:9px;cursor:pointer;font:600 12px/1 var(--font);${trennMode === 'joud' ? 'background:var(--accent);color:#fff;box-shadow:0 1px 3px rgba(37,99,235,.3);' : 'background:transparent;color:var(--text-2);'}">🏋️ Jõutreening</button>
      <button onclick="setTrennMode('bmx')" style="flex:1;padding:9px 4px;border:none;border-radius:9px;cursor:pointer;font:600 12px/1 var(--font);${trennMode === 'bmx' ? 'background:var(--accent);color:#fff;box-shadow:0 1px 3px rgba(37,99,235,.3);' : 'background:transparent;color:var(--text-2);'}">🚴 BMX${STATE.bmxActive ? ' ●' : ''}</button>
    </div>`;

  /* ---- Ilm + asukoht + režiim — ÜKS kaart ---- */
  const weatherLocCard = `
    <div class="card" style="border-radius:var(--r-lg);display:flex;flex-direction:column;gap:11px;">
      ${renderWeatherInner()}
      <div style="height:1px;background:var(--track);"></div>
      <div>
        <div style="font:600 8.5px/1 var(--font);letter-spacing:0.6px;color:var(--text-3);text-transform:uppercase;margin-bottom:7px;">Asukoht</div>
        <div class="plan-selector">${planBtns}</div>
      </div>
      <div style="height:1px;background:var(--track);"></div>
      <div>
        <div style="font:600 8.5px/1 var(--font);letter-spacing:0.6px;color:var(--text-3);text-transform:uppercase;margin-bottom:7px;">Režiim</div>
        ${modeSeg}
      </div>
    </div>`;

  /* ---- BMX režiimi vaade ---- */
  if (trennMode === 'bmx') {
    return `
      ${titleBlock}
      ${renderWeekSchedule()}
      ${weatherLocCard}
      ${renderBmxWidget()}
      ${renderAnabolicWindowCard()}`;
  }

  return `
    ${titleBlock}
    ${renderWeekSchedule()}
    ${STATE.bmxActive ? renderBmxWidget() : ''}
    ${weatherLocCard}
    <div class="training-toggle">${toggleBtns}</div>
    ${renderPhaseIndicator()}
    ${weekEndHint}
    ${renderAnabolicWindowCard()}
    ${deloadBanner}
    ${renderWarmupCard(curT)}
    <div style="font:500 11px/1.5 var(--font-mono);color:var(--text-3);margin-bottom:var(--sp-sm);padding:0 2px;">
      ${exercises.length} harjutust · ~${dur} min${loc ? ` · ${loc}` : ''}
      ${weekCfg ? ` · ${weekCfg.sets} seeriat` : ''}
    </div>
    ${exSlotsHtml}
    ${isComingSoon ? '' : `

    <!-- Smoothie expand-kaart -->
    <div style="background:var(--bg-2,var(--bg));border:1px solid var(--border);border-radius:var(--r-md);margin-bottom:var(--sp-sm);overflow:hidden;">
      <div onclick="STATE.showSmoothie=!STATE.showSmoothie;renderTab('trenn')"
           style="display:flex;align-items:center;justify-content:space-between;padding:10px 12px;cursor:pointer;">
        <div style="display:flex;align-items:center;gap:8px;">
          <span style="font-size:14px;">🥤</span>
          <div>
            <div style="font-size:13px;font-weight:700;">Kiire ~1000 kcal smoothie</div>
            <div style="font-size:11px;color:var(--text-2);">Hardgaineri hädaolukord — 5 min, 45g+ valku</div>
          </div>
        </div>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
             style="transition:transform 0.2s;transform:rotate(${STATE.showSmoothie?'180':'0'}deg)">
          <polyline points="6 9 12 15 18 9"/>
        </svg>
      </div>
      ${STATE.showSmoothie ? `<div style="padding:0 12px 12px;font-size:12px;">
        <div style="color:var(--text-2);margin-bottom:8px;">Kõik blenderisse, 1 min — valmis:</div>
        <div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:0.5px solid var(--border);"><span>🥛 Täispiim 500ml</span><span style="font-weight:600;color:var(--accent);">~310 kcal · 17g V</span></div>
        <div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:0.5px solid var(--border);"><span>🥚 Munad × 3</span><span style="font-weight:600;color:var(--accent);">~210 kcal · 18g V</span></div>
        <div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:0.5px solid var(--border);"><span>🍌 Banaan × 2</span><span style="font-weight:600;color:var(--accent);">~180 kcal · 2g V</span></div>
        <div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:0.5px solid var(--border);"><span>🥜 Maapähklivõi 2 spl</span><span style="font-weight:600;color:var(--accent);">~190 kcal · 8g V</span></div>
        <div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:0.5px solid var(--border);"><span>🍯 Mesi 1 spl</span><span style="font-weight:600;color:var(--accent);">~60 kcal</span></div>
        <div style="display:flex;justify-content:space-between;padding:6px 0;font-weight:700;font-size:13px;"><span>Kokku</span><span style="color:var(--green);">~950 kcal · 45g V</span></div>
        <div style="color:var(--text-3);margin-top:4px;">+ vadakupulber 30g → +120 kcal, +25g V → kokku ~1070 kcal</div>
      </div>` : ''}
    </div>

    <div style="padding: var(--sp-sm) 0 var(--sp-md);">
      <button onclick="markTrainingDone()" style="
        width:100%; padding:14px; border:none; border-radius:var(--r-md);
        background:${todayDone ? 'var(--green)' : 'var(--accent)'};
        color:white; font-size:15px; font-weight:700; cursor:pointer;
        opacity:${todayDone ? '0.75' : '1'};
      ">${todayDone ? '✓ Treening tehtud!' : '✓ Märgi treening tehtuks'}</button>
    </div>`}`;
}

/* Tulemas placeholder */
function renderTulemas(icon, title, desc) {
  return `
    <div class="tulemas">
      <div class="tulemas-icon">${icon}</div>
      <h3>${title}</h3>
      <p>${desc}</p>
      <div class="badge" style="margin-top:var(--sp-sm);">Tulemas</div>
    </div>`;
}

/* ============================================================
   INIT
============================================================ */
async function init() {
  log(`App käivitus v${APP_VERSION}`);
  document.getElementById('version-label').textContent = `v${APP_VERSION}`;

  /* Firebase käivitus */
  fbInit();

  /* Oota window.cowork — ⚠ teadaolev timeout probleem */
  await waitForCowork(10000);

  /* Lae kõik andmefailid korraga */
  [STATE.user, STATE.shopping, STATE.prices, STATE.nutrition, STATE.recipes,
   STATE.exercises, STATE.trainingPlan, STATE.btbPhaseData, STATE.custom_recipes, STATE.supplements, STATE.analysis] = await Promise.all([
    getData('user.json'),
    getData('shopping.json'),
    getData('prices.json'),
    getData('nutrition.json'),
    getData('recipes.json'),
    getData('exercises.json'),
    getData('training-plan.json'),
    getData('btb-phases.json'),
    getData('custom_recipes.json'),
    getData('supplements.json'),
    getData('analysis.json')
  ]);

  if (STATE.user) {
    const savedClass = lsGet('budget_class');
    if (savedClass) STATE.user.budget_class = savedClass;
    updateBudgetUI(STATE.user.budget_class);
    log(`Kasutaja laetud: ${STATE.user.name}, ${STATE.user.weight_kg}kg`, 'dbg-ok');
  } else {
    log('user.json ei leitud', 'dbg-err');
  }

  if (STATE.shopping) {
    log(`shopping.json laetud: ${STATE.shopping.products.length} toodet`, 'dbg-ok');
  } else {
    log('shopping.json ei leitud', 'dbg-err');
  }

  if (STATE.prices) {
    const n = Object.keys(STATE.prices.products ?? {}).length;
    log(`prices.json laetud: ${n} toodet, uuendatud ${STATE.prices.updated}`, 'dbg-ok');
  } else {
    log('prices.json ei leitud', 'dbg-warn');
  }

  if (STATE.nutrition) {
    const sn = STATE.nutrition.slots?.length ?? 0;
    log(`nutrition.json laetud: ${sn} slotti`, 'dbg-ok');
  } else {
    log('nutrition.json ei leitud', 'dbg-err');
  }

  if (STATE.recipes) {
    const mn = Object.keys(STATE.recipes.methods ?? {}).length;
    log(`recipes.json laetud: ${mn} meetodit, ${STATE.recipes.emergency_calories?.length ?? 0} hädaolukorra varianti`, 'dbg-ok');
  } else {
    log('recipes.json ei leitud', 'dbg-err');
  }

  if (STATE.exercises) {
    const en = Object.keys(STATE.exercises.exercises ?? {}).length;
    log(`exercises.json laetud: ${en} harjutust`, 'dbg-ok');
  } else {
    log('exercises.json ei leitud', 'dbg-err');
  }

  if (STATE.trainingPlan) {
    const pn = Object.keys(STATE.trainingPlan.plans ?? {}).length;
    // Loe localStorage-ist aktiveeritud plaan ja treening, või kasuta vaikimisi
    STATE.activePlan = lsGet('active_plan') ?? STATE.trainingPlan.active_plan ?? 'B';
    STATE.currentTraining = lsGet('current_training') ?? 'A';
    log(`training-plan.json laetud: ${pn} plaani, aktiveeritud: ${STATE.activePlan}`, 'dbg-ok');
  } else {
    log('training-plan.json ei leitud', 'dbg-err');
  }

  // BtB faas + nädal localStorage-ist
  STATE.btbPhase     = lsGet('btb_phase')      ?? 1;
  STATE.btbWeek      = lsGet('btb_week')        ?? 1;
  STATE.btbStartDate = lsGet('btb_start_date')  ?? null;
  // Auto-arvuta nädal kuupäeva põhjal
  if (STATE.btbStartDate) {
    const start    = new Date(STATE.btbStartDate);
    const daysDiff = Math.floor((Date.now() - start.getTime()) / 86400000);
    const weekCalc = Math.floor(daysDiff / 7) + 1;
    const phase    = STATE.btbPhaseData?.phases?.[String(STATE.btbPhase)];
    if (phase && !phase.coming_soon) {
      const maxWeeks = phase.weeks ?? 5;
      if (weekCalc > maxWeeks && STATE.btbPhase < 4) {
        // Faas lõppenud — jää faasi lõppu, kasutaja saab edasi liikuda
        STATE.btbWeek = maxWeeks;
      } else {
        STATE.btbWeek = Math.min(weekCalc, maxWeeks);
      }
      lsSet('btb_week', STATE.btbWeek);
    }
  }
  if (STATE.btbPhaseData) {
    log(`btb-phases.json laetud: Faas ${STATE.btbPhase}, Nädal ${STATE.btbWeek}`, 'dbg-ok');
  }

  // BMX mode — taasta sessioon kui oli aktiivne
  STATE.bmxActive    = lsGet('bmx_active') ?? false;
  STATE.bmxStartTime = lsGet('bmx_start')  ?? null;

  // Ilmaprognoos — async, ei blokeeri laadimist
  fetchWeather().then(data => {
    if (data) {
      STATE.weatherData = data;
      if (STATE.currentTab === 'trenn') renderTab('trenn');
      if (STATE.currentTab === 'kodu') renderTab('kodu');
    }
  });

  updateDayStats();
  renderTab(STATE.currentTab);
  refreshDebug();

  /* Backup: lae handle sessioonisse (ei küsi luba automaatselt) */
  loadDirHandle().then(dir => {
    if (dir) { log('Varundus aktiivne → ' + dir.name, 'dbg-ok'); }
    else { log('Varundus: kaust valimata (Mina tab → 💾)', 'dbg-warn'); }
  });
}

init();

// ── SERVICE WORKER (PWA) ──────────────────────────────────────
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./service-worker.js')
      .catch(err => console.warn('SW register failed:', err));
  });
}
</script>
</body>
</html>
