<!DOCTYPE html>
<html lang="et">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Trenn & Toitumine</title>
  <link rel="manifest" href="manifest.json">
  <!-- Firebase SDK (v0.9.0) -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <!-- Google Identity Services (v0.9.5.4 — mobiili login) -->
  <script src="https://accounts.google.com/gsi/client" async></script>
  <meta name="theme-color" content="#2563eb">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="T&amp;T">
  <!-- Quiet Data fondid (v0.9.3.0) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    /* ============================================================
       DESIGN TOKENS
       Kõik visuaalsed väärtused on siin — muuda ainult siin.
    ============================================================ */
    :root {
      /* Quiet Data (v0.9.3.0) — soe kreem taust, valged kaardid, sinine aktsent */
      --bg:           #F8F4ED;
      --surface:      #FFFFFF;
      --border:       #ECE4D5;
      --border-strong:#DDD2BE;

      --text-1:       #211E18;
      --text-2:       #6B6457;
      --text-3:       #9A917F;

      --accent:       #2563eb;
      --accent-bg:    #EAF0FE;

      /* Tume kontrastkaart */
      --dark:         #211E18;
      --dark-2:       #332F27;
      --dark-text-2:  #9A9080;

      /* Graafikute gradient (punane→kollane→roheline) — SÄILIB */
      --green:        #4C9A6A;
      --amber:        #E0A83D;
      --red:          #D9483B;

      --track:        #F0E9DB;
      --chip:         #F3F1EC;
      --shadow:       0 1px 2px rgba(40,30,10,.04);

      --r-sm:   8px;
      --r-md:   14px;
      --r-lg:   18px;

      --nav-h:  64px;
      --hdr-h:  56px;

      --font:      'Space Grotesk', -apple-system, BlinkMacSystemFont, sans-serif;
      --font-mono: 'JetBrains Mono', ui-monospace, SFMono-Regular, monospace;

      --sp-xs: 4px;
      --sp-sm: 8px;
      --sp-md: 16px;
      --sp-lg: 24px;
      --sp-xl: 40px;
    }

    /* Quiet Data reegel: kõik numbrid mono-fondis */
    .mono { font-family: var(--font-mono); }

    /* ============================================================
       RESET
    ============================================================ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      font-family: var(--font);
      background: var(--bg);
      color: var(--text-1);
      font-size: 15px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    button { font-family: var(--font); cursor: pointer; }

    /* ============================================================
       LAYOUT
    ============================================================ */
    #app {
      display: flex;
      flex-direction: column;
      height: 100%;
      max-width: 480px;
      margin: 0 auto;
    }

    /* Header */
    #hdr {
      background: var(--surface);
      border-bottom: 0.5px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: var(--sp-sm) var(--sp-md) 8px;
      position: sticky;
      top: 0;
      z-index: 10;
      flex-shrink: 0;
    }
    #hdr-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      min-height: 36px;
    }
    #hdr-title { font-size: 17px; font-weight: 700; letter-spacing: -0.3px; }

    /* Päeva statsid */
    #hdr-stats {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 6px;
      flex-wrap: nowrap;
      overflow: hidden;
    }
    .hdr-stat {
      display: flex;
      align-items: center;
      gap: 3px;
      font-size: 11px;
      color: var(--text-2);
      white-space: nowrap;
    }
    .hdr-stat svg   { width: 11px; height: 11px; flex-shrink: 0; }
    .hdr-sep        { color: var(--text-3); font-size: 11px; }
    .stat-pct       { font-family: var(--font-mono); font-weight: 700; color: var(--text-1); }
    .stat-pct.done  { color: var(--green); }
    .stat-pct.part  { color: var(--amber); }
    .stat-done      { font-weight: 600; color: var(--green); }
    .stat-wait      { color: var(--text-2); }

    #budget-btn {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      border: 0.5px solid var(--border);
      border-radius: var(--r-sm);
      padding: 5px 10px;
      background: var(--surface);
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      flex-shrink: 0;
    }
    #budget-btn:active { background: var(--accent-bg); }
    #budget-name  { font-size: 13px; font-weight: 600; color: var(--text-1); }
    #budget-range { font-family: var(--font-mono); font-size: 11px; color: var(--text-2); margin-top: 1px; }

    /* Content */
    #content {
      flex: 1;
      overflow-y: auto;
      padding: var(--sp-md);
      padding-bottom: calc(var(--nav-h) + var(--sp-md));
    }

    /* Bottom nav */
    #nav {
      height: var(--nav-h);
      background: var(--surface);
      border-top: 0.5px solid var(--border);
      display: flex;
      align-items: stretch;
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 480px;
      z-index: 10;
    }

    .nav-btn {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3px;
      border: none;
      background: none;
      color: var(--text-3);
      transition: color 0.15s;
      -webkit-tap-highlight-color: transparent;
      padding: 0;
    }
    .nav-btn.active { color: var(--accent); }
    .nav-btn.active .nav-label { font-weight: 600; }
    .nav-btn svg    { width: 22px; height: 22px; }
    .nav-label      { font-size: 10px; font-weight: 500; }

    /* ============================================================
       KAARDID
    ============================================================ */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r-md);
      padding: var(--sp-md);
      margin-bottom: 12px;
      box-shadow: var(--shadow);
    }

    .card-title {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-3);
      text-transform: uppercase;
      letter-spacing: 0.6px;
      margin-bottom: var(--sp-sm);
    }

    /* Tume kontrastkaart (Quiet Data) */
    .card-dark {
      background: var(--dark);
      color: #fff;
      border: none;
      border-radius: var(--r-lg);
      padding: var(--sp-md);
      margin-bottom: 12px;
      box-shadow: var(--shadow), 0 10px 26px rgba(40,30,10,.05);
    }
    .card-dark .card-title { color: var(--dark-text-2); }

    /* Metric kaardid */
    .metrics {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: var(--sp-sm);
      margin-bottom: var(--sp-sm);
    }

    .metric {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r-md);
      padding: var(--sp-sm) var(--sp-md);
      text-align: center;
      box-shadow: var(--shadow);
    }
    .metric-val   { font-family: var(--font-mono); font-size: 22px; font-weight: 700; letter-spacing: -0.5px; line-height: 1.2; }
    .metric-label { font-size: 11px; color: var(--text-2); margin-top: 2px; }

    /* Nimekirjaread */
    .row {
      display: flex;
      align-items: center;
      padding: var(--sp-sm) 0;
      border-bottom: 0.5px solid var(--border);
    }
    .row:last-child { border-bottom: none; padding-bottom: 0; }
    .row-main       { flex: 1; min-width: 0; }
    .row-actions    { display: flex; gap: var(--sp-sm); flex-shrink: 0; }

    .row-name  { font-weight: 500; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .row-meta  { font-size: 12px; color: var(--text-2); margin-top: 1px; }

    /* Section label */
    .section-label {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-2);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: var(--sp-md) 0 var(--sp-xs);
    }

    /* Progress bar */
    .progress {
      height: 8px;
      background: var(--track);
      border-radius: 5px;
      overflow: hidden;
      margin-top: var(--sp-xs);
    }
    .progress-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 5px;
      transition: width 0.4s ease;
    }

    /* Nupud */
    .btn-primary {
      width: 100%;
      padding: 14px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: var(--r-md);
      font-size: 15px;
      font-weight: 600;
      margin-top: var(--sp-sm);
    }
    .btn-primary:active { opacity: 0.75; }

    .btn-icon {
      width: 32px;
      height: 32px;
      border: 0.5px solid var(--border);
      border-radius: var(--r-sm);
      background: var(--surface);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      color: var(--text-2);
    }

    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
      border: 0.5px solid var(--border);
      background: var(--accent-bg);
      color: var(--text-2);
    }

    /* ============================================================
       TAB 2 — TOITUMISKAVA
    ============================================================ */

    /* Päeva selector */
    .day-selector {
      display: flex;
      gap: 4px;
      margin-bottom: var(--sp-sm);
      overflow-x: auto;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
      padding-bottom: 2px;
    }
    .day-selector::-webkit-scrollbar { display: none; }

    .day-btn {
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 6px 10px;
      border: 0.5px solid var(--border);
      border-radius: var(--r-sm);
      background: var(--surface);
      color: var(--text-2);
      font-size: 11px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .day-btn.active {
      background: var(--dark);
      color: white;
      border-color: var(--dark);
    }
    .day-btn.has-log { border-color: var(--green); }
    .day-btn .day-name { font-weight: 600; font-size: 12px; }
    .day-btn .day-num  { font-family: var(--font-mono); font-size: 10px; margin-top: 1px; }

    /* Kalorite progress riba */
    .kcal-progress-bar {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r-lg);
      padding: var(--sp-md);
      margin-bottom: var(--sp-sm);
      box-shadow: var(--shadow), 0 10px 26px rgba(40,30,10,.05);
    }
    .kcal-bar-top {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 6px;
    }
    .kcal-bar-eaten { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; }
    .kcal-bar-target { font-size: 12px; color: var(--text-2); }
    .kcal-bar-macros {
      display: flex;
      gap: var(--sp-md);
      margin-top: 6px;
      font-size: 11px;
      color: var(--text-2);
    }
    .kcal-bar-macro span { font-weight: 600; color: var(--text-1); }

    /* Söögisloti kaart */
    .meal-slot {
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: var(--r-md);
      margin-bottom: var(--sp-sm);
      overflow: hidden;
    }
    .meal-slot.eaten  { border-color: var(--green); }
    .meal-slot.skipped { border-color: var(--border); opacity: 0.6; }
    .meal-slot-header {
      display: flex;
      align-items: center;
      padding: var(--sp-sm) var(--sp-md);
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .meal-time {
      font-size: 11px;
      color: var(--text-3);
      min-width: 36px;
      flex-shrink: 0;
    }
    .meal-emoji { font-size: 18px; margin: 0 8px; flex-shrink: 0; }
    .meal-info  { flex: 1; min-width: 0; }
    .meal-name  { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .meal-desc  { font-size: 11px; color: var(--text-2); margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .meal-kcal  { font-size: 12px; font-weight: 600; color: var(--text-2); flex-shrink: 0; margin-left: 8px; }
    .meal-status-icon { font-size: 16px; margin-left: 6px; flex-shrink: 0; }

    /* Söögisloti laiendus */
    .meal-expand {
      border-top: 0.5px solid var(--border);
      padding: var(--sp-sm) var(--sp-md);
    }
    .meal-actions {
      display: flex;
      gap: var(--sp-sm);
      margin-bottom: var(--sp-sm);
    }
    .btn-eaten, .btn-skipped {
      flex: 1;
      padding: 10px;
      border-radius: var(--r-sm);
      font-size: 13px;
      font-weight: 600;
      border: 0.5px solid var(--border);
      background: var(--surface);
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-eaten.active  { background: var(--green); color: white; border-color: var(--green); }
    .btn-skipped.active { background: var(--accent-bg); color: var(--text-2); border-color: var(--border-strong); }

    /* Retsepti detailvaade */
    .recipe-section {
      background: var(--bg);
      border-radius: var(--r-sm);
      padding: var(--sp-sm);
    }
    .recipe-title { font-size: 11px; font-weight: 600; color: var(--text-2); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
    .recipe-step  { font-size: 12px; color: var(--text-1); padding: 3px 0; display: flex; gap: 6px; }
    .recipe-step-num { color: var(--text-3); min-width: 16px; flex-shrink: 0; }
    .recipe-meta { font-size: 11px; color: var(--text-2); margin-top: 4px; padding-top: 4px; border-top: 0.5px solid var(--border); }
    .recipe-badge-row { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 4px; }

    /* Vee jälgija */
    .water-tracker {
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: var(--r-md);
      padding: var(--sp-sm) var(--sp-md);
      margin-bottom: var(--sp-sm);
    }
    .water-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 6px;
    }
    .water-label { font-size: 12px; font-weight: 600; color: var(--text-2); text-transform: uppercase; letter-spacing: 0.5px; }
    .water-amount { font-size: 16px; font-weight: 700; }
    .water-btns { display: flex; gap: 4px; margin-top: 6px; flex-wrap: wrap; }
    .water-btn {
      flex: 1;
      min-width: 60px;
      padding: 7px 8px;
      border: 0.5px solid var(--border);
      border-radius: var(--r-sm);
      background: var(--surface);
      font-size: 12px;
      font-weight: 600;
      color: var(--text-2);
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .water-btn:active { background: var(--accent-bg); }
    .water-btn-minus {
      color: var(--text-3);
      font-size: 11px;
      padding: 5px 8px;
      opacity: 0.75;
    }
    .water-btn-minus:active { background: var(--surface); opacity: 1; }
    .coffee-section {
      border-top: 0.5px solid var(--border);
      margin-top: 10px;
      padding-top: 10px;
    }
    .coffee-counter {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .coffee-count-btn {
      width: 28px;
      height: 28px;
      border: 0.5px solid var(--border);
      border-radius: var(--r-sm);
      background: var(--surface);
      font-size: 16px;
      font-weight: 700;
      color: var(--text-2);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-tap-highlight-color: transparent;
    }
    .coffee-count-num { font-size: 16px; font-weight: 700; min-width: 24px; text-align: center; }

    /* Käsitsi toidu sisestamine */
    .custom-meal-row {
      display: flex;
      align-items: center;
      padding: var(--sp-sm) var(--sp-md);
      border-bottom: 0.5px solid var(--border);
    }
    .custom-meal-row:last-child { border-bottom: none; }
    .custom-meal-info { flex: 1; min-width: 0; }
    .custom-meal-name { font-size: 14px; font-weight: 500; }
    .custom-meal-meta { font-size: 11px; color: var(--text-2); margin-top: 1px; }
    .custom-meal-kcal { font-size: 13px; font-weight: 600; color: var(--text-2); margin-left: 8px; flex-shrink: 0; }
    .btn-delete-custom {
      width: 28px; height: 28px;
      border: none; background: none;
      color: var(--text-3); font-size: 16px;
      cursor: pointer; flex-shrink: 0; margin-left: 4px;
      display: flex; align-items: center; justify-content: center;
    }
    .btn-delete-custom:active { color: var(--red); }
    .btn-edit-custom {
      width: 28px; height: 28px;
      border: none; background: none;
      color: var(--text-3); font-size: 14px;
      cursor: pointer; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
    }
    .btn-edit-custom:active { color: var(--accent); }
    .weight-history-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 0; border-bottom: 0.5px solid var(--border);
    }
    .weight-history-row:last-child { border-bottom: none; }

    .custom-add-form {
      background: var(--bg);
      border-radius: var(--r-sm);
      padding: var(--sp-sm);
      margin: var(--sp-sm) var(--sp-md);
    }
    .custom-add-inputs {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: var(--sp-sm);
      margin-bottom: var(--sp-sm);
    }
    .custom-add-macros {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: var(--sp-sm);
      margin-bottom: var(--sp-sm);
    }
    .custom-input-group label {
      display: block; font-size: 10px; color: var(--text-2); margin-bottom: 2px;
    }
    .custom-input-group input {
      width: 100%; padding: 7px 8px;
      border: 0.5px solid var(--border); border-radius: var(--r-sm);
      font-size: 14px; font-family: var(--font);
      background: var(--surface); color: var(--text-1);
      -webkit-appearance: none;
    }
    .custom-input-group input:focus { outline: none; border-color: var(--accent); }
    .custom-form-btns { display: flex; gap: var(--sp-sm); }
    .btn-custom-save {
      flex: 1; padding: 9px;
      background: var(--accent); color: white;
      border: none; border-radius: var(--r-sm);
      font-size: 13px; font-weight: 600; cursor: pointer;
    }
    .btn-custom-cancel {
      padding: 9px 14px;
      background: none; color: var(--text-2);
      border: 0.5px solid var(--border); border-radius: var(--r-sm);
      font-size: 13px; cursor: pointer;
    }

    /* Open Food Facts otsingutulemused */
    .off-search-row {
      display: flex; gap: var(--sp-sm);
      margin-bottom: var(--sp-sm);
    }
    .off-search-row input[type="text"] {
      flex: 1; padding: 7px 8px;
      border: 0.5px solid var(--border); border-radius: var(--r-sm);
      font-size: 14px; font-family: var(--font);
      background: var(--surface); color: var(--text-1);
      -webkit-appearance: none;
    }
    .off-search-row input[type="number"] {
      width: 62px; padding: 7px 6px;
      border: 0.5px solid var(--border); border-radius: var(--r-sm);
      font-size: 14px; font-family: var(--font); text-align: center;
      background: var(--surface); color: var(--text-1);
      -webkit-appearance: none;
    }
    .btn-off-search {
      padding: 7px 12px;
      background: var(--accent); color: white;
      border: none; border-radius: var(--r-sm);
      font-size: 13px; font-weight: 600; cursor: pointer;
      white-space: nowrap; flex-shrink: 0;
    }
    .btn-off-search:disabled { opacity: 0.5; cursor: default; }
    .off-results {
      margin-bottom: var(--sp-sm);
      border: 0.5px solid var(--border);
      border-radius: var(--r-sm);
      overflow: hidden;
    }
    .off-result-row {
      display: flex; align-items: center;
      padding: 8px 10px; gap: 8px;
      background: var(--surface);
      border-bottom: 0.5px solid var(--border);
      cursor: pointer;
    }
    .off-result-row:last-child { border-bottom: none; }
    .off-result-row:active { background: var(--accent-bg); }
    .off-result-name { flex: 1; font-size: 13px; font-weight: 500; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .off-result-kcal { font-size: 12px; color: var(--text-2); flex-shrink: 0; }
    .off-result-arrow { font-size: 14px; color: var(--text-3); flex-shrink: 0; }
    .off-status { font-size: 12px; color: var(--text-2); padding: 6px 0; text-align: center; }

    /* Barkoodiskänner */
    .btn-barcode-scan {
      display: flex; align-items: center; gap: 6px;
      width: 100%; padding: 8px 10px;
      background: none; border: 0.5px dashed var(--border);
      border-radius: var(--r-sm); margin-bottom: var(--sp-sm);
      font-size: 13px; color: var(--text-2); cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-barcode-scan:active { border-color: var(--accent); color: var(--accent); }
    .barcode-or-divider {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: var(--sp-sm); color: var(--text-3); font-size: 11px;
    }
    .barcode-or-divider::before, .barcode-or-divider::after {
      content: ''; flex: 1; height: 0.5px; background: var(--border);
    }
    #barcode-overlay {
      position: fixed; inset: 0; z-index: 9000;
      background: rgba(0,0,0,0.88);
      display: flex; align-items: center; justify-content: center;
    }
    .barcode-modal {
      background: var(--bg); border-radius: var(--r-md);
      width: min(92vw, 400px); overflow: hidden;
      display: flex; flex-direction: column;
    }
    .barcode-header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 12px var(--sp-md);
      border-bottom: 0.5px solid var(--border);
      font-size: 14px; font-weight: 600;
    }
    .barcode-close-btn {
      background: none; border: none; font-size: 20px;
      cursor: pointer; color: var(--text-2); line-height: 1;
    }
    .barcode-viewport {
      position: relative; aspect-ratio: 4/3;
      background: #000; overflow: hidden;
    }
    #barcode-video { width: 100%; height: 100%; object-fit: cover; display: block; }
    .barcode-guide {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      pointer-events: none;
    }
    .barcode-guide-inner {
      width: 72%; border: 2px solid rgba(255,255,255,0.6);
      border-radius: 6px; aspect-ratio: 3/1;
      position: relative; overflow: hidden;
    }
    .barcode-scan-line {
      position: absolute; left: 0; right: 0; height: 2px;
      background: var(--accent);
      box-shadow: 0 0 8px var(--accent);
      animation: barcode-scan 1.6s ease-in-out infinite alternate;
    }
    @keyframes barcode-scan {
      from { top: 10%; } to { top: 85%; }
    }
    .barcode-status {
      padding: 10px var(--sp-md);
      font-size: 13px; color: var(--text-2); text-align: center;
    }
    .btn-ean-manual-fallback {
      margin: 0 var(--sp-md) var(--sp-md);
      background: none; border: 0.5px solid var(--border);
      border-radius: var(--r-sm); padding: 9px;
      font-size: 12px; color: var(--text-2); cursor: pointer; width: calc(100% - 32px);
    }
    .ean-manual-row {
      display: flex; gap: 8px; align-items: center; margin-bottom: 6px;
    }
    .ean-manual-row input {
      flex: 1; padding: 8px; border: 0.5px solid var(--border);
      border-radius: var(--r-sm); font-size: 13px;
      background: var(--surface); color: var(--text-1);
      font-family: var(--font); -webkit-appearance: none;
    }
    .ean-manual-row input:focus { outline: none; border-color: var(--accent); }
    .ean-manual-row button {
      padding: 8px 12px; background: var(--accent);
      color: white; border: none; border-radius: var(--r-sm);
      font-size: 13px; font-weight: 600; cursor: pointer; flex-shrink: 0;
    }

    /* Edamam retseptisoovitused */
    .recipe-suggestions { margin-top: var(--sp-sm); }
    .recipe-suggestions-title {
      font-size: 15px; font-weight: 700;
      padding: var(--sp-sm) var(--sp-md);
      border-bottom: 0.5px solid var(--border);
      display: flex; align-items: center; gap: 6px;
    }
    .recipe-card {
      display: flex; gap: 10px;
      padding: var(--sp-sm) var(--sp-md);
      border-bottom: 0.5px solid var(--border);
    }
    .recipe-card:last-child { border-bottom: none; }
    .recipe-card-img {
      width: 60px; height: 60px;
      border-radius: var(--r-sm);
      object-fit: cover; flex-shrink: 0;
      background: var(--bg);
    }
    .recipe-card-body { flex: 1; min-width: 0; }
    .recipe-card-name {
      font-size: 14px; font-weight: 600;
      overflow: hidden; text-overflow: ellipsis;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
      line-height: 1.3; margin-bottom: 4px;
    }
    .recipe-card-meta { font-size: 11px; color: var(--text-2); }
    .recipe-card-link {
      display: inline-block; margin-top: 5px;
      font-size: 12px; color: var(--accent); text-decoration: none;
      font-weight: 600;
    }
    .recipe-api-setup {
      padding: var(--sp-md);
      text-align: center;
    }
    .recipe-api-setup p { font-size: 13px; color: var(--text-2); margin-bottom: var(--sp-sm); }
    .recipe-loading { padding: var(--sp-md); text-align: center; font-size: 13px; color: var(--text-2); }

    /* API seaded Tab 5 */
    .api-settings-form { padding: var(--sp-sm) var(--sp-md) var(--sp-md); }
    .api-input-group { margin-bottom: var(--sp-sm); }
    .api-input-group label { display: block; font-size: 11px; color: var(--text-2); margin-bottom: 3px; }
    .api-input-group input {
      width: 100%; padding: 8px 10px;
      border: 0.5px solid var(--border); border-radius: var(--r-sm);
      font-size: 13px; font-family: var(--font);
      background: var(--surface); color: var(--text-1);
      -webkit-appearance: none;
    }
    .api-input-group input:focus { outline: none; border-color: var(--accent); }
    .api-save-row { display: flex; gap: var(--sp-sm); align-items: center; margin-top: var(--sp-sm); }
    .btn-api-save {
      padding: 9px 16px;
      background: var(--accent); color: white;
      border: none; border-radius: var(--r-sm);
      font-size: 13px; font-weight: 600; cursor: pointer;
    }
    .api-save-hint { font-size: 11px; color: var(--text-3); }

    /* Hädaolukorra kalorid overlay */
    #emergency-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 50;
      align-items: flex-end;
    }
    #emergency-overlay.open { display: flex; }
    #emergency-panel {
      background: var(--surface);
      border-radius: var(--r-lg) var(--r-lg) 0 0;
      padding: var(--sp-lg) var(--sp-md) calc(var(--nav-h) + var(--sp-md));
      width: 100%;
      max-width: 480px;
      margin: 0 auto;
      max-height: 80vh;
      overflow-y: auto;
    }
    .emergency-title { font-size: 17px; font-weight: 700; margin-bottom: 4px; }
    .emergency-sub   { font-size: 13px; color: var(--text-2); margin-bottom: var(--sp-md); }
    .emergency-row {
      display: flex;
      align-items: center;
      padding: var(--sp-sm) 0;
      border-bottom: 0.5px solid var(--border);
    }
    .emergency-row:last-child { border-bottom: none; }
    .emergency-info { flex: 1; }
    .emergency-name { font-size: 14px; font-weight: 600; }
    .emergency-desc { font-size: 12px; color: var(--text-2); margin-top: 1px; }
    .emergency-right { text-align: right; flex-shrink: 0; margin-left: 8px; }
    .emergency-kcal { font-size: 14px; font-weight: 700; }
    .emergency-time { font-size: 11px; color: var(--text-3); }
    .btn-add-emergency {
      padding: 8px 14px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: var(--r-sm);
      font-size: 12px;
      font-weight: 600;
      margin-left: 8px;
      cursor: pointer;
      white-space: nowrap;
    }

    /* ============================================================
       TAB 3 — TRENNIKAVA
    ============================================================ */

    /* Plan selector */
    .plan-selector {
      display: flex;
      gap: 3px;
      background: var(--chip);
      border-radius: 12px;
      padding: 3px;
      margin-bottom: 0;
    }
    .plan-btn {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 8px 4px 7px;
      border: none;
      border-radius: 9px;
      background: transparent;
      color: var(--text-2);
      font-size: 10px;
      font-weight: 600;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      line-height: 1.3;
    }
    .plan-btn.active {
      background: var(--accent);
      color: white;
      box-shadow: 0 1px 3px rgba(37,99,235,.3);
    }
    .plan-btn-emoji { font-size: 18px; margin-bottom: 2px; }
    .plan-btn-name  { font-size: 11px; font-weight: 700; }
    .plan-btn-loc   { font-size: 9px; opacity: 0.75; }

    /* Treening A/B toggle */
    .training-toggle {
      display: flex;
      gap: 8px;
      margin-bottom: var(--sp-sm);
    }
    .training-toggle-btn {
      flex: 1;
      padding: 11px 9px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: var(--surface);
      font-size: 13px;
      font-weight: 600;
      color: var(--text-2);
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      text-align: center;
      box-shadow: var(--shadow);
    }
    .training-toggle-btn.active {
      background: var(--dark);
      color: #fff;
      border-color: var(--dark);
    }

    /* Exercise slot */
    .exercise-slot {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r-md);
      margin-bottom: 8px;
      overflow: hidden;
      box-shadow: var(--shadow);
    }
    .exercise-slot.done-slot { border-color: var(--green); }
    .exercise-slot-header {
      display: flex;
      align-items: center;
      padding: 10px var(--sp-md);
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      gap: var(--sp-sm);
    }
    .exercise-num {
      font-family: var(--font-mono);
      font-size: 10px;
      font-weight: 700;
      color: var(--text-3);
      min-width: 18px;
      flex-shrink: 0;
    }
    .exercise-info { flex: 1; min-width: 0; }
    .exercise-name {
      font-size: 14px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .exercise-meta {
      font-size: 11px;
      color: var(--text-2);
      margin-top: 1px;
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }
    .exercise-sets-badge {
      font-size: 11px;
      font-weight: 700;
      color: var(--text-2);
      white-space: nowrap;
      flex-shrink: 0;
    }
    .exercise-weight-badge {
      font-family: var(--font-mono);
      font-size: 12px;
      font-weight: 700;
      color: var(--text-1);
      background: var(--chip);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 3px 8px;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .exercise-progress-badge {
      font-size: 10px;
      font-weight: 700;
      color: var(--green);
      background: rgba(34,197,94,0.1);
      border: 0.5px solid var(--green);
      border-radius: 10px;
      padding: 1px 7px;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .exercise-warning-badge {
      font-size: 10px;
      font-weight: 700;
      color: var(--amber);
      background: rgba(245,158,11,0.1);
      border: 0.5px solid var(--amber);
      border-radius: 10px;
      padding: 1px 7px;
      flex-shrink: 0;
    }
    .exercise-chevron {
      color: var(--text-3);
      font-size: 12px;
      flex-shrink: 0;
      transition: transform 0.2s;
    }
    .exercise-chevron.open { transform: rotate(90deg); }

    /* Exercise expand */
    .exercise-expand {
      border-top: 0.5px solid var(--border);
      padding: var(--sp-sm) var(--sp-md) var(--sp-md);
    }

    /* Warning banner */
    .exercise-warning-banner {
      background: rgba(245,158,11,0.08);
      border: 0.5px solid var(--amber);
      border-radius: var(--r-sm);
      padding: 8px 10px;
      margin-bottom: var(--sp-sm);
      font-size: 12px;
      color: #92400E;
      line-height: 1.5;
    }

    /* Log form */
    .log-form {
      background: var(--bg);
      border-radius: var(--r-sm);
      padding: var(--sp-sm);
      margin-bottom: var(--sp-sm);
    }
    .log-form-title {
      font-size: 10px;
      font-weight: 700;
      color: var(--text-2);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }
    .log-form-inputs {
      display: flex;
      gap: 6px;
      align-items: flex-end;
    }
    .log-input-group { flex: 1; }
    .log-input-group label {
      display: block;
      font-size: 10px;
      color: var(--text-2);
      margin-bottom: 3px;
    }
    .log-input-group input {
      width: 100%;
      padding: 7px 8px;
      border: 0.5px solid var(--border);
      border-radius: var(--r-sm);
      font-size: 15px;
      font-family: var(--font);
      background: var(--surface);
      color: var(--text-1);
      -webkit-appearance: none;
    }
    .log-input-group input:focus { outline: none; border-color: var(--accent); }
    .btn-log-save {
      padding: 7px 12px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: var(--r-sm);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .btn-log-save:active { opacity: 0.75; }
    .log-last-result {
      font-size: 11px;
      color: var(--text-2);
      margin-top: 4px;
    }

    /* Instructions */
    .exercise-steps {
      background: var(--bg);
      border-radius: var(--r-sm);
      padding: var(--sp-sm);
      margin-bottom: var(--sp-sm);
    }
    .exercise-step {
      display: flex;
      gap: 8px;
      font-size: 12px;
      padding: 3px 0;
      color: var(--text-1);
    }
    .exercise-step-num {
      color: var(--text-3);
      min-width: 16px;
      flex-shrink: 0;
      font-weight: 600;
    }
    .exercise-ingmar-note {
      font-size: 11px;
      color: var(--text-2);
      font-style: italic;
      margin-bottom: var(--sp-sm);
      padding: 6px 8px;
      background: rgba(17,17,17,0.04);
      border-radius: var(--r-sm);
      border-left: 2px solid var(--border-strong);
    }
    .btn-youtube {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 6px 10px;
      border: 0.5px solid var(--border);
      border-radius: var(--r-sm);
      background: var(--surface);
      color: var(--text-2);
      font-size: 11px;
      font-weight: 600;
      text-decoration: none;
      cursor: pointer;
    }
    .btn-youtube:active { background: var(--accent-bg); }

    /* Done checkmark per exercise */
    .exercise-done-check {
      font-size: 16px;
      flex-shrink: 0;
    }

    /* ============================================================
       TAB 3 — ILMAVIDJETT
    ============================================================ */
    .weather-widget {
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: var(--r-md);
      padding: 10px var(--sp-md);
      margin-bottom: var(--sp-sm);
    }
    .weather-days {
      display: flex;
      gap: var(--sp-sm);
      margin-bottom: 8px;
    }
    .weather-day {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .weather-icon { font-size: 24px; flex-shrink: 0; }
    .weather-day-info { flex: 1; min-width: 0; }
    .weather-day-title { font-size: 10px; font-weight: 700; color: var(--text-2); text-transform: uppercase; letter-spacing: 0.3px; }
    .weather-day-temp  { font-size: 14px; font-weight: 700; }
    .weather-day-desc  { font-size: 11px; color: var(--text-2); }
    .weather-divider { width: 0.5px; background: var(--border); align-self: stretch; }
    .weather-rec {
      font-size: 12px;
      font-weight: 600;
      padding: 6px 8px;
      border-radius: var(--r-sm);
      text-align: center;
    }
    .weather-rec.good  { background: rgba(34,197,94,0.08); color: #166534; border: 0.5px solid rgba(34,197,94,0.3); }
    .weather-rec.warn  { background: rgba(245,158,11,0.08); color: #92400E; border: 0.5px solid rgba(245,158,11,0.3); }
    .weather-loading   { font-size: 12px; color: var(--text-3); text-align: center; padding: 8px 0; }

    /* ============================================================
       TAB 3 — FAASI INDIKAATOR
    ============================================================ */
    .phase-indicator {
      background: var(--dark);
      color: white;
      border-radius: var(--r-lg);
      padding: 12px var(--sp-md);
      margin-bottom: var(--sp-sm);
      display: flex;
      align-items: center;
      gap: var(--sp-sm);
    }
    .phase-indicator-info { flex: 1; min-width: 0; }
    .phase-indicator-name {
      font-size: 14px;
      font-weight: 700;
      letter-spacing: -0.2px;
    }
    .phase-indicator-sub {
      font-size: 11px;
      opacity: 0.75;
      margin-top: 1px;
    }
    .phase-indicator-week { text-align: right; flex-shrink: 0; }
    .phase-indicator-week-num { font-size: 14px; font-weight: 700; }
    .phase-indicator-week-dots {
      font-size: 9px;
      opacity: 0.7;
      letter-spacing: 1px;
      margin-top: 2px;
    }
    .phase-indicator.deload { background: var(--amber); }
    .phase-indicator-btn {
      background: rgba(255,255,255,0.2);
      border: none;
      border-radius: 50%;
      width: 26px;
      height: 26px;
      color: white;
      font-size: 13px;
      cursor: pointer;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    /* Faasi navigatsioonipaneel */
    .phase-panel {
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: var(--r-md);
      padding: var(--sp-md);
      margin-bottom: var(--sp-sm);
    }
    .phase-panel-title {
      font-size: 11px;
      font-weight: 700;
      color: var(--text-2);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: var(--sp-sm);
    }
    .phase-panel-weeks {
      display: flex;
      gap: 4px;
      margin-bottom: var(--sp-sm);
    }
    .phase-week-btn {
      flex: 1;
      padding: 8px 4px;
      border: 0.5px solid var(--border);
      border-radius: var(--r-sm);
      background: var(--bg);
      font-size: 12px;
      font-weight: 600;
      color: var(--text-2);
      cursor: pointer;
      text-align: center;
      -webkit-tap-highlight-color: transparent;
    }
    .phase-week-btn.active {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }
    .phase-week-btn.done {
      color: var(--green);
      border-color: rgba(34,197,94,0.3);
    }
    .phase-panel-actions {
      display: flex;
      gap: 6px;
    }
    .phase-panel-btn {
      flex: 1;
      padding: 9px;
      border: 0.5px solid var(--border);
      border-radius: var(--r-sm);
      background: var(--bg);
      font-size: 12px;
      font-weight: 600;
      color: var(--text-1);
      cursor: pointer;
      text-align: center;
    }
    .phase-panel-btn.primary {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }
    .phase-panel-focus {
      font-size: 12px;
      color: var(--text-2);
      line-height: 1.5;
      margin-bottom: var(--sp-sm);
      padding: 8px;
      background: var(--bg);
      border-radius: var(--r-sm);
    }

    /* Faas coming soon */
    .phase-coming-soon {
      background: var(--bg);
      border: 0.5px dashed var(--border-strong);
      border-radius: var(--r-md);
      padding: var(--sp-xl) var(--sp-md);
      text-align: center;
    }
    .phase-coming-soon h4 { font-size: 16px; margin-bottom: 6px; }
    .phase-coming-soon p  { font-size: 13px; color: var(--text-2); max-width: 240px; margin: 0 auto; }

    /* ============================================================
       TAB 3 — CIRCUIT GRUPID
    ============================================================ */
    .circuit-group { margin-bottom: var(--sp-sm); }
    .circuit-group-label {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--text-3);
      padding: 4px 2px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .circuit-group-label::after {
      content: '';
      flex: 1;
      height: 0.5px;
      background: var(--border);
    }
    .circuit-rest-badge {
      font-size: 9px;
      font-weight: 700;
      background: var(--accent-bg);
      color: var(--text-2);
      border-radius: 8px;
      padding: 2px 6px;
      text-transform: none;
      letter-spacing: 0;
    }

    /* ============================================================
       KODU (DASHBOARD) TAB
    ============================================================ */
    .kodu-wrap {
      display: flex;
      flex-direction: column;
      gap: 13px;
    }
    .kodu-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r-lg);
      padding: var(--sp-md);
      box-shadow: var(--shadow);
    }
    .kodu-card-clickable {
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .kodu-card-clickable:active { opacity: 0.7; }
    .kodu-section-label {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-2);
      letter-spacing: 0.3px;
      text-transform: uppercase;
      padding: 4px 2px 0;
    }
    .kodu-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-2);
      letter-spacing: 0.2px;
      text-transform: uppercase;
    }

      align-items: center;
      justify-content: center;
      padding: var(--sp-xl) var(--sp-md);
      text-align: center;
      gap: var(--sp-sm);

    .tulemas-icon { font-size: 44px; }
    .tulemas h3   { font-size: 18px; font-weight: 600; }
    .tulemas p    { font-size: 14px; color: var(--text-2); max-width: 260px; }

    /* ============================================================

    .period-selector {
      display: flex;
      gap: 4px;
      margin-bottom: var(--sp-sm);

      flex: 1;
      padding: 7px;

      border-radius: var(--r-sm);
      background: var(--surface);
      font-size: 12px;
      font-weight: 600;
      color: var(--text-2);
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .period-btn.active {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }
    .chart-type-selector {
      display: flex;
      gap: 4px;
      margin-bottom: var(--sp-sm);
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }
    .chart-type-btn {
      flex-shrink: 0;
      padding: 5px 10px;
      border: 0.5px solid var(--border);
      border-radius: var(--r-sm);
      background: var(--surface);
      font-size: 11px;
      font-weight: 600;
      color: var(--text-2);
      cursor: pointer;
      white-space: nowrap;
      -webkit-tap-highlight-color: transparent;

    .chart-type-btn.active {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }
    .chart-card {
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: var(--r-md);
      padding: var(--sp-md);
      margin-bottom: var(--sp-sm);

    .chart-title {
      font-size: 13px;
      font-weight: 600;
      margin-bottom: var(--sp-xs);
    }
    .chart-sub {
      font-size: 11px;
      color: var(--text-2);
      margin-bottom: var(--sp-sm);

      text-align: center;
      padding: var(--sp-lg) 0;
      color: var(--text-3);
      font-size: 13px;
    }
    .chart-stat-row {
      display: flex;
      gap: var(--sp-sm);
      margin-top: var(--sp-sm);
    }
    .chart-stat {
      flex: 1;
      background: var(--bg);
      border-radius: var(--r-sm);
      padding: var(--sp-sm);
      text-align: center;

      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: var(--r-md);
      padding: var(--sp-md);
      margin-bottom: var(--sp-sm);

      display: grid;

      display: block;
      font-size: 11px;
      color: var(--text-2);
      margin-bottom: 3px;

      border: 0.5px solid var(--border);
      border-radius: var(--r-sm);

    ============================================================ */

    .pr-badge  {
      font-size: 11px; font-weight: 700;

      border-radius: 8px; padding: 2px 7px;

    .train-bars {
      display: flex;
      align-items: flex-end;
      gap: 3px;
      height: 72px;
    }
    .train-bar-col {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      height: 100%;
      gap: 2px;
    }
    .train-bar-val { font-size: 8px; color: var(--text-2); font-weight: 600; }
    .train-bar     { width: 100%; border-radius: 3px 3px 0 0; min-height: 3px; background: var(--accent); }
    .train-bar.empty { background: var(--border); }
    .train-bar-lbl { font-size: 8px; color: var(--text-3); white-space: nowrap; }

    /* ============================================================
       DEBUG PANEEL + VERSION
    ============================================================ */
    #footer-bar {
      position: fixed;
      bottom: calc(var(--nav-h) + 8px);
      right: 10px;
      display: flex;
      align-items: center;
      gap: 6px;
      z-index: 30;
    }
    #version-label {
      font-size: 10px;
      color: var(--text-3);
      font-weight: 500;
      letter-spacing: 0.2px;
      pointer-events: none;
    }
    #dbg-btn {
      width: 28px;
      height: 28px;
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: 50%;
      font-size: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-3);
    }

    #dbg-panel {
      display: none;
      position: fixed;
      bottom: calc(var(--nav-h) + 44px);
      right: 8px;
      width: min(340px, calc(100vw - 16px));
      background: #1C1C1C;
      color: #D4D4D4;
      border-radius: var(--r-md);
      padding: var(--sp-md);
      z-index: 30;
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 11px;
      line-height: 1.7;
      max-height: 55vh;
      overflow-y: auto;
    }
    #dbg-panel.open { display: block; }

    .dbg-head  { color: #666; font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; margin: var(--sp-sm) 0 2px; }
    .dbg-ok    { color: #22C55E; }
    .dbg-warn  { color: #F59E0B; }
    .dbg-err   { color: #EF4444; }

    /* ============================================================
       RESPONSIVE — DESKTOP (≥ 768px)
    ============================================================ */
    @media (min-width: 768px) {

      html, body { font-size: 16px; }

      /* App laiemaks */
      #app { max-width: 1100px; }

      /* Nav jääb alla — lihtsalt laiemaks */
      #nav { max-width: 1100px; height: 60px; }
      .nav-btn svg   { width: 20px; height: 20px; }
      .nav-label     { font-size: 11px; }

      /* Header */
      #hdr {
        padding: var(--sp-sm) var(--sp-lg) var(--sp-sm);
      }
      #hdr-title { font-size: 20px; }
      #hdr-stats { gap: 10px; margin-top: 8px; }
      .hdr-stat  { font-size: 13px; }
      .hdr-stat svg { width: 13px; height: 13px; }

      /* Sisuala */
      #content {
        padding: var(--sp-lg);
        padding-bottom: calc(60px + var(--sp-lg));
        max-width: 860px;
        margin: 0 auto;
        width: 100%;
      }

      .card { border-radius: var(--r-lg); }
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

  </style>
</head>

const FB_CONFIG = {

  authDomain:        'trenn-toitumine.firebaseapp.com',
  projectId:         'trenn-toitumine',
  storageBucket:     'trenn-toitumine.firebasestorage.app',

        log('firebaseLocalStorageDb puhastatud', 'dbg-ok');
      } catch (e) { log('firebaseLocalStorageDb puhastus: ' + (e.message || e), 'dbg-warn'); }
      try { localStorage.setItem('ttm_fbdb_cleared_v1', '1'); } catch (e) {}
    }
    firebase.initializeApp(FB_CONFIG);
    _fbAuth = firebase.auth();
    _fbDb   = firebase.firestore();
    // v0.9.6.3: Safari/iOS blokeerib Firestore'i striimiva WebChannel-ühenduse → KIRJUTAMISED
    // ei jõua pilve (lugemine töötab, seepärast telefon nägi desktopi andmeid aga vastupidi mitte).
    // Long-polling käib tavalise HTTP kaudu ja töötab Safaris. Mobiilis force, desktopil auto-detect.
    // NB: settings() peab tulema ENNE esimest Firestore-operatsiooni.
    try {
      _fbDb.settings(_isMobileOrPWA()
        ? { experimentalForceLongPolling: true }
        : { experimentalAutoDetectLongPolling: true });
      log('Firestore transport: ' + (_isMobileOrPWA() ? 'long-polling (force)' : 'auto-detect'), 'dbg-ok');
    } catch (e) { log('Firestore settings viga: ' + (e.message || e), 'dbg-warn'); }
    _fbAuth.onAuthStateChanged(async user => {
      FB_USER = user;
      renderAuthBtn();
      if (user) {
        log(`Firebase: sisse logitud ${user.email}`, 'dbg-ok');
        await syncFromFirestore();
        updateDayStats();
        renderTab(STATE.currentTab);
        startRealtimeSync();   // v0.9.4.8: elav sünk teistelt seadmetelt
      } else {
        log('Firebase: välja logitud', 'dbg-warn');
        stopRealtimeSync();
      }
    });
    // v0.9.5.2: käsitle ümbersuunamisega sisselogimise tulemus (ainult desktop — mobiil kasutab GIS-i)
    if (!_isMobileOrPWA()) {
      _fbAuth.getRedirectResult()
        .then(res => { if (res && res.user) { log('Redirect login OK: ' + res.user.email, 'dbg-ok'); showToast('☁️ Sisse logitud'); } })
        .catch(e => { log('getRedirectResult viga: ' + (e.code || e.message), 'dbg-err'); });
    }
    // v0.9.4.8: sünkrooni uuesti kui aken tuleb fookusesse / PWA taasavatakse
    _setupResyncListeners();
    log('Firebase init ✓', 'dbg-ok');
  } catch (e) {
    log('Firebase init viga: ' + e.message, 'dbg-err');
  }
}

/* Mobiil/PWA tuvastus — seal on signInWithPopup ebausaldusväärne (hüpikaken blokeeritakse) */
function _isMobileOrPWA() {
  const mob = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent)
           || (navigator.maxTouchPoints > 1 && /Mac/.test(navigator.platform)); // iPadOS
  const pwa = window.matchMedia && window.matchMedia('(display-mode: standalone)').matches
           || window.navigator.standalone === true;
  return mob || pwa;
}

async function fbLogin() {
  if (!_fbAuth) { showToast('Firebase pole veel valmis — proovi hetke pärast'); return; }
  // Mobiil/PWA: kasuta Google Identity Services (ei sõltu cross-site salvestusest)
  if (_isMobileOrPWA()) { _gisLogin(); return; }
  // Desktop: hüpikaken (usaldusväärne), varuvariandiks GIS
  const provider = new firebase.auth.GoogleAuthProvider();
  provider.setCustomParameters({ prompt: 'select_account' });
  try {
    await _fbAuth.signInWithPopup(provider);
  } catch (e) {
    log('Login popup viga: ' + (e.code || e.message), 'dbg-warn');
    if (e.code === 'auth/popup-blocked' || e.code === 'auth/popup-closed-by-user'
        || e.code === 'auth/cancelled-popup-request' || e.code === 'auth/operation-not-supported-in-this-environment') {
      _gisLogin();
      return;
    }
    log('Login viga: ' + (e.code || e.message), 'dbg-err');
    showToast('❌ Login ebaõnnestus: ' + (e.code || e.message));
  }
}

/* ── Google Identity Services login (v0.9.5.4) ──────────────────────────
   Näitab Google'i enda sisselogimisnupu overlays. Klõps → Google tagastab
   ID-tokeni callbacki → signInWithCredential. Töötab Brave/Safari iOS-is,
   sest GIS ei vaja firebaseapp.com cross-site salvestust. */
let _gisInited = false;

async function _gisLogin() {
  // Oota kuni GIS teek on laetud (async script)
  let waited = 0;
  while (!(window.google && google.accounts && google.accounts.id) && waited < 5000) {
    await new Promise(r => setTimeout(r, 150)); waited += 150;
  }
  if (!(window.google && google.accounts && google.accounts.id)) {
    log('GIS teek ei laadinud', 'dbg-err');
    showToast('❌ Google login ei laadinud — kontrolli internetti');
    return;
  }
  try {
    if (!_gisInited) {
      google.accounts.id.initialize({
        client_id: GIS_CLIENT_ID,
        callback: _gisCallback,
        auto_select: false,
        cancel_on_tap_outside: true,
        use_fedcm_for_prompt: true
      });
      _gisInited = true;
    }
    _gisOpenOverlay();
  } catch (e) {
    log('GIS init viga: ' + (e.message || e), 'dbg-err');
    showToast('❌ Google login viga: ' + (e.message || e));
  }
}

/* Promise ajapiiranguga — et ükski samm ei saaks lõputult rippuda (v0.9.5.6) */
function _withTimeout(promise, ms, label) {
  return Promise.race([
    promise,
    new Promise((_, rej) => setTimeout(() => rej(new Error((label || 'toiming') + ' timeout ' + ms + 'ms')), ms))
  ]);
}

/* v0.9.5.8: diagnostika — testib eraldi IndexedDB-d ja võrku Firebase'ini,
   et teada kumb login'i rippuma paneb. */
async function _gisDiagnose() {
  // Testi JUST Firebase'i oma baasi (firebaseLocalStorageDb) — see on tegelik kahtlusalune
  let idb = '?';
  try {
    idb = await _withTimeout(new Promise((res) => {
      let done = false;
      const req = indexedDB.open('firebaseLocalStorageDb');
      req.onsuccess = () => { if (done) return; done = true; try { req.result.close(); } catch (e) {} res('✓ OK'); };
      req.onerror   = () => { if (done) return; done = true; res('viga: ' + (req.error && req.error.name || 'unknown')); };
      req.onblocked = () => { if (done) return; done = true; res('BLOCKED ✗'); };
    }), 4000, 'idb');
  } catch (e) { idb = 'RIPUB ✗'; }
  let net = '?';
  try {
    const resp = await _withTimeout(
      fetch('https://identitytoolkit.googleapis.com/v1/projects?key=' + FB_CONFIG.apiKey, { method: 'GET' }),
      8000, 'net');
    net = '✓ OK (HTTP ' + resp.status + ')';
  } catch (e) {
    net = /timeout/i.test(e.message) ? 'RIPUB ✗' : ('viga: ' + e.message);
  }
  return { idb, net };
}

async function _gisCallback(response) {
  try {
    if (!response || !response.credential) {
      _gisSetStatus('❌ Google ei tagastanud tokenit. Proovi uuesti.', true);
      return;
    }
    _gisSetStatus('Sisselogimine…', false);
    const cred = firebase.auth.GoogleAuthProvider.credential(response.credential);
    try {
      const uc = await _withTimeout(_fbAuth.signInWithCredential(cred), 15000, 'signInWithCredential');
      const email = (uc && uc.user && uc.user.email) || 'OK';
      log('GIS login OK: ' + email, 'dbg-ok');
      _gisSetStatus('✓ Sisse logitud: ' + email, false);
      setTimeout(_gisCloseOverlay, 1200);
    } catch (e) {
      const code = e.code || e.message || String(e);
      log('signInWithCredential viga: ' + code, 'dbg-err');
      _gisSetStatus('❌ Login timeout — diagnoosin…', true);
      if (/timeout/i.test(code)) {
        const d = await _gisDiagnose();
        log('DIAG idb=' + d.idb + ' net=' + d.net, 'dbg-warn');
        _gisSetStatus('❌ Login timeout.<br><span style="font-weight:400;color:#211E18;font-size:12px;">'
          + 'IndexedDB (salvestus): <b>' + d.idb + '</b><br>'
          + 'Võrk Firebase\'ini: <b>' + d.net + '</b></span>', true);
      } else {
        _gisSetStatus('❌ Firebase login ebaõnnestus:<br><b>' + code + '</b>', true);
      }
    }
  } catch (e) {
    const code = e.message || String(e);
    log('GIS callback viga: ' + code, 'dbg-err');
    _gisSetStatus('❌ Login viga:<br><b>' + code + '</b>', true);
  }
}

/* ===== v0.9.6.5: Firestore KIRJUTAMINE REST-API kaudu =====
   Firestore SDK striimiv WebChannel-kirjutamiskanal on Safaris/iOS-is blokeeritud
   (batch.commit aegus 20s). REST-API on tavaline HTTPS PATCH ja töötab Safaris.
   Lugemine (get + onSnapshot) jääb SDK peale — see töötab. */
function _toFsValue(x) {
  if (x === null || x === undefined) return { nullValue: null };
  if (typeof x === 'boolean') return { booleanValue: x };
  if (typeof x === 'number') {
    if (!isFinite(x)) return { doubleValue: 0 };
    return Number.isInteger(x) ? { integerValue: String(x) } : { doubleValue: x };
  }
  if (typeof x === 'string') return { stringValue: x };
  if (Array.isArray(x)) return { arrayValue: { values: x.map(_toFsValue) } };
  if (typeof x === 'object') {
    const fields = {};
    for (const k in x) if (Object.prototype.hasOwnProperty.call(x, k)) fields[k] = _toFsValue(x[k]);
    return { mapValue: { fields } };
  }
  return { stringValue: String(x) };
}

async function _fbRestWrite(key, value) {
  if (!FB_USER) throw new Error('pole sisse logitud');
  const token = await FB_USER.getIdToken();
  const url = `https://firestore.googleapis.com/v1/projects/${FB_CONFIG.projectId}`
    + `/databases/(default)/documents/users/${FB_USER.uid}/kv/${encodeURIComponent(key)}`;
  const body = { fields: { v: _toFsValue(value), ts: { integerValue: String(Date.now()) } } };
  const resp = await fetch(url, {
    method: 'PATCH',
    headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });
  if (!resp.ok) {
    const t = await resp.text().catch(() => '');
    throw new Error('HTTP ' + resp.status + ' ' + t.slice(0, 140));
  }
  return true;
}

// Kirjuta Firestoresse — fire-and-forget, ei blokeeri UI-d (REST kaudu)
function fbWrite(key, value) {
  if (!FB_USER || !_fbDb) return;
  _fbRestWrite(key, value).catch(e => log('fbWrite viga: ' + (e.message || e), 'dbg-err'));
}

/* ===== v0.9.5.0: liidetavate logide targem sünk =====
   Kogunevad logid (nutrition_log jne) on ÜKS objekt kõigi päevadega. Vana "uuem võidab terve objekti"
   loogika tähendas: kui mõlemas seadmes samal päeval logida, kirjutas hiljem sünkiv seade teise oma üle
   (= tänased telefoni-kirjed kadusid desktopis). Lahendus: liida (union) mõlema seadme andmed. */
function _isMergeKey(id) {
  return id === 'nutrition_log' || id === 'training_log' || id === 'weight_log'
      || id === 'meal_plan' || id === 'mp_prep_done' || id === 'exercise_notes'
      || id === 'deleted_items' || id === 'meal_plan_ts'
      || id.indexOf('alkohol_week_') === 0;
}

/* v0.9.7.0: jäta märge, millal seda päeva toidukava viimati KÄSITSI muudeti (mpSwapSlot/mpGenerate).
   Vt _mergeLogValue 'meal_plan' haru — vajalik, et sünk ei kirjutaks värsket vahetust vana pilvekoopiaga üle. */
function _touchMealPlanDay(dateStr) {
  const t = lsGet('meal_plan_ts') || {};
  t[dateStr] = Date.now();
  lsSet('meal_plan_ts', t);
}

/* ===== v0.9.6.7: kustutamise "tombstone'id" =====
   Puhas union-liitmine EI SAA kunagi kustutamist edastada: kui A kustutab kirje ja B-l on
   endiselt vana koopia, liidab järgmine sünk selle lihtsalt tagasi (kirje "tuleb kohe tagasi").
   Lahendus: kustutamisel jäta "tombstone" (kustutamise ajatempel) võtmega "<skoop>|<kirjevõti>".
   Liitmisel jäetakse välja iga kirje, mille oma ajatempel (updated_at/added_at) on tombstone'ist vanem —
   nii saab kustutatud kirje tagasi tulla ainult siis, kui keegi selle TEADLIKULT uuesti lisab. */
function _mergeTombstones(a, b) {
  const out = { ...(a || {}) };
  Object.entries(b || {}).forEach(([k, ts]) => { out[k] = Math.max(out[k] || 0, ts || 0); });
  return out;
}
function _isDeleted(scope, itemKey, itemTs) {
  const tomb = lsGet('deleted_items') || {};
  const dts = tomb[`${scope}|${itemKey}`];
  if (dts == null) return false;
  return (itemTs || 0) <= dts;
}
function _markDeleted(scope, itemKey) {
  const tomb = lsGet('deleted_items') || {};
  tomb[`${scope}|${itemKey}`] = Date.now();
  lsSet('deleted_items', tomb);
}

function _mergeByKey(a, b, keyFn, scope) {
  const map = new Map();
  [...(a || []), ...(b || [])].forEach(it => {
    if (it == null) return;
    const k = keyFn(it);
    const ex = map.get(k);
    // sama võtme korral hoia "rikkalikum" kirje (rohkem infot)
    if (!ex || JSON.stringify(it).length >= JSON.stringify(ex).length) map.set(k, it);
  });
  let out = [...map.values()];
  if (scope) out = out.filter(it => !_isDeleted(scope, keyFn(it), it.updated_at || it.added_at || it.ts || 0));
  return out;
}
/* v0.9.7.2: harjutuse märkmed — nüüd kuupäevastatud logi (mitte üks pidevalt ülekirjutatav tekst).
   Iga harjutuse kohta hoitakse massiivi { id, text, ts }. Liitmisel kasutatakse sama _mergeByKey
   võtme-loogikat + tombstone'e, nii et kirje lisamine/kustutamine ühest seadmest ei kao teise sünkides.
   Vana formaat (lihtne tekst-string) teisendatakse ühekordseks "legacy" kirjeks tagasiühilduvuse jaoks. */
function _asNoteArray(raw) {
  if (Array.isArray(raw)) return raw;
  if (typeof raw === 'string' && raw.trim()) return [{ id: 'legacy', text: raw, ts: 0 }];
  return [];
}
function _mergeExerciseNotes(a, b) {
  const out = {};
  const ids = new Set([...Object.keys(a || {}), ...Object.keys(b || {})]);
  ids.forEach(exId => {
    const merged = _mergeByKey(_asNoteArray(a?.[exId]), _asNoteArray(b?.[exId]), n => n.id, `exercise_notes|${exId}`)
      .sort((x, y) => (x.ts || 0) - (y.ts || 0));
    if (merged.length) out[exId] = merged;
  });
  return out;
}
function _mergeNutritionLog(a, b) {
  const out = {};
  const dates = new Set([...Object.keys(a || {}), ...Object.keys(b || {})]);
  dates.forEach(d => {
    const da = (a && a[d]) || {}, db = (b && b[d]) || {};
    const m = {};
    // v0.9.6.7: iga slot-staatuse muutmise ajatempel — eristab "pole veel märgitud" (null, alati)
    // ja "teadlikult tühjaks tehtud" (null, aga uuem ajatempel kui pilve 'eaten') — vt allpool.
    const tsA = da._ts || {}, tsB = db._ts || {};
    const mTs = {};
    new Set([...Object.keys(tsA), ...Object.keys(tsB)]).forEach(k => { mTs[k] = Math.max(tsA[k] || 0, tsB[k] || 0); });
    const keys = new Set([...Object.keys(da), ...Object.keys(db)]);
    keys.forEach(s => {
      if (s === '_custom') {
        const byId = {};
        [...(da._custom || []), ...(db._custom || [])].forEach(e => { if (e && e.id != null) byId[e.id] = e; });
        m._custom = Object.values(byId).filter(e =>
          !_isDeleted(`nutrition_log._custom|${d}`, e.id, e.added_at ? new Date(e.added_at).getTime() : 0));
      } else if (s === '_ts') {
        // käsitletud eraldi (mTs) — ei kirjuta otse
      } else {
        const va = da[s], vb = db[s];
        const ta = tsA[s] || 0, tb = tsB[s] || 0;
        if (ta || tb) {
          // uuem TEADLIK muutus võidab alati — ka siis kui uuem väärtus on null (lahti märgitud)
          m[s] = ta >= tb ? va : vb;
        } else {
          // vanad kirjed ilma ajatemplita — endine tagasiühilduv käitumine
          m[s] = (va && vb) ? ((va === 'eaten' || vb === 'eaten') ? 'eaten' : va) : (va ?? vb);
        }
      }
    });
    if (Object.keys(mTs).length) m._ts = mTs;
    out[d] = m;
  });
  return out;
}
function _mergeLogValue(id, localVal, cloudVal, cloudTs) {
  if (id === 'nutrition_log') return _mergeNutritionLog(localVal, cloudVal);
  if (id === 'training_log')  return _mergeByKey(localVal, cloudVal, e => `${e.date}|${e.plan}|${e.treening}`, 'training_log');
  if (id === 'weight_log')    return _mergeByKey(localVal, cloudVal, e => e.date, 'weight_log').sort((x, y) => (x.date || '').localeCompare(y.date || ''));
  if (id === 'deleted_items') return _mergeTombstones(localVal, cloudVal);
  if (id === 'meal_plan_ts')  return _mergeTombstones(localVal, cloudVal);
  if (id.indexOf('alkohol_week_') === 0) return _mergeByKey(localVal, cloudVal, e => `${e.date}|${e.time}|${e.label}`, id);
  if (id === 'exercise_notes') return _mergeExerciseNotes(localVal, cloudVal);
  if (id === 'mp_prep_done') {
    const out = { ...(cloudVal || {}) };
    for (const [wk, days] of Object.entries(localVal || {})) out[wk] = { ...(out[wk] || {}), ...days };
    return out;
  }
  if (id === 'meal_plan') {
    // v0.9.7.0 fix: vana loogika valis pikema JSON-iga versiooni ("rikkalikum" heuristik) — aga
    // toidu VAHETAMINE (mpSwapSlot) ei tee kava JSON-i tingimata pikemaks (uus toit võib olla
    // lühema nimega kui vana), mistõttu käsitsi tehtud vahetus kaotas vahel vana pilvekoopia vastu
    // ja "vahetus tuli kohe tagasi". Nüüd: kui kohalik päev on _touchMealPlanDay'ga märgitud UUEMAKS
    // kui pilve DOKUMENDI viimane kirjutus tervikuna (cloudTs), võidab kohalik muudatus alati.
    // Kui ajatemplit pole (vana kirje / teise seadme genereeritud päev), endine pikkuse-heuristik.
    const out = { ...(cloudVal || {}) };
    const dayTs = lsGet('meal_plan_ts') || {};
    for (const [d, plan] of Object.entries(localVal || {})) {
      const cur = out[d];
      if (!cur) { out[d] = plan; continue; }
      const localDayTs = dayTs[d] || 0;
      if (localDayTs && localDayTs > (cloudTs || 0)) {
        out[d] = plan;
      } else if (!localDayTs && JSON.stringify(plan).length >= JSON.stringify(cur).length) {
        out[d] = plan;
      }
    }
    return out;
  }
  return localVal;
}
/* Kanooniline JSON (rekursiivselt sorteeritud võtmed) — võrdluseks, et võtmejärjekord
   ei annaks valepositiivi ja ei tekitaks lõputut sünk-silmust (v0.9.6.1) */
function _canon(v) {
  const norm = (x) => {
    if (x === null || typeof x !== 'object') return x;
    if (Array.isArray(x)) return x.map(norm);
    const out = {};
    Object.keys(x).sort().forEach(k => { out[k] = norm(x[k]); });
    return out;
  };
  try { return JSON.stringify(norm(v)); } catch (e) { return JSON.stringify(v); }
}

/* Rakenda üks pilvedokument lokaalselt. Tagastab true kui lokaalne muutus. meta = ajatemplite objekt. */
function _applyCloudDoc(id, cloudData, meta) {
  const cloudVal = cloudData.v;
  const cloudTs  = cloudData.ts ?? 0;
  const localRaw = localStorage.getItem('ttm_' + id);
  const localVal = localRaw != null ? (() => { try { return JSON.parse(localRaw); } catch (e) { return undefined; } })() : undefined;

  if (_isMergeKey(id) && localVal !== undefined) {
    const merged    = _mergeLogValue(id, localVal, cloudVal, cloudTs);
    const mergedStr = JSON.stringify(merged);
    let changed = false;
    if (mergedStr !== localRaw) { localStorage.setItem('ttm_' + id, mergedStr); changed = true; }
    // v0.9.6.1: kui liidetud tulem erineb pilve omast (KANOONILISELT — mitte lihtsalt võtmejärjekord),
    // lükka pilve tagasi → seadmed konvergeeruvad. Kanooniline võrdlus väldib v0.9.5.3 lõputut silmust:
    // pärast tagasikirjutust pilv = merged → _canon võrdne → rohkem ei kirjutata.
    if (_canon(merged) !== _canon(cloudVal)) { try { fbWrite(id, merged); } catch (e) {} }
    meta[id] = Math.max(meta[id] || 0, cloudTs);
    return changed;
  }
  // Skalaar / konfiguratsioon → ajatempel, uuem võidab
  const localTs = meta[id] ?? 0;
  if (localVal === undefined || cloudTs >= localTs) {
    const cloudStr = JSON.stringify(cloudVal);
    meta[id] = cloudTs;
    if (localRaw !== cloudStr) { localStorage.setItem('ttm_' + id, cloudStr); return true; }
    return false;
  }
  try { fbWrite(id, localVal); } catch (e) {} // lokaalne uuem → lükka pilve
  return false;
}
/* Pärast sünki: arvuta ümber tuletatud päeva-kalorid (kcal_today_*) liidetud logidest */
function _recomputeDerivedKcal() {
  try {
    const nl = lsGet('nutrition_log') ?? {};
    const today = _localDateStr(new Date());
    const dates = new Set([...Object.keys(nl), today]); // ka täna, isegi kui logi tühi
    // v0.9.5.3: kirjuta OTSE localStorage'i (mitte lsSet) — kcal_today on tuletatud väärtus,
    // ei pea pilve sünkima; lsSet oleks käivitanud fbWrite → onSnapshot-silmus
    dates.forEach(d => { localStorage.setItem('ttm_kcal_today_' + d, JSON.stringify(calcEatenKcal(d))); });
  } catch (e) {}
}

// Lae kõik võtmed Firestorest → localStorage (login järel).
// Kui Firestores pole veel midagi → push kõik lokaalsed andmed automaatselt üles.
async function syncFromFirestore() {
  if (!FB_USER || !_fbDb) return;
  try {
    const snap = await _fbDb.collection('users').doc(FB_USER.uid)
      .collection('kv').get();
    if (snap.empty) {
      // Esimene login sellel kontol — laadi lokaalsed andmed pilve
      log('Firestore tühi — push kõik lokaalsed andmed üles', 'dbg-warn');
      await pushAllToFirestore();
    } else {
      /* v0.9.4.3: ajatemplipõhine merge — UUEM võidab, kummaski suunas.
         Varem kirjutas pilv ALATI lokaalse üle → kui fbWrite oli vahele jäänud,
         kadusid värsked lokaalsed kirjed (nt alkoholilogi) järgmisel sünkimisel. */
      const meta = _tsMetaGet();
      const cloudKeys = new Set();
      let changedCount = 0;
      snap.forEach(doc => {
        if (doc.id === '_meta_ts') return;
        cloudKeys.add(doc.id);
        if (_applyCloudDoc(doc.id, doc.data(), meta)) changedCount++;
      });
      // Lokaalsed võtmed, mida pilves pole üldse → push üles
      for (let i = 0; i < localStorage.length; i++) {
        const k = localStorage.key(i);
        if (!k || !k.startsWith('ttm_') || k === 'ttm__meta_ts') continue;
        const id = k.slice(4);
        if (!cloudKeys.has(id)) {
          try { fbWrite(id, JSON.parse(localStorage.getItem(k))); } catch (e) {}
        }
      }
      try { localStorage.setItem('ttm__meta_ts', JSON.stringify(meta)); } catch (e) {}
      if (changedCount > 0) _recomputeDerivedKcal();
      log(`Firestore sync: ${changedCount} kirjet uuendatud/liidetud`, 'dbg-ok');
      if (changedCount > 0) showToast(`☁️ Sünkroonitud (${changedCount} muudatust)`);
    }
  } catch (e) {
    log('syncFromFirestore viga: ' + e.message, 'dbg-err');
  }
}

/* ===== v0.9.4.8: elav (reaalaja) sünk + fookuse-põhine taassünk ===== */
let _fbUnsub      = null;
let _resyncSetup  = false;
let _lastResyncAt = 0;

/* Reaalaja kuulaja — teistes seadmetes tehtud muudatused ilmuvad kohe */
function startRealtimeSync() {
  if (!FB_USER || !_fbDb) return;
  stopRealtimeSync();
  try {
    _fbUnsub = _fbDb.collection('users').doc(FB_USER.uid).collection('kv')
      .onSnapshot(snap => {
        const meta = _tsMetaGet();
        let changed = 0;
        snap.docChanges().forEach(ch => {
          // Meie enda veel kinnitamata kirjutused → jäta vahele (väldib silmust)
          if (ch.doc.metadata.hasPendingWrites) return;
          const id = ch.doc.id;
          if (id === '_meta_ts' || ch.type === 'removed') return;
          if (_applyCloudDoc(id, ch.doc.data(), meta)) changed++;
        });
        if (changed) {
          try { localStorage.setItem('ttm__meta_ts', JSON.stringify(meta)); } catch (e) {}
          _recomputeDerivedKcal();
          updateDayStats();
          // Ära katkesta kui kasutaja parasjagu vormi täidab / seaded salvestamata
          if (!_syncRenderBlocked()) renderTab(STATE.currentTab);
          log(`Reaalaja sünk: ${changed} kirjet teisest seadmest`, 'dbg-ok');
        }
      }, err => log('onSnapshot viga: ' + err.message, 'dbg-err'));
  } catch (e) { log('startRealtimeSync viga: ' + e.message, 'dbg-err'); }
}
function stopRealtimeSync() {
  if (_fbUnsub) { try { _fbUnsub(); } catch (e) {} _fbUnsub = null; }
}

/* Taassünk. force=true (käsitsi nupp) eirab throttle'it ja annab tagasiside */
async function resyncNow(force) {
  if (!FB_USER || !_fbDb) {
    if (force) showToast('Logi kõigepealt Google\'iga sisse (Mina tab)');
    return;
  }
  const now = Date.now();
  if (!force && now - _lastResyncAt < 8000) return;
  _lastResyncAt = now;
  const svg = document.getElementById('sync-svg');
  if (svg) svg.style.animation = 'spin 1s linear infinite';
  await syncFromFirestore();
  updateDayStats();
  // Ei renderda üle salvestamata seadete/vormi (nt NEAT valik) — andmed on ikka localStorage'is
  if (!_syncRenderBlocked()) renderTab(STATE.currentTab);
  if (svg) setTimeout(() => { svg.style.animation = ''; }, 400);
  if (force) showToast('☁️ Sünkroonitud');
}

function _setupResyncListeners() {
  if (_resyncSetup) return;
  _resyncSetup = true;
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible') resyncNow(true);
  });
  window.addEventListener('focus', () => resyncNow(true));
}

// Sünkroniseeri kogu localStorage Firestoresse (esimene login / uus seade)
async function pushAllToFirestore() {
  if (!FB_USER || !_fbDb) { showToast('Logi kõigepealt Google\'iga sisse'); return; }
  showToast('⬆️ Laen üles…');
  log('pushAllToFirestore: alustan (REST)…', 'dbg-ok');
  const keys = [];
  for (let i = 0; i < localStorage.length; i++) {
    const k = localStorage.key(i);
    if (!k || !k.startsWith('ttm_') || k === 'ttm__meta_ts') continue;
    keys.push(k.slice(4));
  }
  // v0.9.6.5: REST-kirjutamine (SDK batch.commit aegus Safaris). Iga võti eraldi, paralleelselt.
  let ok = 0, fail = 0, firstErr = '';
  await Promise.all(keys.map(async key => {
    try {
      const val = JSON.parse(localStorage.getItem('ttm_' + key));
      await _withTimeout(_fbRestWrite(key, val), 15000, 'rest');
      ok++;
    } catch (e) { fail++; if (!firstErr) firstErr = (e.message || String(e)); }
  }));
  if (fail === 0) {
    showToast(`☁️ ${ok} kirjet üles laetud`);
    log(`pushAllToFirestore REST OK: ${ok} kirjet`, 'dbg-ok');
  } else {
    showToast(`⚠️ ${ok} õnnestus, ${fail} ebaõnnestus: ${firstErr}`);
    log(`pushAllToFirestore REST: ok=${ok} fail=${fail} — ${firstErr}`, 'dbg-err');
  }
}

const dbgLog = [];

function log(msg, cls) {
  const t    = Date.now() - APP_START;
  const line = `[${t}ms] ${msg}`;
  dbgLog.push({ line, cls });
  console.log('[TTM]', line);
  const el = document.getElementById('dbg-log');
  if (el) el.innerHTML = dbgLog.slice(-30)
    .map(e => `<span class="${e.cls || ''}">${e.line}</span>`)
    .join('<br>');
}

function toggleDebug() {
  const p = document.getElementById('dbg-panel');
  p.classList.toggle('open');
  if (p.classList.contains('open')) refreshDebug();
}

function refreshDebug() {
  const coworkOk = typeof window.cowork !== 'undefined';
  document.getElementById('dbg-cowork').innerHTML =
    coworkOk
      ? '<span class="dbg-ok">✓ window.cowork saadaval</span>'
      : '<span class="dbg-warn">⚠ window.cowork puudub — kasutan fallback</span>';

  document.getElementById('dbg-env').textContent =
    `Keskkond: ${coworkOk ? 'Cowork artefakt' : 'Brauser'} | v${APP_VERSION}`;

  document.getElementById('dbg-timing').textContent =
    `Laadimisaeg: ${Date.now() - APP_START}ms`;

  const keys = Object.keys(localStorage).filter(k => k.startsWith('ttm_'));
  document.getElementById('dbg-ls').innerHTML = keys.length
    ? keys.map(k => `${k} (${new Blob([localStorage.getItem(k)]).size}B)`).join('<br>')
    : 'Tühi';
}

/* ============================================================
   ANDMEKIHT
   getData(filename) — universaalne andmelugeja.
   1. Proovib window.cowork (Cowork artefakt)
   2. Proovib fetch() (Vercel / GitHub raw)
   3. Kasutab FALLBACK objekti (arendusfaas)

   ⚠ Teadaolev probleem: window.cowork võib hiljaks jääda.
     waitForCowork() ootab kuni 10 sek enne loobumist.
============================================================ */
async function waitForCowork(ms = 10000) {
  if (typeof window.cowork !== 'undefined') return true;
  return new Promise(resolve => {
    const start = Date.now();
    const tick  = setInterval(() => {
      if (typeof window.cowork !== 'undefined') {
        clearInterval(tick);
        log(`window.cowork saadaval +${Date.now() - start}ms`, 'dbg-ok');
        resolve(true);
      } else if (Date.now() - start >= ms) {
        clearInterval(tick);
        log(`window.cowork timeout ${ms}ms — fallback`, 'dbg-warn');
        resolve(false);
      }
    }, 100);
  });
}

async function getData(filename) {
  const t = Date.now();

  /* 1. Cowork */
  if (typeof window.cowork !== 'undefined') {
    try {
      // TODO: täpsusta MCP tööriista nimi — kontrolli Cowork API dokumentatsiooni
      const r = await window.cowork.callMcpTool('mcp__cowork__read_file', { path: 'data/' + filename });
      const data = r.structuredContent ?? JSON.parse(r.content[0].text);
      log(`getData OK [cowork] ${filename} ${Date.now()-t}ms`, 'dbg-ok');
      return data;
    } catch (e) {
      log(`getData ERR [cowork] ${filename}: ${e.message}`, 'dbg-warn');
    }
  }

  /* 2. Fetch — lokaalne suhteline URL (kui app.html avatakse Cowork serveri kaudu) */
  try {
    const res = await fetch('data/' + filename);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    log(`getData OK [local] ${filename} ${Date.now()-t}ms`, 'dbg-ok');
    return data;
  } catch (e) {
    log(`getData ERR [local] ${filename}: ${e.message}`, 'dbg-warn');
  }

  /* 3. Fetch — Vercel / GitHub raw (Variant B) */
  try {
    const res = await fetch(GITHUB_RAW_BASE + filename);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    log(`getData OK [fetch] ${filename} ${Date.now()-t}ms`, 'dbg-ok');
    return data;
  } catch (e) {
    log(`getData ERR [fetch] ${filename}: ${e.message}`, 'dbg-warn');
  }

  /* 3. Fallback — hardcoded arendusfaasis */
  if (FALLBACK[filename]) {
    log(`getData FALLBACK ${filename}`, 'dbg-warn');
    return FALLBACK[filename];
  }

  log(`getData PUUDUB ${filename}`, 'dbg-err');
  return null;
}
