        ${meta ? `<div class="recipe-card-meta">${meta}</div>` : ''}
      </div>
    </div>
    ${ingList ? `<ul style="margin:4px 0 0;padding-left:16px;">${ingList}</ul>` : ''}
    <div style="display:flex;gap:8px;align-items:center;margin-top:2px;">
      ${stepList ? `<button id="rcp-btn-${id}" onclick="toggleRecipeSteps('${id}')" style="font-size:12px;color:var(--accent);background:none;border:none;cursor:pointer;padding:0;">Juhised ▾</button>` : ''}
      ${r.source_url ? `<a href="${r.source_url}" target="_blank" rel="noopener" style="font-size:12px;color:var(--text-2);">Ava ↗</a>` : ''}
      ${r.youtube   ? `<a href="${r.youtube}"    target="_blank" rel="noopener" style="font-size:12px;color:#ff0000;">▶ YouTube</a>` : ''}
    </div>
    <div id="rcp-steps-${id}" style="display:none;margin-top:4px;">${stepList}</div>
  </div>`;
}

function buildRecipeSectionHTML() {
  if (RECIPE_CACHE.loading) {
    return `<div class="recipe-loading">🍳 Otsin retsepte...</div>`;
  }

  const customCards  = (RECIPE_CACHE.custom || []).map((r, i) => recipeCard(r, `c${i}`)).join('');
  const onlineCards  = (RECIPE_CACHE.online || []).map((r, i) => recipeCard(r, `o${i}`)).join('');
  const hasAny = customCards || onlineCards;

  if (!hasAny) {
    return `<div class="recipe-api-setup">
      <p style="font-size:13px;color:var(--text-2);">Kinnita ostukorvis tooted → retseptisoovitused ilmuvad siia.</p>
    </div>`;
  }

  const refreshBtn = `<button onclick="RECIPE_CACHE.cartKey='';loadRecipeSuggestions();" style="margin-left:auto;font-size:11px;padding:4px 8px;background:none;border:0.5px solid var(--border);border-radius:var(--r-sm);color:var(--text-2);cursor:pointer;">↻</button>`;

  return `
    <div class="recipe-suggestions-title">🍳 Retseptisoovitused ${refreshBtn}</div>
    ${customCards}
    ${onlineCards}
    ${RECIPE_CACHE.error ? `<div style="padding:8px var(--sp-md);font-size:11px;color:var(--text-3);">TheMealDB viga: ${RECIPE_CACHE.error}</div>` : ''}
  `;
}

function toggleCustomForm(dateStr) {
  STATE.showCustomForm = !STATE.showCustomForm;
  STATE.offSelected = null; // uus vorm → unusta eelmine valitud toode
  renderTab('toitumine');
  // Fokuseerida esimene väli pärast renderdamist
  if (STATE.showCustomForm) {
    setTimeout(() => document.getElementById('custom-inp-name')?.focus(), 50);
  }
}

function saveCustomMeal(dateStr) {
  const name  = document.getElementById('custom-inp-name')?.value?.trim();
  const kcal  = parseInt(document.getElementById('custom-inp-kcal')?.value);
  if (!name || !kcal || kcal < 1) {
    document.getElementById('custom-inp-name')?.focus();
    return;
  }
  const protein = parseFloat(document.getElementById('custom-inp-protein')?.value) || 0;
  const carbs   = parseFloat(document.getElementById('custom-inp-carbs')?.value)   || 0;
  const fat     = parseFloat(document.getElementById('custom-inp-fat')?.value)     || 0;

  // v0.9.4.7 fix: EI tohi nimetada muutujat 'log' — see varjutas globaalse log() funktsiooni,
  // mistõttu alumine log(...) kutse viskas vea ja renderTab jäi käivitamata (kirje lisati, aga UI ei uuenenud)
  const nutLog = getNutritionLog();
  if (!nutLog[dateStr]) nutLog[dateStr] = {};
  if (!nutLog[dateStr]._custom) nutLog[dateStr]._custom = [];

  nutLog[dateStr]._custom.push({
    id:        Date.now().toString(36),
    name,
    kcal,
    protein_g: protein,
    carbs_g:   carbs,
    fat_g:     fat,
    added_at:  new Date().toISOString()
  });

  lsSet('nutrition_log', nutLog);

  // Uuenda headeri kalorid
  const totalKcal = calcEatenKcal(dateStr);
  lsSet('kcal_today_' + dateStr, totalKcal);
  updateDayStats();

  STATE.showCustomForm = false;
  STATE.offSelected = null;
  showToast(`✓ ${name} lisatud (${kcal} kcal)`);
  renderTab('toitumine');
}

function removeCustomMeal(dateStr, id) {
  const nutLog = getNutritionLog();
  if (!nutLog[dateStr]?._custom) return;
  nutLog[dateStr]._custom = nutLog[dateStr]._custom.filter(e => e.id !== id);
  lsSet('nutrition_log', nutLog);
  // v0.9.6.7: jäta tombstone, muidu toob sünk kustutatud käsitsi-toidu tagasi (union-liitmine)
  _markDeleted(`nutrition_log._custom|${dateStr}`, id);

  const totalKcal = calcEatenKcal(dateStr);
  lsSet('kcal_today_' + dateStr, totalKcal);
  updateDayStats();
  renderTab('toitumine');
}

/* Genereerib 7-päeva menüü ostukorvi kinnitatud toodete põhjal.
   Fallback: nutrition.json weekly_menu kui ostukorv on tühi. */
function generateMenuFromCart() {
  const fallback = STATE.nutrition?.weekly_menu ?? {};
  if (!STATE.shopping || !STATE.nutrition) return fallback;

  const checked  = getChecked();
  const available = STATE.shopping.products.filter(p => checked[p.id]);
  if (!available.length) return fallback;

  // Grupeeri kategooria järgi
  const by = {};
  available.forEach(p => {
    if (p.category_id) {
      (by[p.category_id] = by[p.category_id] || []).push(p);
    }
  });
  const get = (...cats) => cats.flatMap(c => by[c] || []);

  // Põhikategooriad
  const meatFish  = get('V01', 'V02', 'V03');  // liha + kala (S03, S05)
  const mainStarch = get('T01', 'T02', 'T03'); // riis, kartul, pasta (S03, S05)
  const oats      = get('T04')[0];              // kaer (S01)
  const whey      = get('V07')[0];              // vadakupulber (S01, S02)
  const eggs      = get('V05')[0];              // munad (S02)
  const dairy     = get('V06')[0];              // kodujuust / kreeka jogurt (S02)
  const canned    = get('V04')[0];              // tuunikala (S02)
  const oil       = get('R01')[0];              // oliiviõli
  const peanut    = get('R02')[0];              // maapähklivõi
  const nuts      = get('R03')[0];              // pähklid

  // Kas toode on hakkliha (→ M05 pannil, mitte M01 ahjus)
  const isHakkliha = p => p?.name?.toLowerCase().includes('hakkliha');
  const methodFor  = p => isHakkliha(p) ? 'M05' : 'M01';

  // Lühike nimi: "Broilerikoib" → "Broilerikoib", "Pasta (makaronid)" → "Pasta"
  const short = p => p.name.split(' ')[0];

  // Tärklis 200g / 250g sõltuvalt tüübist
  const starchGrams = s => s?.category_id === 'T02' ? '250g' : '200g';

  // S02 valikute pool — ainult see mis on ostukorvis
  const s02pool = [];
  if (eggs)   s02pool.push({ name: 'Keedetud munad', desc: `${eggs.name} ×3${nuts ? ' + ' + nuts.name + ' 30g' : ''} + banaan`, method_id: 'M07', kcal: 400 });
  if (dairy)  s02pool.push({ name: dairy.name, desc: `${dairy.name} 200g + marjad 100g + mesi`, method_id: 'M04', kcal: 390 });
  if (canned) s02pool.push({ name: canned.name + ' leibaga', desc: `${canned.name} 185g + täisteraleib 2 viilu`, method_id: null, kcal: 380 });
  if (peanut) s02pool.push({ name: 'Leib maapähklivõiga', desc: `Täisteraleib 2 viilu + ${peanut.name} 2 spl`, method_id: null, kcal: 350 });
  if (nuts)   s02pool.push({ name: nuts.name + ' + banaan', desc: `${nuts.name} 30g + banaan`, method_id: null, kcal: 280 });

  const menu = {};

  for (let day = 1; day <= 7; day++) {
    const d = {};

    // — S01: Hommikusöök —
    if (oats) {
      const useSmoothi = day % 3 === 0; // K, P → smuuti vahelduseks
      if (useSmoothi && whey) {
        d.S01 = {
          name: 'Hommikusmuuti',
          desc: `${oats.name} 50g + piim 3dl + ${whey.name} 30g${peanut ? ' + ' + peanut.name + ' 2 spl' : ''}`,
          method_id: 'M03', kcal: 700
        };
      } else {
        d.S01 = {
          name: 'Kaeraporridge',
          desc: `${oats.name} 80g + piim 2dl${whey ? ' + ' + whey.name + ' 30g' : ''} + banaan${peanut ? ' + ' + peanut.name + ' 2 spl' : ''}`,
          method_id: 'M04', kcal: 700
        };
      }
    } else {
      d.S01 = fallback[String(day)]?.S01 ?? null;
    }

    // — S02: Vahepala 1 — roteerub pooli liikmete vahel —
    d.S02 = day === 7 ? null  // pühapäev: pole vahepalasid
          : s02pool.length ? s02pool[(day - 1) % s02pool.length]
          : fallback[String(day)]?.S02 ?? null;

    // — S03: Lõuna —
    if (meatFish.length && mainStarch.length) {
      const p = meatFish[(day - 1) % meatFish.length];
      const s = mainStarch[(day - 1) % mainStarch.length];
      d.S03 = {
        name: `${short(p)} ${short(s).toLowerCase()}iga`,
        desc: `${p.name} 200g + ${s.name} ${starchGrams(s)} (keedetud)${oil ? ' + oliiviõli 1 spl' : ''}`,
        method_id: methodFor(p), kcal: 800
      };
    } else {
      d.S03 = fallback[String(day)]?.S03 ?? null;
    }

    // — S04: Vahepala 2 — alati energiapallid —
    d.S04 = day === 7 ? null
          : { name: 'Energiapallid', desc: 'Energiapallid ×3 (~345 kcal)', method_id: 'M04', kcal: 345 };

    // — S05: Õhtusöök — erinev valk kui S03 —
    if (meatFish.length && mainStarch.length) {
      // Nihuta valgu indeksit pool ringi — erinevad valgud S03 ja S05 samal päeval
      const offset = Math.ceil(meatFish.length / 2);
      const p = meatFish[(day - 1 + offset) % meatFish.length];
      const s = mainStarch[day % mainStarch.length];
      d.S05 = {
        name: `${short(p)} ${short(s).toLowerCase()}iga`,
        desc: `${p.name} 200g + ${s.name} ${starchGrams(s)} (keedetud)${oil ? ' + oliiviõli 1 spl' : ''}`,
        method_id: methodFor(p), kcal: 750
      };
    } else {
      d.S05 = fallback[String(day)]?.S05 ?? null;
    }

    // S06 Trennijook — alati sama kõigil päevadel (aktiivsus sõltub trennipäevast)
    d.S06 = {
      name: 'Trennijook',
      desc: 'Dekstroos 76g + vadakupulber 38g + glutamiin 15g · 800ml vees',
      method_id: 'M08',
      kcal: 450
    };

    menu[String(day)] = d;
  }

  return menu;
}

/* Abifunktsioonid */
function getTodayDayNum() {
  const d = new Date().getDay(); // 0=P, 1=E, ..., 6=L
  return d === 0 ? 7 : d;       // muuda: 1=E ... 7=P
}

function getDayLabel(n) {
  return ['', 'E', 'T', 'K', 'N', 'R', 'L', 'P'][n] || '?';
}

function getDayFullLabel(n) {
  return ['', 'Esmaspäev', 'Teisipäev', 'Kolmapäev', 'Neljapäev', 'Reede', 'Laupäev', 'Pühapäev'][n] || '?';
}

function getSelectedDay() {
  return STATE.selectedDay ?? getTodayDayNum();
}

function getNutritionLog() {
  return lsGet('nutrition_log') ?? {};
}

function getNutritionLogForDate(dateStr) {
  const log = getNutritionLog();
  return log[dateStr] ?? {};
}

// Tagastab kuupäeva stringi valitud päeva jaoks (see nädal)
function getDayNumForDate(dateStr) {
  for (let n = 1; n <= 7; n++) {
    if (getDateForDayNum(n) === dateStr) return n;
  }
  return null;
}

function getDateForDayNum(dayNum) {
  const today = new Date();
  const todayDayNum = getTodayDayNum();
  const diff = dayNum - todayDayNum;
  const d = new Date(today);
  d.setDate(today.getDate() + diff);
  return _localDateStr(d);
}

// Arvutab söödud kalorid logi põhjal (loeb meal_plan-ist)
function calcEatenKcal(dateStr) {
  const planDay = (lsGet('meal_plan') ?? {})[dateStr] ?? {};
  const log     = getNutritionLogForDate(dateStr);
  let kcal = 0;
  Object.entries(planDay).forEach(([sid, m]) => {
    if (log[sid] === 'eaten' && m) kcal += m.kcal ?? 0;
  });
  // Lisa käsitsi sisestatud toidud
  (log._custom || []).forEach(e => { kcal += e.kcal ?? 0; });
  // Lisa alkoholi kalorid (Õlu/siider=180, Vein/kange=200)
  const alkLog = lsGet(getAlkoholWeekKey()) ?? [];
  alkLog.filter(e => e.date === dateStr).forEach(e => {
    kcal += e.label === 'Vein/kange' ? 200 : 180;
  });
  return kcal;
}

// Salvestab söögikorra staatuse
function setMealStatus(slotId, status, dateStr) {
  const log = getNutritionLog();
  if (!log[dateStr]) log[dateStr] = {};

  const prevStatus = log[dateStr][slotId] ?? null; // salvesta ENNE muutust
  if (log[dateStr][slotId] === status) {
    log[dateStr][slotId] = null; // toggle off
  } else {
    log[dateStr][slotId] = status;
  }
  const newStatus = log[dateStr][slotId] ?? null;
  // v0.9.6.7: jäta ajatempel — muidu liidab sünk lahtimärkimise vahel tagasi 'eaten'-ks,
  // sest liitmine ei osanud eristada "pole veel märgitud" ja "teadlikult lahti märgitud" (null vs null)
  if (!log[dateStr]._ts) log[dateStr]._ts = {};
  log[dateStr]._ts[slotId] = Date.now();
  lsSet('nutrition_log', log);

  // Auto-vesi: arvestatakse ainult kui eaten-staatus MUUTUB (null/skipped ↔ eaten)
  // Vesi lisatakse ainult eaten-ks märkimisel, lahutatakse ainult eaten-lt eemaldamisel
  const METHOD_WATER_ML = {
    'M03': 250, 'M04': 150, 'M09': 300, 'M10': 400,
    'M12': 250, 'M13': 100, 'M14': 200, 'M17': 200,
  };
  const wasEaten = prevStatus === 'eaten';
  const isNowEaten = newStatus === 'eaten';
  if (dateStr === _localDateStr(new Date()) && wasEaten !== isNowEaten) {
    let waterDelta = 0;
    if (slotId === 'S06') {
      waterDelta = isNowEaten ? 600 : -600;
    } else {
      const recipeId = (lsGet('meal_plan') ?? {})[dateStr]?.[slotId]?.recipe_id;
      const methodWater = METHOD_WATER_ML[recipeId] ?? 0;
      if (methodWater > 0) waterDelta = isNowEaten ? methodWater : -methodWater;
    }
    if (waterDelta !== 0) {
      const curW = lsGet('water_today_' + dateStr) ?? 0;
      lsSet('water_today_' + dateStr, Math.max(0, curW + waterDelta));
    }
  }

  // Uuenda headeri kalorid
  const eaten = calcEatenKcal(dateStr);
  lsSet('kcal_today_' + dateStr, eaten);
  updateDayStats();

  // Kui "ei jõudnud" ja >300 kcal puudu → kuva hädaolukorra kalorid
  if (status === 'skipped' && log[dateStr][slotId] === 'skipped') {
    const target = calcKcalTarget();
    const missing = target - calcEatenKcal(dateStr);
    if (missing > 300) showEmergency(missing);
  }

  renderTab('toitumine');
}

// Vesi
function addWater(ml) {
  const today = _localDateStr(new Date());
  const cur   = lsGet('water_today_' + today) ?? 0;
  lsSet('water_today_' + today, Math.max(0, cur + ml));
  updateDayStats();

}

function addCoffee(delta) {

  lsSet('coffee_today_' + today, Math.max(0, cur + delta));
  updateDayStats();
  renderTab('toitumine');

// Hädaolukorra kalorid
function showEmergency(missingKcal) {
  const ov = document.getElementById('emergency-overlay');
  if (!ov) return;
  const sub = document.getElementById('emergency-missing-kcal');
  if (sub) sub.textContent = `Sul on täna ~${Math.round(missingKcal)} kcal puudu. Vali kiired lisaenergiad:`;

  // Täida nimekiri
  const list = document.getElementById('emergency-list');
  if (list && STATE.recipes?.emergency_calories) {
    list.innerHTML = STATE.recipes.emergency_calories.map(e => `
      <div class="emergency-row">
        <div class="emergency-info">
          <div class="emergency-name">${e.name}</div>
          <div class="emergency-desc">${e.desc}</div>
        </div>
        <div class="emergency-right">
          <div class="emergency-kcal">+${e.kcal} kcal</div>
          <div class="emergency-time">${e.time_sec < 60 ? e.time_sec + ' sek' : Math.round(e.time_sec/60) + ' min'}</div>
        </div>
        <button class="btn-add-emergency" onclick="addEmergencyItem(${e.kcal}, '${(e.name||'').replace(/'/g, "\\'")}', ${e.protein_g||0}, ${e.carbs_g||0}, ${e.fat_g||0})">Lisa</button>
      </div>`).join('');
  }
  ov.classList.add('open');
}

function hideEmergency() {
  document.getElementById('emergency-overlay')?.classList.remove('open');
}

function addEmergencyItem(kcal, name, protein, carbs, fat) {
  // v0.9.6.0: salvesta samasse _custom massiivi nagu käsitsi lisatud toidud →
  // arvestatakse kalorite kogusse (calcEatenKcal), kuvatakse nimekirjas ja on eemaldatav.
  const today = _localDateStr(new Date());
  const nutLog = getNutritionLog();
  if (!nutLog[today]) nutLog[today] = {};
  if (!nutLog[today]._custom) nutLog[today]._custom = [];
  nutLog[today]._custom.push({
    id:        Date.now().toString(36) + Math.random().toString(36).slice(2, 5),
    name,
    kcal,
    protein_g: protein || 0,
    carbs_g:   carbs   || 0,
    fat_g:     fat     || 0,
    added_at:  new Date().toISOString()
  });
  lsSet('nutrition_log', nutLog);
  lsSet('kcal_today_' + today, calcEatenKcal(today));
  updateDayStats();
  hideEmergency();
  showToast(`✓ ${name} lisatud (${kcal} kcal)`);
  renderTab('toitumine');
  log(`Kiire lisaenergia +${kcal} kcal: ${name}`, 'dbg-ok');
}

/* Retsepti detailvaade */
function renderRecipeDetail(methodId, meal) {
  if (!methodId || !STATE.recipes) return '';
  const m = STATE.recipes.methods?.[methodId];
  if (!m) return '';

  let stepsHtml = '';

  if (methodId === 'M04') {
    const mealNameLower = (meal?.name || '').toLowerCase();
    let steps, meta = '';

    if (mealNameLower.includes('energiapall')) {
      steps = m.energiapallid_steps ?? [];
      if (m.energiapallid_kcal) meta = `~${m.energiapallid_kcal} kcal/pall · 3 palli = ~${m.energiapallid_kcal * 3} kcal · ${m.energiapallid_storage || ''}`;
    } else if (mealNameLower.includes('kodujuust')) {
      steps = m.kodujuust_steps ?? [];
      meta = '~380 kcal · valmib 2 minutiga';
    } else {
      // Kaeraporridge jt S01 variandid → öö-kaer
      steps = m.oo_kaer_steps ?? [];
      meta = '~680 kcal · tee eelmisel õhtul, hommikul kohe valmis';
    }

    stepsHtml = steps.map((s, i) => `
      <div class="recipe-step">
        <span class="recipe-step-num">${i+1}.</span>
        <span>${s}</span>
      </div>`).join('');
    if (meta) stepsHtml += `<div class="recipe-meta">${meta}</div>`;
  } else if (methodId === 'M05') {
    // Kas munaröst või hakkliha?
    const isEgg = meal?.name?.toLowerCase().includes('muna') || meal?.name?.toLowerCase().includes('röst');
    const steps = isEgg ? (m.munarost_steps ?? []) : (m.hakkliha_steps ?? []);
    stepsHtml = steps.map((s, i) => `
      <div class="recipe-step">
        <span class="recipe-step-num">${i+1}.</span>
        <span>${s}</span>
      </div>`).join('');
    if (!isEgg && m.hakkliha_note) stepsHtml += `<div class="recipe-meta">${m.hakkliha_note}</div>`;
  } else {
    // Koostisained (kui olemas, nt M08 Trennijook)
    if (m.ingredients?.length) {
      stepsHtml += `<div style="margin-bottom:8px;">` +
        m.ingredients.map(ing =>
          `<div style="font-size:12px;color:var(--text-2);padding:2px 0;">
            <b>${ing.amount}</b> ${ing.name}${ing.calc ? ` <span style="opacity:0.6;">(${ing.calc})</span>` : ''}
          </div>`
        ).join('') +
      `</div>`;
    }
    const steps = m.steps ?? [];
    stepsHtml += steps.map((s, i) => `
      <div class="recipe-step">
        <span class="recipe-step-num">${i+1}.</span>
        <span>${s}</span>
      </div>`).join('');
  }

  // Lisainfo
  let extraHtml = '';
  if (m.storage)     extraHtml += `<div class="recipe-meta">🧊 ${m.storage}</div>`;
  if (m.reheat)      extraHtml += `<div class="recipe-meta">♨️ ${m.reheat}</div>`;
  if (m.pasta_note)  extraHtml += `<div class="recipe-meta">⚠️ ${m.pasta_note}</div>`;
  if (m.note)        extraHtml += `<div class="recipe-meta">💡 ${m.note}</div>`;

  // Asendused (M03)
  let subsHtml = '';
  if (m.subs?.length) {
    subsHtml = `<div style="margin-top:6px;">
      <div class="recipe-title" style="margin-bottom:4px;">Asendused</div>
      ${m.subs.map(s => `<div style="font-size:12px;color:var(--text-2);padding:2px 0;">Pole <b>${s.missing}</b>? → ${s.use}</div>`).join('')}
    </div>`;
  }

  return `
    <div class="recipe-section">
      <div class="recipe-title">${m.emoji || '👨‍🍳'} ${m.name}</div>
      ${m.batch ? `<div style="font-size:11px;color:var(--green);margin-bottom:6px;">✓ Batch-cooking</div>` : ''}
      ${m.intro ? `<div style="font-size:12px;color:var(--text-2);margin-bottom:6px;">${m.intro}</div>` : ''}
      ${stepsHtml}
      ${extraHtml}
      ${subsHtml}
    </div>`;
}

const DAY_SHORT = ['E', 'T', 'K', 'N', 'R', 'L', 'P'];

// Tagastab käesoleva nädala kuupäevad E–P (ISO stringid)
function mpWeekDays() {
  const today = new Date();
  const dow = today.getDay(); // 0=P, 1=E …
  const mondayOffset = dow === 0 ? -6 : 1 - dow;
  return Array.from({ length: 7 }, (_, i) => {
    const d = new Date(today);
    d.setDate(today.getDate() + mondayOffset + i);
    return _localDateStr(d);
  });
}

function mpGenerate() {
  const days = mpWeekDays();
  const trainSched = lsGet('train_sched') ?? [0, 2, 4];
  const plan = lsGet('meal_plan') ?? {};
  days.forEach((dateStr, i) => {
    if (plan[dateStr]) return; // ära kirjuta üle olemasolevat
    const tmpl = MP_WEEK_TEMPLATE[i];
    const dp = {};
    ['S01','S02','S03','S04','S05'].forEach(sid => {
      const rid = tmpl[sid], m = MP_MEALS[rid];
      dp[sid] = { recipe_id: rid, name: m.name, kcal: m.kcal, protein: m.protein, carbs: m.carbs, fat: m.fat };
    });
    if (trainSched.includes(i)) {
      const m = MP_MEALS['M08'];
      dp['S06'] = { recipe_id: 'M08', name: m.name, kcal: m.kcal, protein: m.protein, carbs: m.carbs, fat: m.fat };
    }
    plan[dateStr] = dp;
    _touchMealPlanDay(dateStr);
  });
  lsSet('meal_plan', plan);
  renderTab('mealprep');
}

function mpRegenerate() {
  lsSet('meal_plan', {});
  mpGenerate();
}

function mpSelectDay(dateStr) {

function mpToggleSlot(dateStr, slotId) {
  const key = `${dateStr}_${slotId}`;
  STATE.mealPrepExpandedSlot = STATE.mealPrepExpandedSlot === key ? null : key;

}

function mpSwapSlot(dateStr, slotId) {
  const plan = lsGet('meal_plan') ?? {};
  if (!plan[dateStr]?.[slotId]) return;
  const cur = plan[dateStr][slotId].recipe_id;
  const def = MP_MEALS[cur];
  if (!def) return;
  const alts = Object.entries(MP_MEALS)
    .filter(([id, m]) => m.slot_type === def.slot_type && id !== cur && id !== 'M08')
    .map(([id]) => id);
  if (!alts.length) return;
  const newId = alts[Math.floor(Math.random() * alts.length)];
  const nm = MP_MEALS[newId];
  plan[dateStr][slotId] = { recipe_id: newId, name: nm.name, kcal: nm.kcal, protein: nm.protein, carbs: nm.carbs, fat: nm.fat };
  lsSet('meal_plan', plan);
  _touchMealPlanDay(dateStr); // v0.9.7.0: märgi käsitsi-vahetus ajatempliga, et sünk seda tagasi ei kirjutaks
  STATE.mealPrepExpandedSlot = null;
  renderTab('mealprep');
}

  if (recipe.ingredients?.length) {

// Ehitab märksõnade seti kinnitatud ostukorvi toodetest (fuzzy match-iks)
function mpCartKeywords() {
  if (!STATE.shopping) return new Set();
  const checked = getChecked();
  const kws = new Set();
  STATE.shopping.products.filter(p => checked[p.id]).forEach(p => {
    const name = p.name.toLowerCase().replace(/[()]/g, '').trim();
    name.split(/\s+/).forEach(w => { if (w.length > 2) kws.add(w); });
  });
  return kws;
}

// Kontrollib kas koostisaine nimi kattub ostukorvi tootega (eesliite-match)
function mpIngInCart(ingName, cartKws) {
  const norm = ingName.toLowerCase().replace(/[()]/g, '').trim();
  const words = norm.split(/[\s,+]+/).filter(w => w.length > 2);
  return words.some(w => {
    for (const kw of cartKws) {
      if (w.startsWith(kw) || kw.startsWith(w)) return true;
    }
    return false;
  });
}

function mpToggleExtra(key) {

function renderMpExtraList(plan, days) {
  const cartKws  = mpCartKeywords();
  const checked  = lsGet('mp_extra_checked') ?? {};
  const seen     = {}; // ingName → { qty, dayIdxs: Set, meals: Set }

  days.forEach((dateStr, di) => {
    const dp = plan[dateStr] ?? {};
    Object.entries(dp).forEach(([sid, meal]) => {
      if (!meal?.recipe_id) return;
      const recipe = STATE.recipes?.methods?.[meal.recipe_id];
      if (!recipe?.ingredients) return;
      recipe.ingredients.forEach(ing => {
        if (mpIngInCart(ing.name, cartKws)) return; // juba ostukorvis
        const key = ing.name.toLowerCase().trim();
        if (!seen[key]) seen[key] = { qty: ing.qty, name: ing.name, dayIdxs: new Set(), meals: new Set() };
        seen[key].dayIdxs.add(di);
        seen[key].meals.add(meal.name);
      });
    });
  });

  const items = Object.entries(seen);
  if (!items.length) return '';

  const rows = items.map(([key, ing]) => {
    const isDone = !!checked[key];
    const dayChips = [...ing.dayIdxs].sort().map(i =>
      `<span style="background:var(--surface);border:1px solid var(--border);border-radius:3px;padding:1px 4px;font-size:10px;color:var(--text-2);">${DAY_SHORT[i]}</span>`
    ).join('');
    const mealList = [...ing.meals].join(', ');
    return `
    <div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);${isDone ? 'opacity:0.45;' : ''}">
      <input type="checkbox" ${isDone ? 'checked' : ''} onchange="mpToggleExtra('${key}')"
        style="width:18px;height:18px;accent-color:var(--accent);flex-shrink:0;cursor:pointer;">
      <div style="flex:1;min-width:0;">
        <span style="font-size:13px;font-weight:500;${isDone ? 'text-decoration:line-through;' : ''}">${ing.name}</span>
        <span style="font-size:12px;color:var(--text-3);margin-left:6px;">${ing.qty}</span>
      </div>
      <div style="text-align:right;flex-shrink:0;max-width:110px;">
        <div style="font-size:10px;color:var(--text-3);margin-bottom:3px;line-height:1.3;">${mealList}</div>
        <div style="display:flex;gap:2px;flex-wrap:wrap;justify-content:flex-end;">${dayChips}</div>
      </div>
    </div>`;
  }).join('');

  return `
  <div class="card" style="margin-top:var(--sp-md);">
    <div style="font-weight:600;font-size:14px;margin-bottom:4px;">🛒 Lisa koostisained</div>
    <div style="font-size:12px;color:var(--text-2);margin-bottom:10px;">Nädalaplaani jaoks puuduvad tooted (ostukorvis pole märgitud):</div>
    ${rows}
  </div>`;
}

          <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-top:2px;"><span style="font-size:13px;color:var(--text-2);">${m.name}</span>${def.satiety==='low'?'<span style="font-size:10px;background:#dcfce7;color:#166534;padding:1px 5px;border-radius:8px;">🟢 kergesti söödav</span>':def.satiety==='high'?'<span style="font-size:10px;background:#fee2e2;color:#dc2626;padding:1px 5px;border-radius:8px;">🔴 täitev</span>':''}</div>
          <div style="font-size:11px;color:var(--text-3);margin-top:1px;">${m.kcal} kcal · ${m.protein}g V · ${m.carbs}g SV · ${m.fat}g R</div>
        </div>
        <div style="color:var(--text-3);font-size:14px;flex-shrink:0;">${isExp ? '▲' : '▼'}</div>
      </div>
      ${isExp ? `<div style="border-top:1px solid var(--border);margin-top:10px;padding-top:10px;">
        ${mpRecipeDetail(m.recipe_id)}
        <div style="display:flex;gap:8px;margin-top:10px;">
          <button onclick="mpSwapSlot('${selDay}','${sid}')" style="width:100%;padding:9px 4px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r-sm);font-size:13px;cursor:pointer;">🔄 Vaheta retsept</button>
        </div>
      </div>` : ''}
    </div>`;
  }).join('');

  // Päeva kcal kokku
  const dayKcal = slots.reduce((s, sid) => s + (dayPlan[sid]?.kcal ?? 0), 0);

  /* ---- Prep-sessiooni tracker (Quiet Data) ----
     Nimekirjas nädalaplaani kasutatud batch-retseptid (fallback: kõik batch-retseptid). */
  const prepDone = mpPrepDone();
  const usage = {}; // recipe_id → [kuupäevad kus kasutusel]
  days.forEach(d => {
    Object.values(plan[d] ?? {}).forEach(m => {
      if (m?.recipe_id && mpIsBatch(m.recipe_id)) {
        (usage[m.recipe_id] = usage[m.recipe_id] ?? []).push(d);
      }
    });
  });
  let prepItems = batchItems.filter(b => usage[b.recipe_id]?.length);
  if (!prepItems.length) prepItems = batchItems;
  const doneCount = prepItems.filter(b => prepDone[b.recipe_id]).length;
  const prepPct   = prepItems.length ? Math.round(doneCount / prepItems.length * 100) : 0;
  const nextIdx   = prepItems.findIndex(b => !prepDone[b.recipe_id]);

  // Portsjonid: mitu korda retsept nädalaplaanis esineb; külmkapp = järgmise 4 päeva portsjonid, ülejäänu sügavkülm
  const day4 = _localDateStr(new Date(Date.now() + 3 * 86400000));
  const storSplit = {}; // recipe_id → { fridge, freezer }
  let portionsTotal = 0, fridgeN = 0, freezerN = 0;
  prepItems.forEach(b => {
    const s = { fridge: 0, freezer: 0 };
    (usage[b.recipe_id] ?? []).forEach(d => { if (d <= day4) s.fridge++; else s.freezer++; });
    storSplit[b.recipe_id] = s;
    portionsTotal += s.fridge + s.freezer;
    fridgeN += s.fridge;
    freezerN += s.freezer;
  });

  const tagChips = b => {
    const chips = [];
    if (b.satiety === 'high') chips.push('Täitev');
    if (b.satiety === 'low')  chips.push('Kergesti söödav');
    if (b.slot_type === 'trennijook') chips.push('Trennipäeval');
    return chips.map(c => `<span style="background:var(--chip);border:1px solid var(--border);border-radius:7px;padding:3px 7px;font:500 9.5px/1 var(--font);color:var(--text-2);">${c}</span>`).join('');
  };

  const prepRows = prepItems.map((b, i) => {
    const done = !!prepDone[b.recipe_id];
    const isNext = i === nextIdx;
    const uses = usage[b.recipe_id]?.length ?? 0;
    const isExp = STATE.mpPrepExpanded === b.recipe_id;
    return `
    <div class="card" style="margin-bottom:8px;${done ? 'opacity:0.65;' : ''}${isNext ? 'border-color:var(--accent);' : ''}">
      <div style="display:flex;align-items:flex-start;gap:11px;">
        <div onclick="mpTogglePrepDone('${b.recipe_id}')" style="width:22px;height:22px;border-radius:7px;flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;margin-top:1px;${done ? 'background:var(--accent);color:#fff;' : 'background:var(--surface);border:1.5px solid var(--border-strong);color:transparent;'}font:700 12px/1 var(--font-mono);">✓</div>
        <div style="flex:1;min-width:0;cursor:pointer;" onclick="mpTogglePrepRecipe('${b.recipe_id}')">
          <div style="display:flex;align-items:center;gap:7px;flex-wrap:wrap;">
            <span style="font:600 13.5px/1.2 var(--font);color:var(--text-1);${done ? 'text-decoration:line-through;color:var(--text-3);' : ''}">${b.emoji} ${b.name}</span>
            ${isNext && !done ? `<span style="background:var(--accent-bg);color:var(--accent);border-radius:7px;padding:3px 7px;font:600 9px/1 var(--font);letter-spacing:0.4px;text-transform:uppercase;">Järgmine</span>` : ''}
            <span style="margin-left:auto;color:var(--text-3);font-size:11px;flex-shrink:0;">${isExp ? '▲' : '▼ retsept'}</span>
          </div>
          <div style="font:500 10px/1.4 var(--font-mono);color:var(--text-3);margin-top:3px;">${uses
            ? `Tee valmis ${uses} ${uses === 1 ? 'portsjon' : 'portsjonit'}${b.recipe_id === 'snack_energiapall' ? ' (1 ports = 3 palli)' : ''} (nädalaplaani järgi)${storSplit[b.recipe_id]?.freezer ? ` — külmkappi ${storSplit[b.recipe_id].fridge}, sügavkülma ${storSplit[b.recipe_id].freezer}` : ' — kõik külmkappi'}`
            : (b.batch_note || '')}</div>
          <div style="display:flex;gap:5px;margin-top:6px;flex-wrap:wrap;">${tagChips(b)}</div>
          <div style="display:flex;justify-content:space-between;border-top:1px solid var(--track);margin-top:9px;padding-top:8px;">
            <span style="font:600 11px/1 var(--font-mono);color:var(--text-1);">${b.kcal}<span style="color:var(--text-3);font-weight:500;"> kcal/ports</span></span>
            <span style="font:500 10px/1 var(--font-mono);color:var(--text-3);">V ${b.protein}g · S ${b.carbs}g · R ${b.fat}g</span>
          </div>
        </div>
      </div>
      ${isExp ? `<div style="border-top:1px solid var(--track);margin-top:11px;padding-top:11px;">${mpRecipeDetail(b.recipe_id) || '<div style="font-size:12px;color:var(--text-3);">Retsepti detailid puuduvad.</div>'}</div>` : ''}
    </div>`;
  }).join('');

  const batchSection = prepItems.length ? `
    <div style="font:600 11px/1 var(--font);letter-spacing:0.6px;color:var(--text-3);text-transform:uppercase;margin:16px 0 8px;padding:0 2px;">🍱 Pühapäeva prep-sessioon</div>
    <div class="card" style="border-radius:var(--r-lg);display:flex;flex-direction:column;gap:10px;">
      <div style="display:flex;justify-content:space-between;align-items:baseline;">
        <span style="font:600 13px/1 var(--font);color:var(--text-1);">Retseptid ette valmis</span>
        <span style="font:700 13px/1 var(--font-mono);color:var(--text-1);">${doneCount}<span style="color:var(--text-3);font-weight:500;">/${prepItems.length}</span></span>
      </div>
      <div style="height:8px;background:var(--track);border-radius:5px;overflow:hidden;"><div style="height:100%;width:${prepPct}%;background:${prepPct >= 100 ? 'var(--green)' : 'var(--accent)'};border-radius:5px;"></div></div>
      <div style="display:flex;justify-content:space-between;">
        <span style="font:500 9px/1 var(--font);color:var(--text-3);">Portsjonid<br><span style="font:700 13px/1.6 var(--font-mono);color:var(--text-1);">${portionsTotal}</span></span>
        <span style="font:500 9px/1 var(--font);color:var(--text-3);text-align:center;">Karbid<br><span style="font:700 13px/1.6 var(--font-mono);color:var(--text-1);">${portionsTotal}</span></span>
        <span style="font:500 9px/1 var(--font);color:var(--text-3);text-align:right;">Säilivus<br><span style="font:700 13px/1.6 var(--font-mono);color:var(--text-1);">3–4<span style="font-size:9px;color:var(--text-3);font-weight:500;"> päeva</span></span></span>
      </div>
    </div>
    ${prepRows}
    <div class="card-dark" style="display:flex;flex-direction:column;gap:10px;">
      <div style="font:600 8.5px/1 var(--font);letter-spacing:1px;color:var(--dark-text-2);text-transform:uppercase;">Külmkapis / sügavkülmas</div>
      <div style="display:flex;gap:14px;">
        <div style="flex:1;">
          <div style="font:700 22px/1 var(--font-mono);color:#fff;">${fridgeN}<span style="font-size:11px;color:var(--dark-text-2);font-weight:500;"> karpi</span></div>
          <div style="font:500 9.5px/1.4 var(--font);color:var(--dark-text-2);margin-top:4px;">Külmkapp — järgmise 4 päeva portsjonid</div>
        </div>
        <div style="width:1px;background:var(--dark-2);"></div>
        <div style="flex:1;">
          <div style="font:700 22px/1 var(--font-mono);color:#fff;">${freezerN}<span style="font-size:11px;color:var(--dark-text-2);font-weight:500;"> karpi</span></div>
          <div style="font:500 9.5px/1.4 var(--font);color:var(--dark-text-2);margin-top:4px;">Sügavkülm — nädala teine pool</div>
        </div>
      </div>
      <div style="height:1px;background:var(--dark-2);"></div>
      ${prepItems.filter(b => (usage[b.recipe_id]?.length ?? 0) > 0).map(b => {
        const s = storSplit[b.recipe_id] ?? { fridge: 0, freezer: 0 };
        return `
        <div style="display:flex;align-items:center;justify-content:space-between;gap:8px;">
          <span style="font:500 11px/1.3 var(--font);color:#E8E2D6;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${b.emoji} ${b.name}</span>
          <span style="font:600 10.5px/1 var(--font-mono);color:var(--dark-text-2);white-space:nowrap;flex-shrink:0;">külmkapp ${s.fridge}${s.freezer ? ` · sügavkülm ${s.freezer}` : ''}</span>
        </div>`;
      }).join('')}
    </div>` : '';

  /* Quiet Data: pealkiri + tehtud-suhe */
  const fmtRange = () => {
    const a = new Date(days[0]), b = new Date(days[6]);
    return `${a.getDate()}.${String(a.getMonth()+1).padStart(2,'0')}–${b.getDate()}.${String(b.getMonth()+1).padStart(2,'0')}`;
  };

  return `<div style="padding:var(--sp-md);">

    <div style="display:flex;justify-content:space-between;align-items:flex-start;padding:2px 2px 12px;">
      <div>
        <div style="font:700 23px/1.1 var(--font);color:var(--text-1);letter-spacing:-0.4px;">Meal Prep</div>
        <div style="font:500 11px/1 var(--font-mono);color:var(--text-3);margin-top:5px;letter-spacing:0.3px;">Nädal ${fmtRange()} · ${prepItems.length} retsepti</div>
      </div>
      <div style="background:var(--chip);border:1px solid var(--border);border-radius:9px;padding:6px 10px;font:700 12px/1 var(--font-mono);color:var(--text-1);white-space:nowrap;">${doneCount}<span style="color:var(--text-3);font-weight:500;">/${prepItems.length}</span></div>
    </div>

    ${hasRepeat
      ? `<div style="background:rgba(224,168,61,0.12);border:1px solid var(--amber);border-radius:var(--r-sm);padding:8px 12px;margin-bottom:10px;font-size:13px;">⚠️ Mõni retsept kordub üle 2× — <button onclick="mpRegenerate()" style="background:none;border:none;color:var(--accent);cursor:pointer;font-size:13px;font-weight:600;padding:0;">genereeri uuesti</button></div>`
      : `<div style="background:rgba(76,154,106,0.1);border:1px solid var(--green);border-radius:var(--r-sm);padding:8px 12px;margin-bottom:10px;font-size:13px;color:#2C5E40;">✅ Hea vaheldus nädalas</div>`
    }

    <div style="display:flex;gap:3px;background:var(--chip);border-radius:12px;padding:3px;margin-bottom:var(--sp-md);">${dayTabs}</div>

    <div style="display:flex;align-items:baseline;justify-content:space-between;margin-bottom:8px;">
      <div>
        <span style="font-weight:600;font-size:16px;">${DAY_FULL[selIdx] ?? selDay}</span>
        ${selDay === today ? `<span style="font-size:11px;color:var(--accent);margin-left:6px;font-weight:600;">Täna</span>` : ''}
      </div>
      <div style="text-align:right;">
        <span style="font:700 20px/1 var(--font-mono);">${dayKcal}</span>
        <span style="font:500 12px/1 var(--font-mono);color:var(--text-3);"> kcal</span>
      </div>
    </div>

    ${slotCards}

    ${batchSection}

    ${renderMpExtraList(plan, days)}

    <div style="margin-top:var(--sp-md);text-align:center;">
      <button onclick="mpRegenerate()" style="background:none;border:0.5px solid var(--border);border-radius:var(--r-sm);padding:8px 16px;font-size:12px;color:var(--text-2);cursor:pointer;">🔄 Genereeri uus nädalaplaan</button>
    </div>
  </div>`;
}


/* ============================================================
   TAB 3 — TOITUMINE (päeva logi)
   Loeb söögikordade info ttm_meal_plan-ist (genereeritud Meal Prep tabis).
   Ainulaadsed funktsioonid: vesi, lisandid, hädaolukorra kalorid, käsitsi sisestus.
============================================================ */

const TOITUMINE_SLOT_ORDER = ['S01','S02','S03','S04','S05','S06'];
const TOITUMINE_SLOT_EMOJI = { S01:'🌅', S02:'🥜', S03:'🍽', S04:'🍎', S05:'🌙', S06:'💪' };

/* ---- Kiirlisamine: "Viimati söödud" (v0.9.3.5, Quiet Data) ---- */
function getRecentCustomFoods() {
  const log = getNutritionLog();
  const all = [];
  Object.values(log).forEach(day => (day?._custom || []).forEach(e => all.push(e)));
  all.sort((a, b) => (b.added_at ?? '').localeCompare(a.added_at ?? ''));
  const seen = new Set(), out = [];
  for (const e of all) {
    const key = (e.name ?? '').toLowerCase();
    if (!key || seen.has(key)) continue;
    seen.add(key);
    out.push(e);
    if (out.length >= 6) break;
  }
  return out;
}

function toggleRecentFoods() {
  STATE.showRecentFoods = !STATE.showRecentFoods;
  renderTab('toitumine');
}

/* v0.9.4.5: Toitumine söögisloti laiendus (retsept nagu Meal Prepis) */
function toitToggleSlot(sid) {
  STATE.toitExpandedSlot = STATE.toitExpandedSlot === sid ? null : sid;
  renderTab('toitumine');
}

function addRecentFood(i, dateStr) {
  const src = (STATE._recentFoods ?? [])[i];
  if (!src) return;
  const log = getNutritionLog();
  if (!log[dateStr]) log[dateStr] = {};
  if (!log[dateStr]._custom) log[dateStr]._custom = [];
  log[dateStr]._custom.push({
    id: Date.now().toString(36),
    name: src.name, kcal: src.kcal,
    protein_g: src.protein_g ?? 0, carbs_g: src.carbs_g ?? 0, fat_g: src.fat_g ?? 0,
    added_at: new Date().toISOString()
  });
  lsSet('nutrition_log', log);
  lsSet('kcal_today_' + dateStr, calcEatenKcal(dateStr));
  updateDayStats();
  showToast('✓ ' + src.name + ' lisatud');
  renderTab('toitumine');
}

function qaOpenForm(dateStr, mode) {
  if (!STATE.showCustomForm) toggleCustomForm(dateStr);
  if (mode === 'scan')   setTimeout(() => scanBarcode(), 200);
  if (mode === 'search') setTimeout(() => document.getElementById('custom-inp-name')?.focus(), 200);
}

function renderToitumine() {
  const today    = _localDateStr(new Date());
  const todayNum = getTodayDayNum();
  const selDay   = getSelectedDay();
  const selDate  = getDateForDayNum(selDay);

  const plan    = lsGet('meal_plan') ?? {};
  const planDay = plan[selDate] ?? null;
  const log     = getNutritionLogForDate(selDate);

  // Kalorite arvestus
  const kcalTarget = calcKcalTarget();
  let kcalEaten = 0, protEaten = 0, carbsEaten = 0, fatEaten = 0;
  if (planDay) {
    Object.entries(planDay).forEach(([sid, m]) => {
      if (log[sid] === 'eaten' && m) {
        kcalEaten  += m.kcal    ?? 0;
        protEaten  += m.protein ?? 0;
        carbsEaten += m.carbs   ?? 0;
        fatEaten   += m.fat     ?? 0;
      }
    });
  }
  (log._custom || []).forEach(e => { kcalEaten += e.kcal ?? 0; });
  // v0.9.4.2 fix: alkoholi kalorid kuuluvad päeva bilanssi (sama loogika mis calcEatenKcal)
  const alkKcalDay = (lsGet(getAlkoholWeekKey()) ?? [])
    .filter(e => e.date === selDate)
    .reduce((s, e) => s + (e.label === 'Vein/kange' ? 200 : 180), 0);
  kcalEaten += alkKcalDay;
  const kcalPct  = Math.min(100, Math.round(kcalEaten / kcalTarget * 100));
  const barColor = kcalPct >= 100 ? 'var(--green)' : kcalPct > 60 ? 'var(--accent)' : 'var(--amber)';

  // Vesi + kohv (ainult täna)
  const waterTarget = STATE.user?.water_target_ml ?? 2750;
  const waterMl     = lsGet('water_today_' + today) ?? 0;
  const coffeeCups  = lsGet('coffee_today_' + today) ?? 0;
  const coffeeMl    = coffeeCups * 200;
  const totalMl     = waterMl + coffeeMl;
  const waterPct    = Math.min(100, Math.round(totalMl / waterTarget * 100));
  const waterL      = (waterMl / 1000).toFixed(1).replace('.', ',');
  const totalL      = (totalMl / 1000).toFixed(1).replace('.', ',');
  const waterTL     = (waterTarget / 1000).toFixed(1).replace('.', ',');

  // Päeva selector
  const daySelectorHtml = Array.from({length: 7}, (_, i) => {
    const n = i + 1;
    const dateN = getDateForDayNum(n);
    const logN  = getNutritionLog()[dateN] ?? {};
    const hasLog = Object.values(logN).some(v => v === 'eaten' || v === 'skipped');
    const isToday = n === todayNum;
    const isSel   = n === selDay;
    const d = new Date(dateN + 'T12:00:00');
    const dayOfMonth = d.getDate();
    return `
      <button class="day-btn ${isSel ? 'active' : ''} ${hasLog && !isSel ? 'has-log' : ''}"
        onclick="selectDay(${n})">
        <span class="day-name">${isToday ? 'Täna' : getDayLabel(n)}</span>
        <span class="day-num">${dayOfMonth}</span>
      </button>`;
  }).join('');

  // Järgmine söök (ainult täna)
  let nextMealHtml = '';
  if (selDay === todayNum && planDay) {
    const now = new Date();
    const nowMin = now.getHours() * 60 + now.getMinutes();
    const nextSid = TOITUMINE_SLOT_ORDER.find(sid => {
      if (!planDay[sid]) return false;
      if (log[sid] === 'eaten' || log[sid] === 'skipped') return false;
      const t = MP_SLOT_TIMES[sid] ?? '';
      if (!t.includes(':')) return false;
      const [h, m] = t.split(':').map(Number);
      return (h * 60 + m) > nowMin;
    });
    if (nextSid) {
      const nm = planDay[nextSid];
      const em = MP_MEALS[nm.recipe_id]?.emoji ?? TOITUMINE_SLOT_EMOJI[nextSid];
      nextMealHtml = `<div style="font-size:11px;color:var(--text-2);margin-top:4px;">
        Järgmine: ${em} <b>${nm.name}</b> kell ${MP_SLOT_TIMES[nextSid]}
      </div>`;
    }
  }

  // Söögislotid
  let slotsHtml = '';
  if (!planDay) {
    slotsHtml = `<div class="card" style="text-align:center;padding:var(--sp-lg);margin-bottom:var(--sp-sm);">
      <div style="font-size:32px;margin-bottom:8px;">📋</div>
      <div style="font-weight:600;font-size:15px;margin-bottom:6px;">Nädalaplaani pole</div>
      <div style="font-size:13px;color:var(--text-2);margin-bottom:var(--sp-md);">Loo Meal Prep tabis nädala toiduplaan, seejärel saad siin söögid logida.</div>
      <button onclick="switchTab('mealprep')" style="background:var(--accent);color:#fff;border:none;border-radius:var(--r-md);padding:10px 20px;font-size:14px;font-weight:600;cursor:pointer;">Mine Meal Preppi →</button>
    </div>`;
  } else {
    const supps = STATE.supplements?.supplements ?? [];
    // Grupeeri lisandid sloti järgi
    const suppsBySlot = {};
    supps.forEach(s => {
      if (!suppsBySlot[s.slot]) suppsBySlot[s.slot] = [];
      suppsBySlot[s.slot].push(s);
    });
    // Trennislot: S06 → 'trenn', muidu 1:1
    const suppSlot = sid => sid === 'S06' ? 'trenn' : sid;

    const suppRow = items => items.length ? `
      <div style="display:flex;flex-wrap:wrap;gap:6px;padding:8px 12px 10px;border-top:0.5px solid var(--border);">
        ${items.map(s => `<span style="font-size:11px;color:var(--text-2);background:var(--surface);border:0.5px solid var(--border);border-radius:10px;padding:3px 8px;">${s.emoji} ${s.name} <b>${s.dose}</b></span>`).join('')}
      </div>` : '';

    slotsHtml = TOITUMINE_SLOT_ORDER
      .filter(sid => planDay[sid])
      .map(sid => {
        const m       = planDay[sid];
        const status  = log[sid] ?? null;
        const eaten   = status === 'eaten';
        const skipped = status === 'skipped';
        const emoji   = MP_MEALS[m.recipe_id]?.emoji ?? TOITUMINE_SLOT_EMOJI[sid];
        const slotSupps = suppsBySlot[suppSlot(sid)] ?? [];
        const isExp   = STATE.toitExpandedSlot === sid;
        const protBadge = (m.protein ?? 0) >= 40
          ? `<span title="40g+ valku" style="flex-shrink:0;font:600 9px/1 var(--font-mono);background:rgba(76,154,106,0.12);color:var(--green);border-radius:6px;padding:2px 5px;">✓ 40g+</span>`

/* SVG kaalugraafik */
function renderWeightChart(entries, weeks) {
  const W = 380, H = 160;
  const PAD = { top: 12, right: 12, bottom: 28, left: 38 };
  const pw = W - PAD.left - PAD.right;
  const ph = H - PAD.top - PAD.bottom;

  if (!entries.length) {
    return `<div class="chart-empty">📊 Kaalukirjed puuduvad<br><span style="font-size:11px;">Lisa esimene kaalumine allpool</span></div>`;
  }

  // Ajavahemik
  const now   = new Date();
  const start = new Date(now);
  start.setDate(start.getDate() - weeks * 7);

  const filtered = entries
    .filter(e => new Date(e.date) >= start)
    .sort((a, b) => a.date.localeCompare(b.date));

  if (!filtered.length) {
    return `<div class="chart-empty">Sellel perioodil andmed puuduvad</div>`;
  }

  const weights = filtered.map(e => e.weight_kg);
  const minW = Math.floor(Math.min(...weights) - 1);
  const maxW = Math.ceil(Math.max(...weights) + 1);
  const goalW = STATE.user?.goal_weight_kg ?? 78;

  const toX = date => {
    const ms  = new Date(date) - start;
    const tot = now - start;
    return PAD.left + (ms / tot) * pw;
  };
  const toY = w => PAD.top + ph - ((w - minW) / (maxW - minW)) * ph;

  // Y-axis labels (3 ticks)
  const yTicks = [minW, Math.round((minW + maxW) / 2), maxW];
  const yTicksHtml = yTicks.map(v => `
    <text x="${PAD.left - 4}" y="${toY(v) + 4}" text-anchor="end"
      font-size="10" fill="var(--text-3)">${v}</text>
    <line x1="${PAD.left}" y1="${toY(v)}" x2="${PAD.left + pw}" y2="${toY(v)}"
      stroke="var(--border)" stroke-width="0.5"/>`).join('');

  // X-axis ticks (nädalad)
  const xTickCount = Math.min(weeks, 6);
  const xTicksHtml = Array.from({length: xTickCount + 1}, (_, i) => {
    const d = new Date(start);
    d.setDate(d.getDate() + Math.round(i * weeks * 7 / xTickCount));
    const x = toX(_localDateStr(d));
    const label = `${d.getDate()}.${d.getMonth() + 1}`;
    return `<text x="${x}" y="${H - 4}" text-anchor="middle" font-size="9" fill="var(--text-3)">${label}</text>`;
  }).join('');

  // Eesmärgi joon (kui eesmärk on vahemikus)
  let goalLineHtml = '';
  if (goalW >= minW && goalW <= maxW) {
    const gy = toY(goalW);
    goalLineHtml = `
      <line x1="${PAD.left}" y1="${gy}" x2="${PAD.left + pw}" y2="${gy}"
        stroke="var(--green)" stroke-width="1" stroke-dasharray="4 3" opacity="0.6"/>
      <text x="${PAD.left + pw + 2}" y="${gy + 4}" font-size="9" fill="var(--green)">${goalW}</text>`;
  }

  // Bony to Beastly tempo tsoon (0.5–2.3 kg/näd alates esimesest mõõtmisest)
  let tempoZoneHtml = '';
  if (filtered.length >= 1) {
    const firstW  = filtered[0].weight_kg;
    const firstX  = toX(filtered[0].date);
    const lastX   = PAD.left + pw;
    const msTotal = now - new Date(filtered[0].date);
    const weeksEl = msTotal / (7 * 24 * 3600 * 1000);

    const loW = firstW + 0.5 * weeksEl;
    const hiW = firstW + 2.3 * weeksEl;
    const loY = Math.max(PAD.top, toY(Math.min(loW, maxW)));
    const hiY = Math.max(PAD.top, toY(Math.max(hiW, minW)));

    const lastLoY = Math.max(PAD.top, toY(Math.min(loW, maxW)));
    const lastHiY = Math.max(PAD.top, toY(Math.max(hiW, minW)));

    tempoZoneHtml = `
      <polygon points="${firstX},${toY(firstW)} ${lastX},${lastLoY} ${lastX},${lastHiY} ${firstX},${toY(firstW)}"
        fill="var(--green)" opacity="0.08"/>`;
  }

  // Joon andmepunktide vahel
  const linePoints = filtered.map(e => `${toX(e.date)},${toY(e.weight_kg)}`).join(' ');
  const lineHtml   = filtered.length > 1
    ? `<polyline points="${linePoints}" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>`
    : '';

  // Andmepunktid
  const dotsHtml = filtered.map(e => {
    const x = toX(e.date);
    const y = toY(e.weight_kg);
    return `<circle cx="${x}" cy="${y}" r="3.5" fill="var(--surface)" stroke="var(--accent)" stroke-width="2"/>
      <title>${e.date}: ${e.weight_kg} kg</title>`;
  }).join('');

  // Tempo legend
  const first = filtered[0];
  const last  = filtered[filtered.length - 1];
  const daysEl = (new Date(last.date) - new Date(first.date)) / (24 * 3600 * 1000);
  const weeksEl2 = daysEl / 7 || 1;
  const totalGain = last.weight_kg - first.weight_kg;
  const weeklyRate = totalGain / weeksEl2;
  const tempoOk  = weeklyRate >= 0.5 && weeklyRate <= 2.3;
  const tempoSlow = weeklyRate < 0.5;

  const tempoColor = tempoOk ? 'var(--green)' : tempoSlow ? 'var(--amber)' : 'var(--red)';
  const tempoLabel = tempoOk ? '✅ Hea tempo' : tempoSlow ? '⚠ Liiga aeglane' : '⚠ Liiga kiire';

  return `
    <svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto;overflow:visible;">
      ${yTicksHtml}
      ${xTicksHtml}
      ${tempoZoneHtml}
      ${goalLineHtml}
      ${lineHtml}
      ${dotsHtml}
    </svg>
    <div class="chart-stat-row">
      <div class="chart-stat">
        <div class="chart-stat-val">${first.weight_kg} kg</div>
        <div class="chart-stat-label">Algus</div>
      </div>
      <div class="chart-stat">
        <div class="chart-stat-val" style="color:${tempoColor};">${weeklyRate >= 0 ? '+' : ''}${weeklyRate.toFixed(2)} kg/näd</div>
        <div class="chart-stat-label">${tempoLabel}</div>
      </div>
      <div class="chart-stat">
        <div class="chart-stat-val">${last.weight_kg} kg</div>
        <div class="chart-stat-label">Praegu</div>
      </div>
    </div>`;
}

/* SVG ühemõõtme graafik (õlg / biitseps / vöö) */
function renderMeasurementChart(entries, weeks, field, label, unit, color) {
  const W = 380, H = 160;
  const PAD = { top: 12, right: 12, bottom: 28, left: 42 };
  const pw = W - PAD.left - PAD.right;
  const ph = H - PAD.top - PAD.bottom;

  const now = new Date();
  const start = new Date(now);
  start.setDate(start.getDate() - weeks * 7);

  const filtered = entries
    .filter(e => new Date(e.date) >= start && e[field] != null)
    .sort((a, b) => a.date.localeCompare(b.date));

  if (!filtered.length) {
    return `<div class="chart-empty">📊 ${label} andmed puuduvad<br><span style="font-size:11px;">Lisa mõõtmised allpool</span></div>`;
  }

  const vals = filtered.map(e => e[field]);
  const minV = Math.floor(Math.min(...vals) - 1);
  const maxV = Math.ceil(Math.max(...vals) + 1);

  const toX = date => PAD.left + ((new Date(date) - start) / (now - start)) * pw;
  const toY = v => PAD.top + ph - ((v - minV) / (maxV - minV || 1)) * ph;

  const yTicks = [minV, Math.round((minV + maxV) / 2), maxV];
  const yTicksHtml = yTicks.map(v => `
    <text x="${PAD.left - 4}" y="${toY(v) + 4}" text-anchor="end" font-size="10" fill="var(--text-3)">${v}</text>
    <line x1="${PAD.left}" y1="${toY(v)}" x2="${PAD.left + pw}" y2="${toY(v)}" stroke="var(--border)" stroke-width="0.5"/>`).join('');

  const xTickCount = Math.min(weeks, 6);
  const xTicksHtml = Array.from({length: xTickCount + 1}, (_, i) => {
    const d = new Date(start);
    d.setDate(d.getDate() + Math.round(i * weeks * 7 / xTickCount));
    const x = toX(_localDateStr(d));
    return `<text x="${x}" y="${H - 4}" text-anchor="middle" font-size="9" fill="var(--text-3)">${d.getDate()}.${d.getMonth()+1}</text>`;
  }).join('');

  const linePoints = filtered.map(e => `${toX(e.date)},${toY(e[field])}`).join(' ');
  const lineHtml = filtered.length > 1
    ? `<polyline points="${linePoints}" fill="none" stroke="${color}" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>`
    : '';
  const dotsHtml = filtered.map(e => `
    <circle cx="${toX(e.date)}" cy="${toY(e[field])}" r="3.5" fill="var(--surface)" stroke="${color}" stroke-width="2">
      <title>${e.date}: ${e[field]} ${unit}</title></circle>`).join('');

  const first = filtered[0], last = filtered[filtered.length - 1];
  const diff = last[field] - first[field];
  const diffColor = diff >= 0 ? 'var(--green)' : 'var(--red)';

  return `
    <svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto;overflow:visible;">
      ${yTicksHtml}${xTicksHtml}${lineHtml}${dotsHtml}
    </svg>
    <div class="chart-stat-row">
      <div class="chart-stat"><div class="chart-stat-val">${first[field]} ${unit}</div><div class="chart-stat-label">Algus</div></div>
      <div class="chart-stat"><div class="chart-stat-val" style="color:${diffColor};">${diff >= 0 ? '+' : ''}${diff.toFixed(1)} ${unit}</div><div class="chart-stat-label">Muutus</div></div>
      <div class="chart-stat"><div class="chart-stat-val">${last[field]} ${unit}</div><div class="chart-stat-label">Praegu</div></div>
    </div>`;
}

/* SVG kõik mõõtmed koos — delta algusest */
function renderAllMeasurementsChart(entries, weeks) {
  const METRICS = [
    { field: 'weight_kg',   label: 'Kaal',     unit: 'kg', color: 'var(--accent)' },
    { field: 'shoulder_cm', label: 'Õlg',      unit: 'cm', color: 'var(--green)'  },
    { field: 'bicep_cm',    label: 'Biitseps',  unit: 'cm', color: 'var(--amber)'  },
    { field: 'waist_cm',    label: 'Vöö',       unit: 'cm', color: 'var(--red)'    }
  ];

  const W = 380, H = 180;
  const PAD = { top: 16, right: 12, bottom: 28, left: 42 };
  const pw = W - PAD.left - PAD.right;
  const ph = H - PAD.top - PAD.bottom;

  const now = new Date();
  const start = new Date(now);
  start.setDate(start.getDate() - weeks * 7);

  const toX = date => PAD.left + ((new Date(date) - start) / (now - start)) * pw;

  // Esimene väärtus iga mõõtme jaoks — delta arvutamiseks
  const firstVals = {};
  METRICS.forEach(m => {
    const e = entries.filter(e => new Date(e.date) >= start && e[m.field] != null)
      .sort((a, b) => a.date.localeCompare(b.date))[0];
    if (e) firstVals[m.field] = e[m.field];
  });

  // Kõik delta väärtused Y-skaala jaoks
  const allDeltas = [];
  METRICS.forEach(m => {
    if (firstVals[m.field] == null) return;
    entries.filter(e => new Date(e.date) >= start && e[m.field] != null)
      .forEach(e => allDeltas.push(e[m.field] - firstVals[m.field]));
  });

  if (!allDeltas.length) {
    return `<div class="chart-empty">📊 Andmed puuduvad<br><span style="font-size:11px;">Lisa mõõtmised allpool</span></div>`;
  }

  const minD = Math.floor(Math.min(...allDeltas) - 0.5);
  const maxD = Math.ceil(Math.max(...allDeltas) + 0.5);
  const range = maxD - minD || 1;
  const toY = d => PAD.top + ph - ((d - minD) / range) * ph;

  const yTicks = [...new Set([minD, 0, maxD])];
  const yTicksHtml = yTicks.map(v => `
    <text x="${PAD.left - 4}" y="${toY(v) + 4}" text-anchor="end" font-size="10" fill="var(--text-3)">${v >= 0 ? '+' : ''}${v}</text>
    <line x1="${PAD.left}" y1="${toY(v)}" x2="${PAD.left + pw}" y2="${toY(v)}" stroke="var(--border)" stroke-width="${v === 0 ? 1 : 0.5}" stroke-dasharray="${v === 0 ? '4 3' : ''}"/>`).join('');

  const xTickCount = Math.min(weeks, 6);
  const xTicksHtml = Array.from({length: xTickCount + 1}, (_, i) => {
    const d = new Date(start);
    d.setDate(d.getDate() + Math.round(i * weeks * 7 / xTickCount));
    const x = toX(_localDateStr(d));
    return `<text x="${x}" y="${H - 4}" text-anchor="middle" font-size="9" fill="var(--text-3)">${d.getDate()}.${d.getMonth()+1}</text>`;
  }).join('');

  const linesHtml = METRICS.map(m => {
    if (firstVals[m.field] == null) return '';
    const pts = entries
      .filter(e => new Date(e.date) >= start && e[m.field] != null)
      .sort((a, b) => a.date.localeCompare(b.date))
      .map(e => `${toX(e.date)},${toY(e[m.field] - firstVals[m.field])}`).join(' ');
    if (!pts) return '';
    return `<polyline points="${pts}" fill="none" stroke="${m.color}" stroke-width="2" stroke-linejoin="round" stroke-linecap="round" opacity="0.9"/>`;
  }).join('');

  const legendHtml = METRICS.filter(m => firstVals[m.field] != null).map(m => {
    const last = entries.filter(e => new Date(e.date) >= start && e[m.field] != null)
      .sort((a, b) => b.date.localeCompare(a.date))[0];
    const diff = last ? last[m.field] - firstVals[m.field] : 0;
    return `<div style="display:flex;align-items:center;gap:4px;font-size:11px;">
      <div style="width:14px;height:3px;background:${m.color};border-radius:2px;flex-shrink:0;"></div>
      <span style="color:var(--text-2);">${m.label}</span>
      <span style="color:${m.color};font-weight:700;">${diff >= 0 ? '+' : ''}${diff.toFixed(1)} ${m.unit}</span>
    </div>`;
  }).join('');

  return `
    <svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto;overflow:visible;">
      ${yTicksHtml}${xTicksHtml}${linesHtml}
    </svg>
    <div style="display:flex;flex-wrap:wrap;gap:var(--sp-sm);margin-top:var(--sp-xs);padding-top:var(--sp-xs);">${legendHtml}</div>`;
}

/* SVG söömise statistika */
function renderNutritionChart(nutLog, weeks) {
  const waterTarget = STATE.user?.water_target_ml ?? 2750;
  const hasNutLog   = Object.keys(nutLog).length > 0;

  if (!hasNutLog && weeks > 0) {
    // Proovi vähemalt vee/kohvi andmeid
    const today = _localDateStr(new Date());
    const anyWater  = lsGet('water_today_' + today) ?? 0;
    const anyCoffee = lsGet('coffee_today_' + today) ?? 0;
    if (!anyWater && !anyCoffee) {
      return `<div class="chart-empty">📊 Toitumislogi puudub<br><span style="font-size:11px;">Märgi söögid Tab 2-s ✅/⏭️</span></div>`;
    }
  }

  const W = 380, H = 120;
  const PAD = { top: 8, right: 8, bottom: 24, left: 28 };
  const pw  = W - PAD.left - PAD.right;
  const ph  = H - PAD.top - PAD.bottom;
  const now    = new Date();
  const dayMs  = 24 * 3600 * 1000;
  const safeW  = Math.max(weeks, 1);

  // Regulaarsed söögislotid (v.a trennijook S06) — päeva maksimaalne söögikordade arv
  const _rawSlots    = (STATE.nutrition?.slots ?? []).filter(s => !s.training_only);
  // Fallback: kui nutrition.json polnud laetud, kasuta S01–S05 otse
  const slotIds      = _rawSlots.length > 0
    ? _rawSlots.map(s => s.id)
    : ['S01','S02','S03','S04','S05'];
  const slotCount    = slotIds.length;

  // Grupeeri nädalate kaupa — söömine + joomine
  const weekBuckets = [];
  for (let w = safeW - 1; w >= 0; w--) {
    const wEnd   = new Date(now.getTime() - w * 7 * dayMs);
    // weeks=0 (Täna) → ainult 1 päev (täna); muul juhul 7-päeva nädalabucket
    const daysInBucket = (weeks === 0) ? 1 : 7;
    const wStart = new Date(wEnd.getTime() - (daysInBucket - 1) * dayMs);
    let eaten = 0, total = 0;
    let waterDays = 0, waterDaysOk = 0, waterSum = 0;
    for (let d = 0; d < daysInBucket; d++) {
      const dd  = new Date(wStart.getTime() + d * dayMs);
      const key = _localDateStr(dd);
      // Söömine — kasuta KÕIKI regulaarseid slotte loendajana, mitte ainult logituid
      const dayLog  = nutLog[key] ?? {};
      const hasData = slotIds.some(id => dayLog[id] != null);
      if (hasData) {
        eaten += slotIds.filter(id => dayLog[id] === 'eaten').length;
        total += slotCount;
      }
      // Joomine (vesi + kohv koos) — tegelik % eesmärgist, mitte binaarne 0/1
      const waterMl  = lsGet('water_today_' + key) ?? 0;
      const coffeeC  = lsGet('coffee_today_' + key) ?? 0;
      const totalWMl = waterMl + coffeeC * 200;
      if (totalWMl > 0) {
        waterDays++;
        waterSum += totalWMl;
        if (totalWMl >= waterTarget) waterDaysOk++;
      }
    }
    const foodPct  = total > 0 ? Math.round(eaten / total * 100) : null;
    // waterPct = keskmine tegelik tarbimine % eesmärgist (mitte päevade loendus)
    const waterPct = waterDays > 0 ? Math.min(100, Math.round(waterSum / (waterDays * waterTarget) * 100)) : null;
    const label    = `${wEnd.getDate()}.${wEnd.getMonth() + 1}`;
    weekBuckets.push({ foodPct, eaten, total, waterPct, waterDays, waterDaysOk, waterSum, label });
  }

  // Sujuv värv 0%→punane, 50%→oranž, 100%→sihtmäär (roheline / sinine)
  function pctColor(pct, hi) { // hi = [r,g,b] 100% värv
    if (pct === 0) return 'var(--border)';
    var t = Math.min(pct, 100) / 100;
    var r, g, b;
    if (t < 0.5) {
      var s = t * 2; // punane→oranž
      r = Math.round(239 + s * (249 - 239));
      g = Math.round(68  + s * (115 - 68));
      b = Math.round(68  + s * (22  - 68));
    } else {
      var s = (t - 0.5) * 2; // oranž→sihtmäär
      r = Math.round(249 + s * (hi[0] - 249));
      g = Math.round(115 + s * (hi[1] - 115));
      b = Math.round(22  + s * (hi[2] - 22));
    }
    return 'rgb(' + r + ',' + g + ',' + b + ')';
  }
  var GREEN = [34, 197, 94];   // #22C55E
  var BLUE  = [56, 189, 248];  // #38BDF8

  // Grupeeritud tulbad: [söök | vesi] paarid
  const barW    = pw / safeW;
  const grpGap  = Math.max(2, barW * 0.12);
  const midGap  = 2;
  const innerW  = barW - grpGap * 2;
  const singleW = (innerW - midGap) / 2;

  const barsHtml = weekBuckets.map((b, i) => {
    const xBase  = PAD.left + i * barW + grpGap;
    const xFood  = xBase;
    const xWater = xBase + singleW + midGap;

    // Söömistulp
    const fp    = b.foodPct ?? 0;
    const fH    = ph * (fp / 100);
    const fY    = PAD.top + ph - fH;
    const fFill = pctColor(fp, GREEN);

    // Joomistulp
    const wp    = b.waterPct ?? 0;
    const wH    = ph * (wp / 100);
    const wY    = PAD.top + ph - wH;
    const wFill = pctColor(wp, BLUE);

    const mid  = xBase + innerW / 2;
    const label = b.label;

    return `
      <rect x="${xFood.toFixed(1)}" y="${fY.toFixed(1)}" width="${singleW.toFixed(1)}" height="${Math.max(2, fH).toFixed(1)}" fill="${fFill}" rx="2"/>
      <rect x="${xWater.toFixed(1)}" y="${wY.toFixed(1)}" width="${singleW.toFixed(1)}" height="${Math.max(2, wH).toFixed(1)}" fill="${wFill}" rx="2"/>
      <text x="${mid.toFixed(1)}" y="${PAD.top + ph + 14}" text-anchor="middle" font-size="9" fill="var(--text-3)">${label}</text>`;
  }).join('');

  const yLabelHtml = `
    <text x="${PAD.left - 3}" y="${PAD.top + 4}" text-anchor="end" font-size="9" fill="var(--text-3)">100%</text>
    <text x="${PAD.left - 3}" y="${PAD.top + ph + 4}" text-anchor="end" font-size="9" fill="var(--text-3)">0%</text>`;

  // Legend
  const legendHtml = `<div style="display:flex;gap:12px;margin-top:6px;font-size:10px;color:var(--text-2);">
    <span style="display:flex;align-items:center;gap:4px;"><span style="width:10px;height:10px;background:var(--green);border-radius:2px;display:inline-block;"></span>Söömine</span>
    <span style="display:flex;align-items:center;gap:4px;"><span style="width:10px;height:10px;background:#38BDF8;border-radius:2px;display:inline-block;"></span>Joomine</span>
  </div>`;

  // Kokkuvõte
  const allEaten  = weekBuckets.reduce((s, b) => s + b.eaten, 0);
  const allTotal  = weekBuckets.reduce((s, b) => s + b.total, 0);
  const avgFood   = allTotal > 0 ? Math.round(allEaten / allTotal * 100) : 0;
  const foodColor = pctColor(avgFood, GREEN);

  const totalWaterDays   = weekBuckets.reduce((s, b) => s + b.waterDays, 0);
  const totalWaterDaysOk = weekBuckets.reduce((s, b) => s + b.waterDaysOk, 0);
  const totalWaterSum    = weekBuckets.reduce((s, b) => s + b.waterSum, 0);
  const avgWater   = totalWaterDays > 0 ? Math.min(100, Math.round(totalWaterSum / (totalWaterDays * waterTarget) * 100)) : 0;
  const waterColor = pctColor(avgWater, BLUE);

  return `
    <svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto;">
      <line x1="${PAD.left}" y1="${PAD.top}" x2="${PAD.left}" y2="${PAD.top + ph}"
        stroke="var(--border)" stroke-width="0.5"/>
      <line x1="${PAD.left}" y1="${PAD.top + ph}" x2="${PAD.left + pw}" y2="${PAD.top + ph}"
        stroke="var(--border)" stroke-width="0.5"/>
      ${yLabelHtml}
      ${barsHtml}
    </svg>
    ${legendHtml}
    <div class="chart-stat-row" style="margin-top:var(--sp-xs);">
      <div class="chart-stat">
        <div class="chart-stat-val" style="color:${foodColor};">${avgFood}%</div>
        <div class="chart-stat-label">Söödud</div>
      </div>
      <div class="chart-stat">
        <div class="chart-stat-val" style="color:${waterColor};">${avgWater}%</div>
        <div class="chart-stat-label">Joodud (sihtmaht)</div>
      </div>
      <div class="chart-stat">
        <div class="chart-stat-val">${totalWaterDaysOk}/${totalWaterDays}</div>
        <div class="chart-stat-label">Joomise päevi</div>
      </div>
    </div>`;
}

/* Lihasgrupi aktiivsus: {category → setide arv} viimase `weeks` nädala jooksul */
function getMuscleActivity(weeks) {
  const tlog     = lsGet('training_log') ?? [];
  const exIndex  = STATE.exercises?.exercises ?? {};
  const now      = new Date();
  const todayStr = _localDateStr(now);

  const counts = {};
  tlog.forEach(session => {
    if (weeks === 0) {
      // täna: ainult tänased sessioonid
      if ((session.date ?? '').slice(0, 10) !== todayStr) return;
    } else {
      const cutoff = new Date(now);
      cutoff.setDate(cutoff.getDate() - weeks * 7);
      if (new Date(session.date) < cutoff) return;
    }
    (session.exercises ?? []).forEach(ex => {
      const cat = exIndex[String(ex.exercise_id)]?.category;
      if (!cat) return;
      counts[cat] = (counts[cat] ?? 0) + (ex.sets?.length ?? 0);
    });
  });
  return counts;
}

/* BtB-põhine värvivalem: oodatav maht = faasi keskmised seeriad × 3 sessiooni/nädal
   Roheline = programmiga graafikus, punane = maha jäänud */
function muscleColor(sets, weeks) {
  if (!sets || sets === 0) return '#D4D4D4';

  var phase = STATE && STATE.btbPhase ? STATE.btbPhase : 1;
  var phaseData = STATE && STATE.btbPhaseData && STATE.btbPhaseData.phases
    ? STATE.btbPhaseData.phases[String(phase)] : null;

  if (phaseData && !phaseData.coming_soon && phaseData.week_progression) {
    var avgSets = phaseData.week_progression.reduce(function(a, w) { return a + w.sets; }, 0)
                  / phaseData.week_progression.length;
    var targetPerWeek = avgSets * 3; // 3 treeningut/nädal × ~1 harjutus lihasgrupi kohta
    var totalWeeks = (weeks === 0) ? 1 : weeks;
    var expected = targetPerWeek * totalWeeks;
    var pct = sets / expected;
    if (pct < 0.25) return '#EF4444'; // punane — alla 25% BtB eesmärgist
    if (pct < 0.6)  return '#F97316'; // oranž — 25–60%
    if (pct < 0.9)  return '#84CC16'; // kergeroheline — 60–90%
    return '#22C55E';                   // roheline — ≥90% eesmärgist
  }

  // Fallback (BtB andmed pole laaditud)
  var days = (weeks === 0) ? 1 : weeks * 7;
  var rate = sets / days;
  if (rate < 0.2)  return '#EF4444';
  if (rate < 0.7)  return '#F97316';
  if (rate < 1.43) return '#84CC16';
  return '#22C55E';
}

/* SVG keha eest ja tagant */
function renderBodySVG(activity, activeMuscle, weeks) {
  function coloredSVG(svgRaw, muscleMap) {
    var idx = 0;
    var BASE = '#D4D4D4';
    var result = svgRaw.replace(/<path class="cls-1" d="/g, function() {
      var cat = muscleMap[idx] || null;
      idx++;
      var sets = cat ? (activity[cat] || 0) : 0;
      var fill = cat ? muscleColor(sets, weeks) : BASE;
      var isActive = cat && cat === activeMuscle;
      var stroke = isActive ? ' stroke="' + muscleColor(sets, weeks) + '" stroke-width="20" stroke-opacity="0.5"' : '';
      var click = cat ? ' onclick="setBodyMapMuscle(\'' + cat + '\')" style="cursor:pointer;"' : '';
      return '<path fill="' + fill + '"' + stroke + click + ' d="';
    });
    return result;
  }

  var frontColored = coloredSVG(_BODY_FRONT_SVG, _FRONT_MAP);
  var backColored  = coloredSVG(_BODY_BACK_SVG,  _BACK_MAP);
  return { front: frontColored, back: backColored };
}

/* Lihasgrupi nädala treeninguajalugu — tulpdiagramm */
function renderMuscleBarsChart(cat, weeks) {
  const tlog    = lsGet('training_log') ?? [];
  const exIndex = STATE.exercises?.exercises ?? {};
  const now     = new Date();

  // Kogu viimased `weeks` nädalat
  const weekData = [];
  for (let i = weeks - 1; i >= 0; i--) {
    const wStart = new Date(now);
    wStart.setDate(wStart.getDate() - (i + 1) * 7);
    const wEnd = new Date(now);
    wEnd.setDate(wEnd.getDate() - i * 7);

    const label = `N${weeks - i}`;
    let sets = 0;
    tlog.forEach(s => {
      const d = new Date(s.date);
      if (d < wStart || d >= wEnd) return;
      (s.exercises ?? []).forEach(ex => {
        const exCat = exIndex[String(ex.exercise_id)]?.category;
        // Selg + Alaselg koos
        const match = cat === 'Selg'
          ? (exCat === 'Selg' || exCat === 'Alaselg')
          : (exCat === cat);
        if (match) sets += (ex.sets?.length ?? 0);
      });
    });
    weekData.push({ label, sets });
  }

  const maxSets = Math.max(...weekData.map(w => w.sets), 1);
  const cols = weekData.map(w => {
    const h = Math.round((w.sets / maxSets) * 56);
    const barColor = w.sets === 0 ? '' : `background:${muscleColor(w.sets, 1)};`;
    return `<div class="train-bar-col">
      <div class="train-bar-val" style="${w.sets > 0 ? `color:${muscleColor(w.sets, 1)};` : ''}">${w.sets || ''}</div>
      <div class="train-bar ${w.sets === 0 ? 'empty' : ''}" style="height:${Math.max(h, 3)}px;${barColor}"></div>
      <div class="train-bar-lbl">${w.label}</div>
    </div>`;
  }).join('');

  return `<div class="train-bars">${cols}</div>`;
}

/* Stacked bar chart — kõik lihasgrupid nädalate kaupa */
function renderAllMusclesStackedChart(allMuscles, weeks) {
  const tlog    = lsGet('training_log') ?? [];
  const exIndex = STATE.exercises?.exercises ?? {};
  const now     = new Date();

  // Kogu igal nädalal iga lihasgrupi setid
  const weekData = [];
  for (let i = weeks - 1; i >= 0; i--) {
    const wStart = new Date(now); wStart.setDate(wStart.getDate() - (i + 1) * 7);
    const wEnd   = new Date(now); wEnd.setDate(wEnd.getDate() - i * 7);
    const label  = weeks <= 4 ? `N${weeks - i}` : `-${(i) ? i + 'n' : 'see'}`;
    const byCat  = {};
    tlog.forEach(s => {
      const d = new Date(s.date);
      if (d < wStart || d >= wEnd) return;
      (s.exercises ?? []).forEach(ex => {
        const cat = exIndex[String(ex.exercise_id)]?.category;
        if (!cat) return;
        byCat[cat] = (byCat[cat] ?? 0) + (ex.sets?.length ?? 0);
      });
    });
    weekData.push({ label, byCat });
  }

  // Max kõrgus = kõigi nädalate suurim kogusumma
  const totals = weekData.map(w => Object.values(w.byCat).reduce((a, b) => a + b, 0));
  const maxTotal = Math.max(...totals, 1);
  const BAR_H = 72; // px

  // Lihasgrupi värvid (fikseeritud, mitte aktiivsuse-põhine)
  const CAT_COLORS = {
    'Rind':      '#3B82F6',
    'Selg':      '#8B5CF6',
    'Alaselg':   '#A78BFA',
    'Õlad':      '#F59E0B',
    'Biitseps':  '#10B981',
    'Triitseps': '#06B6D4',
    'Core':      '#EF4444',
    'Jalad':     '#F97316',
  };

  const cols = weekData.map(w => {
    const total = Object.values(w.byCat).reduce((a, b) => a + b, 0);
    const colH  = Math.round((total / maxTotal) * BAR_H);

    // Virna segmendid — suuremad allapoole
    const segments = allMuscles
      .filter(m => (w.byCat[m.cat] ?? 0) > 0)
      .sort((a, b) => (w.byCat[b.cat] ?? 0) - (w.byCat[a.cat] ?? 0))
      .map(m => {
        const s   = w.byCat[m.cat] ?? 0;
        const pct = s / total;
        const h   = Math.max(Math.round(pct * colH), 2);
        const col = CAT_COLORS[m.cat] ?? '#888';
        return `<div style="width:100%;height:${h}px;background:${col};"></div>`;
      }).join('');

    return `<div class="train-bar-col">
      <div class="train-bar-val">${total || ''}</div>
      <div style="width:100%;height:${BAR_H}px;display:flex;flex-direction:column;justify-content:flex-end;border-radius:3px 3px 0 0;overflow:hidden;">
        ${total > 0 ? segments : `<div style="height:3px;background:var(--border);border-radius:3px;"></div>`}
      </div>
      <div class="train-bar-lbl">${w.label}</div>
    </div>`;
  }).join('');

  // Legend
  const legend = allMuscles.map(m => {
    const col = CAT_COLORS[m.cat] ?? '#888';
    return `<span style="display:inline-flex;align-items:center;gap:3px;font-size:9px;color:var(--text-2);margin-right:6px;">
      <span style="width:8px;height:8px;border-radius:2px;background:${col};display:inline-block;flex-shrink:0;"></span>${m.label.replace(/^\S+\s/, '')}
    </span>`;
  }).join('');

  return `<div class="train-bars">${cols}</div>
    <div style="margin-top:6px;line-height:1.8;">${legend}</div>`;
}

/* BtB maht-ülevaade lihasgrupi kohta — näitab oodatav vs tegelik sette/nädalas */
function renderMuscleVolumeCard(cat, weeks) {
  var phase = STATE.btbPhase ?? 1;
  var phaseData = STATE.btbPhaseData && STATE.btbPhaseData.phases
    ? STATE.btbPhaseData.phases[String(phase)] : null;
  if (!phaseData || phaseData.coming_soon) return '';

  // Praeguse nädala target
  var btbWeek = STATE.btbWeek ?? 1;
  var weekCfg = phaseData.week_progression
    ? phaseData.week_progression.find(function(w) { return w.week === btbWeek; })
    : null;
  if (!weekCfg) return '';

  var setsPerSession = weekCfg.sets;
  var targetPerWeek = setsPerSession * 3; // 3 treeningut/nädal

  // Tegelik eelmise / käimasoleva nädala sette
  var activityWeek = getMuscleActivity(1);
  var actualSets = cat === 'Selg'
    ? (activityWeek['Selg'] ?? 0) + (activityWeek['Alaselg'] ?? 0)
    : (activityWeek[cat] ?? 0);

  var pct = Math.min(100, Math.round((actualSets / targetPerWeek) * 100));
  var barColor = pct >= 90 ? '#22C55E' : pct >= 60 ? '#84CC16' : pct >= 25 ? '#F97316' : '#EF4444';
  var statusText = pct >= 90 ? '✅ Nädala maht täidetud'
    : pct >= 60 ? '🟡 Natuke puudu veel'
    : pct >= 25 ? '🟠 Maht jääb alla'
    : '🔴 Treeningud puudu';

  var deloadNote = weekCfg.deload
    ? '<div style="display:inline-block;font-size:10px;background:#FEF3C7;color:#92400E;border-radius:4px;padding:2px 6px;margin-bottom:6px;">🛡️ De-load nädal — väiksem koormus on plaanis</div>'
    : '';

  var progNow = (STATE.btbPhase - 1) * 5 + btbWeek;
  var phaseRest = phaseData.rest_s ?? 60;

  return '<div style="margin-top:8px;padding:12px;background:var(--accent-bg);border:0.5px solid var(--border);border-radius:var(--r-md);">'
    + '<div style="font-size:12px;font-weight:700;color:var(--text-1);margin-bottom:6px;">📊 BtB maht — ' + cat + '</div>'
    + deloadNote
    + '<div style="font-size:11px;color:var(--text-2);margin-bottom:8px;">'
    + phaseData.name + ' N' + btbWeek + ' · ' + progNow + '. programminädal · puhkus ' + phaseRest + 's'
    + '</div>'
    + '<div style="font-size:11px;color:var(--text-2);margin-bottom:6px;">'
    + 'Eesmärk: <strong>' + targetPerWeek + ' setti/nädal</strong> '
    + '<span style="color:var(--text-3);">(' + setsPerSession + ' seeriat × 3 treeningut)</span>'
    + '</div>'
    + '<div style="display:flex;align-items:center;gap:8px;margin-bottom:4px;">'
    + '<div style="flex:1;height:7px;background:var(--border);border-radius:4px;overflow:hidden;">'
    + '<div style="width:' + pct + '%;height:100%;background:' + barColor + ';border-radius:4px;transition:width 0.4s;"></div>'
    + '</div>'
    + '<span style="font-size:12px;font-weight:700;color:' + barColor + ';min-width:44px;text-align:right;">'
    + actualSets + '/' + targetPerWeek + '</span>'
    + '</div>'
    + '<div style="font-size:11px;color:var(--text-3);">' + statusText + '</div>'
    + '</div>';
}
