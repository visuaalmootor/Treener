function lsGet(key) {
  try { const v = localStorage.getItem('ttm_' + key); return v ? JSON.parse(v) : null; } catch { return null; }
}
/* v0.9.4.3: lokaalsed ajatemplid (ttm__meta_ts) — Firestore-sünk võrdleb neid pilve omadega,
   et VANEM pilveväärtus ei kirjutaks UUEMAT lokaalset üle (nt kui fbWrite jäi võrguvea tõttu vahele) */
function _tsMetaGet() {
  try { return JSON.parse(localStorage.getItem('ttm__meta_ts') ?? '{}'); } catch (e) { return {}; }
}
function _tsMetaSet(key, ts) {
  try {
    const m = _tsMetaGet();
    m[key] = ts;
    localStorage.setItem('ttm__meta_ts', JSON.stringify(m));
  } catch (e) { /* meta pole kriitiline */ }
}

function lsSet(key, value) {
  try {
    localStorage.setItem('ttm_' + key, JSON.stringify(value));
    _tsMetaSet(key, Date.now());
    fbWrite(key, value);   // ← Firestore sync (fire-and-forget)
    scheduleBackup();
    return true;
  } catch (e) { log('ls viga: ' + e.message, 'dbg-err'); return false; }
}

/* ── AUTO-BACKUP (File System Access API) ────────────────────────────────── */
const BACKUP_DB    = 'ttm_backup_db';
const BACKUP_STORE = 'handles';
let _backupTimer   = null;
let _backupHandle  = null;

function scheduleBackup() {
  clearTimeout(_backupTimer);
  _backupTimer = setTimeout(writeBackup, 3000);
}

async function loadDirHandle() {
  if (_backupHandle) return _backupHandle;
  return new Promise(resolve => {
    const req = indexedDB.open(BACKUP_DB, 1);
    req.onupgradeneeded = e => e.target.result.createObjectStore(BACKUP_STORE);
    req.onsuccess = e => {
      const tx  = e.target.result.transaction(BACKUP_STORE, 'readonly');
      const get = tx.objectStore(BACKUP_STORE).get('dir');
      get.onsuccess = async () => {
        if (get.result) {
          try {
            const perm = await get.result.queryPermission({ mode: 'readwrite' });
            if (perm === 'granted') { _backupHandle = get.result; resolve(get.result); return; }
            const perm2 = await get.result.requestPermission({ mode: 'readwrite' });
            if (perm2 === 'granted') { _backupHandle = get.result; resolve(get.result); return; }
          } catch {}
        }
        resolve(null);
      };
      get.onerror = () => resolve(null);
    };
    req.onerror = () => resolve(null);
  });
}

async function saveDirHandle(handle) {
  return new Promise(resolve => {
    const req = indexedDB.open(BACKUP_DB, 1);
    req.onupgradeneeded = e => e.target.result.createObjectStore(BACKUP_STORE);
    req.onsuccess = e => {
      const tx = e.target.result.transaction(BACKUP_STORE, 'readwrite');
      tx.objectStore(BACKUP_STORE).put(handle, 'dir');
      tx.oncomplete = () => resolve(true);
      tx.onerror    = () => resolve(false);
    };
    req.onerror = () => resolve(false);
  });
}

async function writeBackup() {
  const dir = await loadDirHandle();
  if (!dir) return;
  try {
    const data = {};
    for (let i = 0; i < localStorage.length; i++) {
      const k = localStorage.key(i);
      if (k && k.startsWith('ttm_')) {
        try { data[k] = JSON.parse(localStorage.getItem(k)); } catch { data[k] = localStorage.getItem(k); }
      }
    }
    data['_backup_date'] = new Date().toISOString();
    const fh       = await dir.getFileHandle('backup.json', { create: true });
    const writable = await fh.createWritable();
    await writable.write(JSON.stringify(data, null, 2));
    await writable.close();
    log('Automaatne varundus ✓ → backup.json', 'dbg-ok');
    updateBackupStatus(data['_backup_date']);
  } catch (e) {
    log('Varundus ebaõnnestus: ' + e.message, 'dbg-err');
  }
}

async function pickBackupFolder() {
  try {
    const dir = await window.showDirectoryPicker({ mode: 'readwrite', startIn: 'documents' });
    _backupHandle = dir;
    await saveDirHandle(dir);
    await writeBackup();
    renderBackupCard();
    log('Varundus seadistatud: ' + dir.name, 'dbg-ok');
  } catch (e) {
    if (e.name === 'AbortError') return;  // Kasutaja vajutas Cancel — okei
    if (e.name === 'SecurityError' || !window.showDirectoryPicker) {
      // Brave Shields blokeerib — paku manuaalset varianti
      showBackupFallback();
    } else {
      log('Kausta valik ebaõnnestus: ' + e.message, 'dbg-err');
      alert('Viga: ' + e.message);
    }
  }
}

function showBackupFallback() {
  const data = {};
  for (let i = 0; i < localStorage.length; i++) {
    const k = localStorage.key(i);
    if (k && k.startsWith('ttm_')) {
      try { data[k] = JSON.parse(localStorage.getItem(k)); } catch { data[k] = localStorage.getItem(k); }
    }
  }
  data['_backup_date'] = new Date().toISOString();
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href     = url;
  a.download = 'ttm-backup-' + _localDateStr(new Date()) + '.json';
  a.click();
  URL.revokeObjectURL(url);

  const el = document.getElementById('backup-card');
  if (el) el.innerHTML += `
    <div style="padding:var(--sp-xs) var(--sp-md);background:var(--accent-bg);border-top:0.5px solid var(--border);">
      <p style="font-size:11px;color:var(--text-2);margin:0;">⚠️ Brave Shields blokeerib automaatset varundust. Fail allalaaditud — salvesta see <strong>Trenn ja toitumine</strong> kausta. Teine variant: lülita Shields välja selle lehe jaoks.</p>
      <button class="btn-sm" style="margin-top:8px;width:100%;" onclick="restoreFromFile()">↩️ Taasta failist</button>
    </div>`;
}

function restoreFromFile() {
  const input    = document.createElement('input');
  input.type     = 'file';
  input.accept   = '.json';
  input.onchange = async e => {
    const file = e.target.files[0];
    if (!file) return;
    const text  = await file.text();
    const data  = JSON.parse(text);
    let count   = 0;
    for (const [k, v] of Object.entries(data)) {
      if (k.startsWith('ttm_')) { localStorage.setItem(k, JSON.stringify(v)); count++; }
    }
    alert('✅ Taastatud ' + count + ' andmekirjet. App laetakse uuesti.');
    location.reload();
  };
  input.click();
}

async function restoreBackup() {
  const dir = await loadDirHandle();
  if (!dir) { alert('Varunduse kaust pole valitud.'); return; }
  try {
    const fh   = await dir.getFileHandle('backup.json');
    const f    = await fh.getFile();
    const text = await f.text();
    const data = JSON.parse(text);
    let count  = 0;
    for (const [k, v] of Object.entries(data)) {
      if (k.startsWith('ttm_')) { localStorage.setItem(k, JSON.stringify(v)); count++; }
    }
    alert('✅ Taastatud ' + count + ' andmekirjet. App laetakse uuesti.');
    location.reload();
  } catch (e) {
    alert('Taastamine ebaõnnestus: ' + e.message);
  }
}

function doResetAllLogs() {
  const KEEP = ['ttm_active_plan','ttm_nutrition','ttm_supplements','ttm_train_sched',
                'ttm_btb_phase','ttm_btb_week','ttm_dir_handle'];
  const toDelete = [];
  for (let i = 0; i < localStorage.length; i++) {
    const k = localStorage.key(i);
    if (k && k.startsWith('ttm_') && !KEEP.includes(k)) toDelete.push(k);
  }
  toDelete.forEach(k => localStorage.removeItem(k));
  document.getElementById('reset-overlay')?.remove();
  // Näita edukat teadet
  const toast = document.createElement('div');
  toast.style.cssText = 'position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--green);color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:600;z-index:9999;';
  toast.textContent = `✓ ${toDelete.length} andmeväljet kustutatud — äpp on puhas!`;
  document.body.appendChild(toast);
  setTimeout(() => toast.remove(), 3000);
  renderTab(STATE.currentTab);
}

async function exportFromFirestore() {
  if (!FB_USER || !_fbDb) { showToast('❌ Logi esmalt sisse'); return; }
  try {
    showToast('⏳ Laen andmeid...');
    const snap = await _fbDb.collection('users').doc(FB_USER.uid).collection('kv').get();
    const data = { _backup_date: new Date().toISOString(), _source: 'firestore' };
    snap.forEach(doc => { data['ttm_' + doc.id] = doc.data().v; });
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'ttm-backup-' + _localDateStr(new Date()) + '.json';
    a.click();
    URL.revokeObjectURL(a.href);
    showToast(`✓ Backup allalaaditud (${snap.size} kirjet)`);
  } catch (e) {
    showToast('❌ Eksport ebaõnnestus');
    log('exportFromFirestore viga: ' + e.message, 'dbg-err');
  }
}

/* ============================================================
   PÄEVA STATSID (header)
   Loeb localStorage-ist ja uuendab headeri näidikuid.
   Tab 2 (toitumine) kirjutab: ttm_kcal_today_YYYY-MM-DD
   Tab 2 (toitumine) kirjutab: ttm_water_today_YYYY-MM-DD (ml)
   Tab 3 (trenn) kirjutab: ttm_training_log → done: true
============================================================ */
function updateDayStats() {
  const today = _localDateStr(new Date());
  const u = STATE.user;
  const kcalTarget  = calcKcalTarget();
  const waterTarget = u?.water_target_ml  ?? 2750;

  // Kalorid — v0.9.5.3: arvuta ELAVALT (sama loogika mis Toitumine/Kodu) → header ei näita enam vananenud skalaari
  const kcalEaten = calcEatenKcal(today);
  const kcalPct   = Math.min(100, Math.round(kcalEaten / kcalTarget * 100));

  // Vesi + kohv — Tab 2 täidab need väärtused (praegu 0)
  const waterMl    = lsGet('water_today_' + today) ?? 0;
  const coffeeCups = lsGet('coffee_today_' + today) ?? 0;
  const totalMl    = waterMl + (coffeeCups * 200);
  const waterL   = (totalMl / 1000).toFixed(1).replace('.', ',');
  const waterTL  = (waterTarget / 1000).toFixed(1).replace('.', ',');
  const waterPct = Math.min(100, Math.round(totalMl / waterTarget * 100));

  // Trenn — Tab 3 täidab treeningulogi
  const trainLog  = lsGet('training_log') ?? [];
  const todayDone = Array.isArray(trainLog) && trainLog.some(e => e.date === today && e.done);

  // Kcal stat
  const kcalEl = document.getElementById('stat-kcal');
  if (kcalEl) {
    const pctCls = kcalPct >= 100 ? 'done' : kcalPct > 0 ? 'part' : '';
    kcalEl.innerHTML = `<span class="stat-pct ${pctCls}">${kcalPct}%</span> ${kcalEaten}/${kcalTarget} kcal`;
  }

  // Vesi stat
  const vesiEl = document.getElementById('stat-vesi');
  if (vesiEl) {
    const pctCls = waterPct >= 100 ? 'done' : waterPct > 0 ? 'part' : '';
    vesiEl.innerHTML = `<span class="stat-pct ${pctCls}">${waterPct}%</span> ${waterL}/${waterTL} L`;
  }

  // Trenn stat
  const trennEl = document.getElementById('stat-trenn');
  if (trennEl) {
    if (todayDone) {
      trennEl.className = 'stat-done';
      trennEl.textContent = 'Tehtud ✓';
    } else {
      trennEl.className = 'stat-wait';
      trennEl.textContent = 'Ootel';
    }
  }
}

============================================================ */

function calcKcalTarget() {
  const s = lsGet('mina_settings') ?? {};
  const kaal     = s.kaal          ?? STATE.user?.weight_kg ?? 63;
  const rasvaPct = s.rasvaprotsent ?? 12;
  const neatMult = s.neat_mult     ?? 1.6;
  const bulk     = s.bulk_surplus  ?? 300;
  const leanMass = kaal * (1 - rasvaPct / 100);
  const rmr      = 500 + (22 * leanMass);
  const tef      = rmr * 0.15;
  return Math.round((rmr * neatMult) + tef + bulk);
}

function calcKcalTrainingDay() {
  const s        = lsGet('mina_settings') ?? {};
  const kaal     = s.kaal          ?? STATE.user?.weight_kg ?? 63;
  const rasvaPct = s.rasvaprotsent ?? 12;
  const trainH   = s.train_hours   ?? 1.5;
  const leanMass = kaal * (1 - rasvaPct / 100);
  const erat     = leanMass * trainH * 6;
  return Math.round(calcKcalTarget() + erat);
}

function previewKcal() {
  const kaal     = parseFloat(document.getElementById('ms-kaal')?.value)  || 63;
  const rasva    = parseFloat(document.getElementById('ms-rasva')?.value)  || 12;
  const neat     = parseFloat(document.getElementById('ms-neat')?.value)   || 1.6;
  const bulk     = parseInt(document.getElementById('ms-bulk')?.value)     || 300;
  const leanMass = +(kaal * (1 - rasva / 100)).toFixed(1);
  const rmr      = Math.round(500 + 22 * leanMass);
  const tef      = Math.round(rmr * 0.15);
  const rest     = Math.round(rmr * neat + tef + bulk);
  const erat     = Math.round(leanMass * 1.5 * 6);
  const set = (id, v) => { const el = document.getElementById(id); if (el) el.textContent = v; };
  set('prev-lean',  leanMass + ' kg');
  set('prev-rmr',   rmr + ' kcal');
  set('prev-tef',   tef + ' kcal');
  set('prev-rest',  rest);
  set('prev-train', rest + erat);
  // v0.9.5.1: märgi seaded "salvestamata" → taustasünk ei renderda vahepeal üle
  STATE.minaSettingsDirty = true;
}

/* Kas taustasünk tohib praegu tabi uuesti renderdada? Ei tohi kui kasutaja kirjutab
   või kui Mina seadetes on salvestamata muudatus (muidu lähtub nt NEAT valik tagasi) */
function _syncRenderBlocked() {
  const ae = document.activeElement;
  if (ae && /^(INPUT|TEXTAREA|SELECT)$/.test(ae.tagName)) return true;
  if (STATE.currentTab === 'mina' && STATE.minaSettingsDirty) return true;
  return false;
}

function showToast(msg, durationMs = 2500) {
  let el = document.getElementById('ttm-toast');
  if (!el) {
    el = document.createElement('div');
    el.id = 'ttm-toast';
    el.style.cssText = [
      'position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px)',
      'background:#22c55e;color:white;padding:10px 20px;border-radius:20px',
      'font-size:14px;font-weight:600;box-shadow:0 4px 16px rgba(0,0,0,0.2)',
      'opacity:0;transition:opacity 0.2s,transform 0.2s;pointer-events:none;z-index:9999'
    ].join(';');
    document.body.appendChild(el);
  }
  el.textContent = msg;
  requestAnimationFrame(() => {
    el.style.opacity = '1';
    el.style.transform = 'translateX(-50%) translateY(0)';
  });
  clearTimeout(el._t);
  el._t = setTimeout(() => {
    el.style.opacity = '0';
    el.style.transform = 'translateX(-50%) translateY(20px)';
  }, durationMs);
}

function renderWeeklyWeightFeedback() {
  const weightLog = lsGet('weight_log') ?? [];
  if (weightLog.length < 2) return '';
  const last = weightLog[weightLog.length - 1];
  const prev = weightLog[weightLog.length - 2];
  const lastKg = last.weight ?? last.weight_kg ?? 0;
  const prevKg = prev.weight ?? prev.weight_kg ?? 0;
  const diff = lastKg - prevKg;
  const days = Math.round((new Date(last.date) - new Date(prev.date)) / 86400000);
  if (days <= 0) return '';
  const rate = diff / (days / 7);
  let icon, msg, advice, color;
  if (diff < 0) {
    icon = '⚠️'; color = '#ef4444';
    msg = `Kaal langes ${Math.abs(diff).toFixed(1)} kg`;
    advice = 'Lisa ~300 kcal päevas — peaksid kaalus juurde võtma!';
  } else if (rate < 0.5) {
    icon = '📈'; color = '#f59e0b';
    msg = `+${diff.toFixed(1)} kg — aeglane tempo`;
    advice = 'BtB soovitab 0.5–2.3 kg/nädalas. Lisa ~200 kcal.';
  } else if (rate <= 2.3) {
    icon = '✅'; color = '#22c55e';
    msg = `+${diff.toFixed(1)} kg — perfektne tempo!`;
    advice = 'BtB kuldne tsoon. Jätka samas rüütmis!';
  } else {
    icon = '⚠️'; color = '#f59e0b';
    msg = `+${diff.toFixed(1)} kg — väga kiire`;
    advice = 'Rohkem kui 2.3 kg/nädalas → kontrolli vöömõõtu.';
  }
  return `
    <div class="kodu-section-label">📊 Kaaluprogress</div>
    <div class="kodu-card">
      <div style="display:flex;align-items:flex-start;gap:12px;">
        <div style="font-size:28px;line-height:1;">${icon}</div>
        <div>
          <div style="font-size:15px;font-weight:700;color:${color};">${msg}</div>
          <div style="font-size:12px;color:var(--text-2);margin-top:3px;">${advice}</div>
        </div>
      </div>
    </div>`;
}

function renderKodu() {
  const today    = _localDateStr(new Date());
  const todayNum = getTodayDayNum();

  /* ---- KEHAKAAL ---- */
  const weightLog  = lsGet('weight_log') ?? [];
  const lastWeight = weightLog.length ? weightLog[weightLog.length - 1] : null;
  const prevWeight = weightLog.length > 1 ? weightLog[weightLog.length - 2] : null;
  // v0.9.6.8 fix: kirjed kasutavad välja 'weight_kg' (mitte 'weight') — vt weight_log kõikjal mujal
  // failis. See rida jäi vahele, mistõttu Kodu tab näitas alati algset (user.json) kaalu, mitte uusimat
  // weight_log kirjet — kaalu muutmine "Mina" tabis ei kajastunud Kodu tabis.
  const curKg      = lastWeight?.weight ?? lastWeight?.weight_kg ?? STATE.user?.weight_kg ?? 63;
  const goalKg     = STATE.user?.goal_weight_kg ?? 78; // väli on 'goal_weight_kg', mitte 'goal_weight'
  const startKg    = STATE.user?.weight_kg ?? 63;
  let weightDelta  = null;
  if (prevWeight) weightDelta = (curKg - (prevWeight.weight ?? prevWeight.weight_kg));
  const weightTrend = weightDelta === null ? '' :
    weightDelta > 0 ? `<span style="color:var(--green);font-size:13px;font-weight:600;">↑ +${weightDelta.toFixed(1)} kg</span>` :
    weightDelta < 0 ? `<span style="color:var(--red);font-size:13px;font-weight:600;">↓ ${weightDelta.toFixed(1)} kg</span>` :
    `<span style="color:var(--text-2);font-size:13px;">→ muutus puudub</span>`;
  const progressToGoal = Math.max(0, Math.min(100, Math.round((curKg - startKg) / (goalKg - startKg) * 100)));

  /* ---- JÄRGMINE EINE (loeb ttm_meal_plan-ist, fallback nutrition slots) ---- */
  let nextMeal = null; // { name, time, kcal } | 'done'
  {
    const planDay = (lsGet('meal_plan') ?? {})[today] ?? null;
    const log     = getNutritionLogForDate(today);
    const now     = new Date();
    const nowMin  = now.getHours() * 60 + now.getMinutes();
    if (planDay) {
      const sids = Object.keys(planDay).filter(s => s !== 'S06').sort();
      const pending = sids.filter(sid => log[sid] !== 'eaten' && log[sid] !== 'skipped');
      const upcoming = pending.find(sid => {
        const [h, m] = (MP_SLOT_TIMES[sid] || '00:00').split(':').map(Number);
        return (h * 60 + (m || 0)) > nowMin;
      }) ?? pending[0];
      if (upcoming && planDay[upcoming]) {
        nextMeal = {
          name: planDay[upcoming].name ?? MP_SLOT_LABELS[upcoming],
          slot: MP_SLOT_LABELS[upcoming] ?? '',
          time: MP_SLOT_TIMES[upcoming] ?? '',
          kcal: planDay[upcoming].kcal ?? null,
        };
      } else if (sids.length) {
        nextMeal = 'done';
      }
    } else if (STATE.nutrition) {
      const slots    = STATE.nutrition.slots ?? [];
      const fullMenu = generateMenuFromCart();
      const menu     = fullMenu[String(todayNum)] ?? {};
      const nextSlot = slots.find(s => {
        if (log[s.id] === 'eaten' || log[s.id] === 'skipped') return false;
        const [h, m] = (s.time || '00:00').split(':').map(Number);
        return (h * 60 + m) > nowMin;
      });
      if (nextSlot && menu[nextSlot.id]) {
        nextMeal = { name: menu[nextSlot.id].name, slot: nextSlot.name ?? '', time: nextSlot.time ?? '', kcal: menu[nextSlot.id].kcal ?? null };
      } else if (!nextSlot) {
        nextMeal = 'done';
      }
    }
  }

  /* ---- TÄNANE TREENING ---- */
  const trainSched = lsGet('train_sched') ?? [0, 2, 4];
  const dowIdx     = new Date().getDay() === 0 ? 6 : new Date().getDay() - 1; // 0=E..6=P
  const isTrainDay = trainSched.includes(dowIdx);
  const trainLog   = lsGet('training_log') ?? [];
  const trainDone  = trainLog.some(e => e.date === today && e.done);
  let trainBlock;
  if (trainDone) {
    trainBlock = `<div style="display:flex;align-items:center;gap:8px;">
      <span style="font-size:22px;">✅</span>
      <div><div style="font-weight:600;">Treening tehtud!</div>
      <div style="font-size:12px;color:var(--text-2);">Tubli töö täna 💪</div></div>
    </div>`;
  } else if (isTrainDay) {
    let trainName = 'Treeningpäev';
    let exCount = 0;
    if (STATE.trainingPlan) {
      const activePlan = STATE.activePlan ?? 'B';
      const curT       = STATE.currentTraining ?? 'A';
      const phaseKey   = `phase_${STATE.btbPhase}`;
      const training   = STATE.trainingPlan.plans?.[activePlan]?.trainings?.[curT];
      if (training) {
        trainName = STATE.trainingPlan.plans?.[activePlan]?.name ?? trainName;
        const exList = training[phaseKey] ?? training.exercises ?? [];
        exCount = exList.length;
      }
    }
    trainBlock = `
      <div style="display:flex;align-items:center;justify-content:space-between;" onclick="switchTab('trenn')" style="cursor:pointer;">
        <div style="display:flex;align-items:center;gap:10px;">
          <span style="font-size:22px;">💪</span>
          <div>
            <div style="font-weight:600;">${trainName}</div>
            <div style="font-size:12px;color:var(--text-2);">${exCount ? exCount + ' harjutust · ' : ''}Faas ${STATE.btbPhase}, Nädal ${STATE.btbWeek}</div>
          </div>
        </div>
        <svg viewBox="0 0 24 24" fill="none" stroke="var(--text-3)" stroke-width="2" style="width:16px;height:16px;flex-shrink:0;">
          <polyline points="9 18 15 12 9 6"/>
        </svg>
      </div>`;
  } else {
    trainBlock = `<div style="display:flex;align-items:center;gap:10px;">
      <span style="font-size:22px;">😊</span>
      <div><div style="font-weight:600;">Puhkepäev</div>
      <div style="font-size:12px;color:var(--text-2);">Keha taastub ja kasvab 💆</div></div>
    </div>`;
  }

  /* ---- KALORID (v0.9.5.3: elav arvutus, kooskõlas headeri ja Toitumisega) ---- */
  const kcalTarget = calcKcalTarget();
  const kcalEaten  = calcEatenKcal(today);
  const kcalPct    = Math.min(100, Math.round(kcalEaten / kcalTarget * 100));
  const kcalColor  = kcalPct >= 100 ? 'var(--green)' : kcalPct >= 60 ? 'var(--accent)' : 'var(--amber)';
  const kcalLeft   = Math.max(0, kcalTarget - kcalEaten);

  /* ---- VESI ---- */
  const waterTarget = STATE.user?.water_target_ml ?? 2750;
  const waterMl     = lsGet('water_today_' + today) ?? 0;
  const coffeeCups  = lsGet('coffee_today_' + today) ?? 0;
  const totalMl     = waterMl + coffeeCups * 200;
  const waterPct    = Math.min(100, Math.round(totalMl / waterTarget * 100));
  const waterColor  = waterPct >= 100 ? 'var(--green)' : waterPct >= 60 ? '#3B82F6' : 'var(--amber)';
  const waterLeft   = Math.max(0, waterTarget - totalMl);
  const waterLeftL  = (waterLeft / 1000).toFixed(1).replace('.', ',');
  const totalLStr   = (totalMl / 1000).toFixed(1).replace('.', ',');
  const waterTLStr  = (waterTarget / 1000).toFixed(1).replace('.', ',');

  /* ---- MOTIVATSIOON ---- */
  const kgGained = curKg - startKg;
  const kgToGoal = goalKg - curKg;
  const btbPhase = STATE.btbPhase ?? 1;
  const btbWeek  = STATE.btbWeek ?? 1;
  const weekTotal = (btbPhase - 1) * 5 + btbWeek;
  // v0.9.5.3: päevapõhine stabiilne valik (ei virvenda re-renderdusel — sama päev = sama lause)
  const _seed = (function(){ let h=0; for(let i=0;i<today.length;i++) h=(h*31+today.charCodeAt(i))>>>0; return h; })();
  const pick = arr => arr[_seed % arr.length];
  let motivMsg;
  if (kgGained <= 0) {
    motivMsg = pick([
      `"Iga suur teekond algab esimese sammuga. Sul on ${kgToGoal.toFixed(1)} kg eesmärgini — BtB meetod töötab, usaldage protsessi."`,
      `"Keha ei muutu üleöö — aga see ei tähenda, et midagi ei toimu. Alustatud on juba keerulisem samm tehtud."`,
      `"${kgToGoal.toFixed(1)} kg eesmärgini. Hardgaineril on esimesed nädalad aeglasemad — see on normaalne, mitte märk ebaõnnestumisest."`,
    ]);
  } else if (kgGained < 3) {
    motivMsg = pick([
      `"${kgGained.toFixed(1)} kg juurde saadud — liigub! Hardgaineril on esimesed kilod raskemad, kuid keha on juba kohanemas. ${kgToGoal.toFixed(1)} kg jäänud."`,
      `"${kgGained.toFixed(1)} kg on rohkem kui see tundub. Lihasmass + glikogeen + vesi — keha ehitab end üles varjatult. Jätka."`,
      `"Nädal ${weekTotal}, ${kgGained.toFixed(1)} kg kasvu. Konsistentsus > intensiivsus — sa teed seda õigesti."`,
    ]);
  } else if (kgGained < 8) {
    motivMsg = pick([
      `"Suurepärane areng — ${kgGained.toFixed(1)} kg juurde! Oled nädala ${weekTotal} BtB programmist. Jätka sama tempoga ja ${kgToGoal.toFixed(1)} kg on täiesti saavutatav."`,
      `"${kgGained.toFixed(1)} kg on juba nähtav muutus. ${kgToGoal.toFixed(1)} kg jäänud — sa oled täpselt seal kus peab olema."`,
      `"Faas ${btbPhase}, nädal ${btbWeek}: keha on kohanenud koormusega. See on kõige produktiivsem aeg — ära katkesta hoogu."`,
    ]);
  } else {
    motivMsg = pick([
      `"${kgGained.toFixed(1)} kg juurde — see on märkimisväärne tulemus! Eesmärgist on ${kgToGoal.toFixed(1)} kg jäänud. Keha on muutunud — jätka, see töötab."`,
      `"${kgGained.toFixed(1)} kg kasvu — sa oled tõestanud et hardgainer ei tähenda võimatu. ${kgToGoal.toFixed(1)} kg eesmärgini."`,
      `"Faas ${btbPhase} on kandnud vilja: ${kgGained.toFixed(1)} kg. Nüüd on küsimus ainult konsistentsuses kuni lõpuni."`,
    ]);
  }
  const trainSuffix = !isTrainDay && !trainDone
    ? pick([' Täna on puhkepäev — uni ja toitumine on praegu tähtsamad kui treenimine.',
            ' Puhkepäev = kasvu päev. Lihased kasvavad puhates, mitte treenides.',
            ' Täna taastud. Söö, maga, joo vett — see on sama tähtis kui trenn.'])
    : isTrainDay && !trainDone
    ? pick([' Treeningpäev ees — tee see ära!',
            ' Tänane treening ootab. Isegi 80% pingutus loeb rohkem kui 0%.',
            ' Mine treeni. Järjepidevus võidab motivatsiooni alati.'])
    : '';
  motivMsg += trainSuffix;

  // Alkohol hoiatus motivatsioonile
  const _alkWeekCount = (lsGet(getAlkoholWeekKey()) ?? []).length;
  if (_alkWeekCount > 2) {
    motivMsg += ' ⚠️ ' + _alkWeekCount + ' jooki sel nädalal — alkohol pärsib testosterooni ja lihasarengut.';
  } else if (_alkWeekCount > 0) {
    motivMsg += ' 🍺 ' + _alkWeekCount + ' jook' + (_alkWeekCount === 1 ? '' : 'i') + ' sel nädalal logitud.';
  }

  /* ---- TERVITUS (Quiet Data) ---- */
  const DAYS_ET   = ['Pühapäev','Esmaspäev','Teisipäev','Kolmapäev','Neljapäev','Reede','Laupäev'];
  const MONTHS_ET = ['jaanuar','veebruar','märts','aprill','mai','juuni','juuli','august','september','oktoober','november','detsember'];
  const _now      = new Date();
  const userName  = STATE.user?.name ?? 'Ingmar';
  const dateStr   = `${DAYS_ET[_now.getDay()]} · ${_now.getDate()}. ${MONTHS_ET[_now.getMonth()]}`;

  /* ---- NÄDALA KAALUDELTA (badge) ---- */
  let weekDelta = null;
  if (weightLog.length >= 2) {
    const lastE   = weightLog[weightLog.length - 1];
    const weekAgo = _localDateStr(new Date(Date.now() - 7 * 86400000));
    let refE = weightLog[0];
    for (const e of weightLog) { if (e.date <= weekAgo) refE = e; }
    if (refE !== lastE) weekDelta = (lastE.weight ?? lastE.weight_kg) - (refE.weight ?? refE.weight_kg);
  }
  const deltaBadge = weekDelta === null
    ? `<div style="background:var(--track);border-radius:9px;padding:6px 10px;font:700 12px/1 var(--font-mono);color:var(--text-3);">—</div>`
    : weekDelta >= 0
    ? `<div style="background:var(--accent-bg);border-radius:9px;padding:6px 10px;font:700 12px/1 var(--font-mono);color:var(--accent);">↗ +${weekDelta.toFixed(1)} kg</div>`
    : `<div style="background:#FBEAE8;border-radius:9px;padding:6px 10px;font:700 12px/1 var(--font-mono);color:var(--red);">↘ ${weekDelta.toFixed(1)} kg</div>`;

  /* ---- KAALUGRAAFIK (hero, marker igal punktil) ---- */
  const wPts = weightLog.map(e => ({ d: e.date, kg: e.weight ?? e.weight_kg })).filter(p => p.kg).slice(-10);
  let weightChartHtml = `<div style="font-size:11px;color:var(--text-3);padding:10px 0;">Lisa kaalumõõtmisi (Mina tab) — trendigraafik ilmub siia.</div>`;
  if (wPts.length >= 2) {
    const W = 332, H = 76;
    const kgs = wPts.map(p => p.kg);
    let mn = Math.min(...kgs), mx = Math.max(...kgs);
    if (mx - mn < 0.8) { const c = (mn + mx) / 2; mn = c - 0.4; mx = c + 0.4; }
    const X = i => Math.round(i / (wPts.length - 1) * W);
    const Y = v => Math.round(10 + (1 - (v - mn) / (mx - mn)) * (H - 20));
    const linePts = wPts.map((p, i) => `${X(i)},${Y(p.kg)}`).join(' ');
    const goalLine = (goalKg >= mn && goalKg <= mx)
      ? `<line x1="0" y1="${Y(goalKg)}" x2="${W}" y2="${Y(goalKg)}" style="stroke:#C9D7F6;stroke-width:1;stroke-dasharray:3 4"/>` : '';
    const circles = wPts.map((p, i) =>
      `<circle cx="${X(i)}" cy="${Y(p.kg)}" r="${i === wPts.length - 1 ? 4 : 3}" style="fill:var(--accent);stroke:#fff;stroke-width:${i === wPts.length - 1 ? 2 : 1.5}"/>`).join('');
    const fmtD = d => { const dt = new Date(d); return `${dt.getDate()}.${String(dt.getMonth() + 1).padStart(2, '0')}`; };
    const lblIdx = wPts.length <= 5 ? wPts.map((_, i) => i) : [0, Math.floor((wPts.length - 1) / 2), wPts.length - 1];
    const axisLbls = lblIdx.map(i => `<span style="font:500 8.5px/1 var(--font-mono);color:var(--text-3);">${fmtD(wPts[i].d)}</span>`).join('');
    weightChartHtml = `
      <svg viewBox="0 0 ${W} ${H}" style="width:100%;height:${H}px;display:block;overflow:visible;">
        ${goalLine}
        <polygon points="${linePts} ${W},${H} 0,${H}" style="fill:var(--accent-bg);"/>

  /* ---- SÖÖDUD MAKROD (meal_plan + custom) ---- */

  }
  const macroRow = (lbl, val, target) => {
    const pct = Math.min(100, Math.round(val / target * 100));

  const weekData = weekDays.map(d => {
    const kc = d <= today ? calcEatenKcal(d) : 0;
    return { d, kc, pct: Math.round(kc / kcalTarget * 100), isToday: d === today, isFuture: d > today };
  });
  const daysWithData = weekData.filter(w => w.kc > 0);
  const weekAvg = daysWithData.length ? Math.round(daysWithData.reduce((s, w) => s + w.kc, 0) / daysWithData.length) : 0;
  const weekTrainDone = (lsGet('training_log') ?? []).filter(e => e.done && weekDays.includes(e.date)).length;

    const h = w.isFuture || w.kc === 0 ? 8 : Math.max(10, Math.min(100, w.pct));

        <span style="font:500 8px/1 var(--font-mono);${lblC}">${['E','T','K','N','R','L','P'][i]}</span>

  /* ---- STREAK + PROGNOOS ---- */
  let streak = 0;
  {
    const thr = kcalTarget * 0.7;
    if (calcEatenKcal(today) >= thr) streak++;

      <div style="display:flex;justify-content:space-between;align-items:center;">

    <div style="display:flex;align-items:flex-end;gap:7px;height:58px;">${weekBars}</div>
    <div style="display:flex;justify-content:space-between;border-top:1px solid var(--track);padding-top:12px;">
      <div style="display:flex;flex-direction:column;gap:5px;"><span style="font:500 9px/1 var(--font);color:var(--text-3);">Keskmine</span><span style="font:700 14px/1 var(--font-mono);color:var(--text-1);">${weekAvg}<span style="font-size:9px;color:var(--text-3);font-weight:500;"> kcal</span></span></div>
      <div style="display:flex;flex-direction:column;gap:5px;"><span style="font:500 9px/1 var(--font);color:var(--text-3);">Trennid</span><span style="font:700 14px/1 var(--font-mono);color:var(--text-1);">${weekTrainDone}<span style="font-size:9px;color:var(--text-3);font-weight:500;"> / ${trainSched.length}</span></span></div>

      </div>
    </div>
    <div style="height:1px;background:var(--dark-2);"></div>
    <div>
      <div style="font-size:12px;line-height:1.6;font-style:italic;color:#E8E2D6;">${motivMsg}</div>
      <div style="font:500 9.5px/1 var(--font-mono);color:var(--dark-text-2);margin-top:8px;">— Claude × Bony to Beastly · Faas ${btbPhase} · Nädal ${btbWeek}</div>

</div>`;

/* ---- ABIFUNKTSIOONID (hind + makrod) ---- */

// Tagastab toote eelarve klassi jaoks õige variandiga (nt klass 3+ → kanafileed)
function resolveProduct(p, budgetClass) {
  const override = p.class_overrides?.[String(budgetClass)];
  return override ? { ...p, ...override } : p;
}

function getChecked() {
  return lsGet('shopping_checked') ?? {};
}

function getBestStore(priceKey) {
  const stores = STATE.prices?.products?.[priceKey]?.stores;
  if (!stores?.length) return null;
  return stores.reduce((min, s) => s.price < min.price ? s : min);
}

function getWeeklyCost(product) {
  const best = getBestStore(product.price_key);
  if (!best) return 0;
  return product.qty_week * best.price;
}

function formatUnitPrice(priceKey, store) {
  if (!store) return '—';
  const pd = STATE.prices?.products?.[priceKey];
  const unit = pd?.display_unit || pd?.unit || '';
  const price = store.display_price ?? store.price;
  return `${price.toFixed(2).replace('.', ',')} €/${unit}`;
}

function pctColor(pct) {
  return pct >= 100 ? 'var(--green)' : pct > 0 ? 'var(--amber)' : 'var(--text-3)';
}

function macroCard(label, dayVal, weekVal, target) {
  const pct = target ? Math.round(dayVal / target * 100) : null;
  return `
    <div class="metric">
      <div class="metric-val" style="font-size:20px;">${dayVal}<span style="font-size:12px;font-weight:400;color:var(--text-2)">g</span></div>
      <div class="metric-label">
        ${label}${pct !== null ? ` <span style="font-weight:700;color:${pctColor(pct)}">${pct}%</span>` : ''}
      </div>
      <div style="font-size:10px;color:var(--text-3);margin-top:2px;">Nädal: ${weekVal}g</div>
    </div>`;
}

/* ---- POE SOOVITUS ---- */
function renderStoreRecommendation(checkedProducts, budgetClass) {
  if (!checkedProducts.length) return '';

  // Iga toote jaoks: mis pood on odavaim?
  const storeStats = {}; // store → { wins, winCost, products[] }

  checkedProducts.forEach(p => {
    const rp = resolveProduct(p, budgetClass);
    const pd = STATE.prices?.products?.[rp.price_key];
    if (!pd?.stores?.length) return;

    const sorted = [...pd.stores].sort((a, b) => a.price - b.price);
    const best = sorted[0];

    if (!storeStats[best.store]) storeStats[best.store] = { wins: 0, winCost: 0, products: [] };
    storeStats[best.store].wins++;
    storeStats[best.store].winCost += rp.qty_week * best.price;
    storeStats[best.store].products.push(rp.name);
  });

  const ranked = Object.entries(storeStats)
    .sort(([, a], [, b]) => b.wins - a.wins || a.winCost - b.winCost);

  if (!ranked.length) return '';

  const total = checkedProducts.length;
  const [topStore, topStats] = ranked[0];
  const others = ranked.slice(1);

  /* Quiet Data: tume kontrastkaart — hinnapõhine soovitus (kaugusi EI kuvata, Ingmari otsus) */
  const otherRows = others.map(([store, s]) => `
    <div style="display:flex;align-items:center;justify-content:space-between;padding:6px 0;">

    </div>`).join('');

  return `
    <div class="card-dark" style="display:flex;flex-direction:column;gap:10px;">
      <div style="font:600 8.5px/1 var(--font);letter-spacing:1px;color:var(--dark-text-2);text-transform:uppercase;">Soovituslik pood · odavaim hind toote kohta</div>
      <div style="display:flex;justify-content:space-between;align-items:center;">
        <div>
          <div style="font:700 17px/1.1 var(--font);color:#fff;">★ ${topStore}</div>
          <div style="font:500 10px/1 var(--font-mono);color:var(--dark-text-2);margin-top:5px;">${topStats.wins}/${total} toodet siin odavaim</div>
        </div>
        <div style="background:var(--dark-2);border-radius:9px;padding:7px 11px;font:700 13px/1 var(--font-mono);color:#fff;">${topStats.winCost.toFixed(2).replace('.', ',')} €</div>
      </div>
      ${others.length ? `
      <div style="height:1px;background:var(--dark-2);"></div>
      <div>
        <div style="font:600 8.5px/1 var(--font);letter-spacing:1px;color:var(--dark-text-2);text-transform:uppercase;margin-bottom:2px;">Muud poed</div>

}

/* ---- METRICS ---- */
function renderOstukorvMetrics() {
  if (!STATE.shopping) return;
  const checked = getChecked();
  const u = STATE.user;
  const budgetClass = u?.budget_class ?? 2;
  const kcalTarget = calcKcalTarget();
  const m = u?.macros ?? { protein_g: 160, carbs_g: 390, fat_g: 90, fiber_g: 30 };

  let kcal = 0, protein = 0, carbs = 0, fat = 0, fiber = 0, totalCost = 0;
  const checkedProducts = [];
  STATE.shopping.products.forEach(p => {
    if (checked[p.id]) {
      const rp = resolveProduct(p, budgetClass);
      checkedProducts.push(p);
      kcal     += rp.kcal_day;
      protein  += rp.protein_g;
      carbs    += rp.carbs_g;
      fat      += rp.fat_g;
      fiber    += rp.fiber_g;
      totalCost += getWeeklyCost(rp);
    }
  });

  const pctDay = Math.round(kcal / kcalTarget * 100);

  const metricEl = document.getElementById('ostukorv-metrics');
  if (!metricEl) return;

  /* Quiet Data: PÄEV primaarne, nädal sekundaarne (Ingmari otsus — ära pööra ümber) */
  const dayFill = pctDay >= 95 ? 'var(--green)' : pctDay >= 60 ? 'var(--accent)' : pctDay >= 30 ? 'var(--amber)' : pctDay > 0 ? 'var(--red)' : 'var(--track)';
  const mRow = (lbl, val, target) => {
    const pct = target ? Math.min(100, Math.round(val / target * 100)) : 0;
    const fill = pct >= 95 ? 'var(--green)' : pct >= 60 ? 'var(--accent)' : pct >= 30 ? 'var(--amber)' : pct > 0 ? 'var(--red)' : 'var(--track)';
    return `
      <div style="display:flex;align-items:center;gap:10px;">
        <span style="width:62px;font:500 11px/1 var(--font);color:var(--text-2);">${lbl}</span>
        <div style="flex:1;height:7px;background:var(--track);border-radius:4px;overflow:hidden;"><div style="height:100%;width:${pct}%;background:${fill};border-radius:4px;"></div></div>
        <span style="width:74px;text-align:right;white-space:nowrap;font:600 11px/1 var(--font-mono);color:var(--text-1);">${Math.round(val)}<span style="color:var(--text-3);">/${target}g</span></span>
      </div>`;
  };

  metricEl.innerHTML = `
    <div class="card" style="border-radius:var(--r-lg);box-shadow:var(--shadow),0 10px 26px rgba(40,30,10,.05);display:flex;flex-direction:column;gap:12px;margin-bottom:12px;">
      <div style="display:flex;justify-content:space-between;align-items:baseline;">
        <span style="font:600 13px/1 var(--font);color:var(--text-1);">Päeva kogus ostukorvis</span>
        <span style="font:600 13px/1 var(--font-mono);color:var(--text-1);">${kcal} <span style="color:var(--text-3);font-weight:500;">/ ${kcalTarget} kcal</span></span>
      </div>
      <div style="height:9px;background:var(--track);border-radius:5px;overflow:hidden;"><div style="height:100%;width:${Math.min(100, pctDay)}%;background:${dayFill};border-radius:5px;"></div></div>
      ${mRow('Valk', protein, m.protein_g)}
      ${mRow('Süsivesik', carbs, m.carbs_g)}
      ${mRow('Rasv', fat, m.fat_g)}
      ${mRow('Kiud', fiber, m.fiber_g ?? 30)}
      <div style="height:1px;background:var(--track);"></div>
      <div style="display:flex;justify-content:space-between;align-items:baseline;">
        <span style="font:500 10px/1 var(--font);color:var(--text-3);">Nädala kogus: <span style="font:600 10px/1 var(--font-mono);color:var(--text-2);">${kcal * 7} kcal</span></span>
        <span style="font:500 10px/1 var(--font);color:var(--text-3);">Kulu <span style="font:700 12px/1 var(--font-mono);color:var(--text-1);">${totalCost > 0 ? totalCost.toFixed(2).replace('.', ',') + ' €' : '—'}</span>/näd</span>
      </div>
    </div>
    ${renderStoreRecommendation(checkedProducts, budgetClass)}
  `;
}

/* ---- TOOTE LAIENDUSED ---- */
function renderPriceComparison(p) {
  const pd = STATE.prices?.products?.[p.price_key];
  const stores = pd?.stores ?? [];
  if (!stores.length) return `<div style="font-size:12px;color:var(--text-2);padding:var(--sp-sm) 0;">Hinnaandmed puuduvad</div>`;

  const sorted = [...stores].sort((a, b) => a.price - b.price);
  const bestPrice = sorted[0].price;

  return `
    <div style="background:var(--bg);border-radius:var(--r-sm);padding:var(--sp-sm);margin-top:4px;">
      <div style="font-size:10px;font-weight:600;color:var(--text-2);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px;">Hinnavõrdlus</div>
      ${sorted.map(s => {
        const isBest = s.price === bestPrice;
        const dispPrice = s.display_price ?? s.price;
        const unit = pd?.display_unit || pd?.unit || '';
        const weekCost = (p.qty_week * s.price).toFixed(2).replace('.', ',');
        const prodName = s.product_name ? `<div style="font-size:10px;color:var(--text-3);margin-top:1px;">${s.product_name}</div>` : '';
        return `
          <div style="display:flex;justify-content:space-between;align-items:flex-start;padding:4px 0;border-bottom:0.5px solid var(--border);">
            <div>
              <span style="font-weight:${isBest ? 600 : 400};color:${isBest ? 'var(--green)' : 'var(--text-1)'};">${s.store}</span>
              ${prodName}
            </div>
            <span style="text-align:right;flex-shrink:0;margin-left:8px;">
              <span style="color:${isBest ? 'var(--green)' : 'var(--text-2)'};">${dispPrice.toFixed(2).replace('.', ',')} €/${unit}</span>
              <span style="color:var(--text-3);font-size:11px;margin-left:6px;">~${weekCost} €/näd</span>
            </span>
          </div>`;
      }).join('')}
    </div>`;
}

function renderAlternatives(p) {
  const alts = p.alternatives ?? [];
  if (!alts.length) return `<div style="font-size:12px;color:var(--text-2);padding:var(--sp-sm) 0;">Alternatiivid puuduvad</div>`;

  const checked = getChecked();

  return `
    <div style="background:var(--bg);border-radius:var(--r-sm);padding:var(--sp-sm);margin-top:4px;">
      <div style="font-size:10px;font-weight:600;color:var(--text-2);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px;">Alternatiivid</div>
      ${alts.map(alt => {
        const altPd = STATE.prices?.products?.[alt.price_key];
        const altBest = altPd?.stores?.length ? altPd.stores.reduce((min, s) => s.price < min.price ? s : min) : null;
        const altDispPrice = altBest ? (altBest.display_price ?? altBest.price) : null;
        const altUnit = altPd?.display_unit || altPd?.unit || '';
        const altWeekCost = altBest ? (alt.qty_week * altBest.price).toFixed(2).replace('.', ',') : null;
        const hasId = !!alt.id;
        const isAltChecked = hasId ? !!checked[alt.id] : false;
        return `
          <div style="display:flex;align-items:center;padding:6px 0;border-bottom:0.5px solid var(--border);">
            ${hasId ? `
              <div data-cb="${alt.id}" onclick="toggleAltProduct('${alt.id}','${p.id}')"
                style="font-size:20px;color:var(--text-2);cursor:pointer;user-select:none;flex-shrink:0;margin-right:8px;padding-top:2px;">
                ${isAltChecked ? '☑' : '☐'}
              </div>` : `<div style="width:28px;flex-shrink:0;"></div>`}
            <div style="flex:1;min-width:0;">
              <div style="font-size:13px;font-weight:${isAltChecked ? 600 : 500};color:${isAltChecked ? 'var(--text-1)' : 'var(--text-1)'};">${alt.name}</div>
              <div style="font-size:11px;color:var(--text-2);">${alt.note || ''}</div>
            </div>
            <div style="text-align:right;flex-shrink:0;margin-left:8px;font-size:12px;">
              ${altDispPrice ? `<div style="color:var(--text-1);">${altDispPrice.toFixed(2).replace('.', ',')} €/${altUnit}</div>` : '<div style="color:var(--text-3);">—</div>'}
              ${altWeekCost ? `<div style="color:var(--text-3);font-size:11px;">~${altWeekCost} €/näd</div>` : ''}
            </div>
          </div>`;
      }).join('')}
    </div>`;
}

/* ---- OSTUKORVI KOKKUVÕTE (enne kinnitusnuppu) ---- */
function renderShoppingSummary() {
  const el = document.getElementById('shopping-summary');
  if (!el || !STATE.shopping) return;

  const checked = getChecked();
  const sections = STATE.shopping.sections;
  const productMap = Object.fromEntries(STATE.shopping.products.map(p => [p.id, p]));

  // Loenda valitud tooted sektsiooni kaupa
  const sectionCounts = sections.map(s => {
    const allIds = [...(s.products ?? []), ...(s.more_products ?? [])];
    const count = allIds.filter(id => checked[id]).length;
    return { label: s.label, count };
  });

  const total = sectionCounts.reduce((s, x) => s + x.count, 0);
  if (total === 0) { el.innerHTML = ''; return; }

  const chips = sectionCounts
    .filter(s => s.count > 0)
    .map(s => `<span style="
        display:inline-flex;align-items:center;gap:4px;
        background:var(--accent-bg);border:0.5px solid var(--border);
        border-radius:20px;padding:4px 10px;font-size:12px;color:var(--text-2);">
        ${s.label} <span style="font-weight:700;color:var(--text-1);">${s.count}</span>
      </span>`)
    .join('');

  el.innerHTML = `
    <div style="border:0.5px solid var(--border);border-radius:var(--r-md);padding:var(--sp-sm);margin-bottom:var(--sp-sm);background:var(--card-bg);">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
        <div style="font-size:10px;font-weight:600;color:var(--text-2);text-transform:uppercase;letter-spacing:0.5px;">Valitud tooted</div>
        <div style="font-size:13px;font-weight:700;color:var(--text-1);">${total} tk kokku</div>
      </div>
      <div style="display:flex;flex-wrap:wrap;gap:6px;">${chips}</div>
    </div>`;
}

/* ---- TOGGLE FUNKTSIOONID ---- */
function toggleProduct(id) {
  const checked = getChecked();
  checked[id] = !checked[id];
  lsSet('shopping_checked', checked);
  renderOstukorvMetrics();
  renderShoppingSummary();
  // Uuenda ainult linnuke — ei re-render tervet listi
  const cb = document.querySelector(`[data-cb="${id}"]`);
  if (cb) cb.textContent = checked[id] ? '☑' : '☐';
}

function toggleAltProduct(altId, parentId) {
  const checked = getChecked();
  if (!checked[altId]) {
    // Vali alternatiiv → tühista põhitoode automaatselt
    checked[altId] = true;
    checked[parentId] = false;
  } else {
    // Tühista alternatiiv
    checked[altId] = false;
  }
  lsSet('shopping_checked', checked);
  renderOstukorvMetrics();
  renderTab('ostukorv');
}

function toggleMoreProducts(sectionId) {
  STATE.expandedSections[sectionId] = !STATE.expandedSections[sectionId];
  renderTab('ostukorv');
}

function togglePriceComparison(id) {
  STATE.expandedPriceId = STATE.expandedPriceId === id ? null : id;
  STATE.expandedAltId = null;
  renderTab('ostukorv');
}

function toggleAlternatives(id) {
  STATE.expandedAltId = STATE.expandedAltId === id ? null : id;
  STATE.expandedPriceId = null;
  renderTab('ostukorv');
}

/* ---- TOOTE RIDA ---- */
function renderProductRow(p, isChecked) {
  const priceData = STATE.prices?.products?.[p.price_key];
  const bestStore = getBestStore(p.price_key);
  const weeklyCost = getWeeklyCost(p);
  const unitPrice = formatUnitPrice(p.price_key, bestStore);
  const meta = `${p.qty_display} · ${bestStore?.store ?? '?'} · ${unitPrice}`;

  // BtB tähe märgis
  const btbBadge = p.btb_essential
    ? `<span title="BtB põhitoode" style="font-size:12px;color:var(--amber);margin-right:4px;">⭐</span>`
    : '';

  // Bränd sulgudes — odavaima poe tootenimi
  const brandName = bestStore?.product_name ?? null;
  const brandHtml = brandName
    ? `<div style="font-size:11px;color:var(--text-3);margin-top:1px;">(${brandName})</div>`
    : '';

  // Pakiinfo: mitu pakki osta
  const packsNeeded = p.pack_size ? Math.ceil(p.qty_week / p.pack_size) : null;
  const packsHtml = packsNeeded
    ? `<div style="font-size:11px;color:var(--amber);font-weight:500;margin-top:2px;">osta ${packsNeeded} × ${p.pack_label}</div>`
    : '';

  const isPriceOpen = STATE.expandedPriceId === p.id;
  const isAltOpen   = STATE.expandedAltId   === p.id;

  const expansion = isPriceOpen ? renderPriceComparison(p)
                  : isAltOpen   ? renderAlternatives(p)
                  : '';

  return `
    <div class="row" style="flex-wrap:wrap;align-items:flex-start;">
      <div style="display:flex;align-items:center;width:100%;">
        <div data-cb="${p.id}" onclick="toggleProduct('${p.id}')"
          style="font-size:20px;margin-right:var(--sp-sm);color:${isChecked ? 'var(--accent)' : 'var(--text-3)'};cursor:pointer;user-select:none;flex-shrink:0;padding-top:2px;">
          ${isChecked ? '☑' : '☐'}
        </div>
        <div class="row-main">
          <div class="row-name">${btbBadge}${p.name}</div>
          ${brandHtml}
          <div class="row-meta">${meta}</div>
          ${packsHtml}
        </div>
        <div class="row-actions">
          <div style="text-align:right;margin-right:6px;">
            <div style="font:700 13px/1.2 var(--font-mono);">${weeklyCost > 0 ? weeklyCost.toFixed(2).replace('.', ',') + ' €' : '—'}</div>
            <div style="font:500 10px/1.2 var(--font-mono);color:var(--text-3);">${p.kcal_day} kcal/p</div>
          </div>
          <div class="btn-icon" onclick="togglePriceComparison('${p.id}')" title="Hinnavõrdlus"
            style="${isPriceOpen ? 'background:var(--accent-bg);color:var(--text-1);border-color:var(--border-strong);' : ''}">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/>
              <line x1="7" y1="7" x2="7.01" y2="7"/>
            </svg>
          </div>
          <div class="btn-icon" onclick="toggleAlternatives('${p.id}')" title="Alternatiivid"
            style="${isAltOpen ? 'background:var(--accent-bg);color:var(--text-1);border-color:var(--border-strong);' : ''}">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M7 16V4m0 0L3 8m4-4l4 4"/>
              <path d="M17 8v12m0 0l4-4m-4 4l-4-4"/>
            </svg>
          </div>
        </div>
      </div>
      ${expansion ? `<div style="width:100%;padding-left:30px;">${expansion}</div>` : ''}
    </div>`;
}

/* ---- PEAMINE RENDER ---- */
function renderOstukorv() {
  if (!STATE.shopping) {
    return `<div class="tulemas"><div class="tulemas-icon">⏳</div><h3>Laen...</h3><p>Andmete laadimine</p></div>`;
  }

  const checked = getChecked();
  const productMap = Object.fromEntries(STATE.shopping.products.map(p => [p.id, p]));

  const budgetClass = STATE.user?.budget_class ?? 2;

  // Sorteeri tooted hinna järgi sõltuvalt eelarve klassist
  // 1-2 (säästlik/tasakaal): odavaim üleval
  // 3 (mugav): btb_essential tooted üleval (originaaljärjestus)
  // 4-5 (premium/luksus): kallim üleval
  function sortProductIds(ids) {
    if (budgetClass === 3) return ids; // säilita originaaljärjestus
    return [...ids].sort((a, b) => {
      const pa = productMap[a];
      const pb = productMap[b];
      if (!pa || !pb) return 0;
      const costA = getWeeklyCost(resolveProduct(pa, budgetClass));
      const costB = getWeeklyCost(resolveProduct(pb, budgetClass));
      if (budgetClass <= 2) return costA - costB; // odavaim üleval
      return costB - costA; // kallim üleval (klass 4-5)
    });
  }

  const sectionsHtml = STATE.shopping.sections.map(s => {
    const moreIds = s.more_products ?? [];
    const isOpen  = !!STATE.expandedSections[s.id];

    const mainRows = sortProductIds(s.products).map(id => {
      const p = productMap[id];
      return p ? renderProductRow(resolveProduct(p, budgetClass), !!checked[p.id]) : '';
    }).join('');

    const moreRows = isOpen ? sortProductIds(moreIds).map(id => {
      const p = productMap[id];
      return p ? renderProductRow(resolveProduct(p, budgetClass), !!checked[p.id]) : '';
    }).join('') : '';

    const moreBtn = moreIds.length ? `
      <div style="border-top:0.5px solid var(--border);margin-top:var(--sp-xs);padding-top:var(--sp-xs);text-align:center;">
        <button onclick="toggleMoreProducts('${s.id}')" style="
          font-size:12px;color:var(--text-2);background:none;border:none;
          padding:6px 12px;cursor:pointer;-webkit-tap-highlight-color:transparent;">
          ${isOpen
            ? '↑ Peida lisavalikud'
            : `↓ Näita veel (${moreIds.length} toodet)`}
        </button>
      </div>` : '';

    return `
      <div class="section-label">${s.label}</div>
      <div class="card">
        ${mainRows}
        ${moreRows}
        ${moreBtn}
      </div>`;
  }).join('');

  // Kinnituse olek
  const confirmed = lsGet('shopping_confirmed');
  const confirmBtn = confirmed
    ? `<div style="width:100%;padding:14px;background:var(--accent-bg);color:var(--accent);
         border:1px solid var(--border);border-radius:var(--r-md);font-size:15px;
         font-weight:600;margin-top:var(--sp-sm);text-align:center;box-sizing:border-box;">
         Kinnitatud ✓ — saadetud Meal Prep'i
       </div>
       <div style="text-align:center;margin-top:4px;">
         <button onclick="cancelConfirmation()" style="font-size:12px;color:var(--text-2);
           background:none;border:none;cursor:pointer;padding:4px 8px;
           -webkit-tap-highlight-color:transparent;">muuda</button>
       </div>`
    : `<button class="btn-primary" onclick="confirmShopping()">Kinnita ost → saada Meal Prep'i</button>`;

  /* Quiet Data: pealkiri + valitud/kokku loendur */
  const _allIds = STATE.shopping.sections.flatMap(s => [...(s.products ?? []), ...(s.more_products ?? [])]);
  const _checkedCount = _allIds.filter(id => checked[id]).length;
  const titleBlock = `
    <div style="display:flex;justify-content:space-between;align-items:flex-start;padding:2px 2px 12px;">
      <div>
        <div style="font:700 23px/1.1 var(--font);color:var(--text-1);letter-spacing:-0.4px;">Ostukorv</div>
        <div style="font:500 11px/1 var(--font-mono);color:var(--text-3);margin-top:5px;letter-spacing:0.3px;">Nädala toidukorv · ${_allIds.length} toodet</div>
      </div>
      <div style="background:var(--chip);border:1px solid var(--border);border-radius:9px;padding:6px 10px;font:700 12px/1 var(--font-mono);color:var(--text-1);white-space:nowrap;">${_checkedCount}<span style="color:var(--text-3);font-weight:500;">/${_allIds.length}</span></div>
    </div>`;

  /* v0.9.4.9: hinnakontrollid (värskenda + eelarve) — soovitusliku poe ja tootenimekirja vahel */
  const _bc = BUDGET_CLASSES[budgetClass] ?? BUDGET_CLASSES[2];
  const priceControls = `
    <div style="display:flex;gap:8px;margin-bottom:12px;align-items:stretch;">
      <button id="refresh-btn" onclick="refreshPrices()" title="Värskenda hinnad" style="flex:1;border:1px solid var(--border);border-radius:12px;background:var(--surface);display:flex;align-items:center;justify-content:center;gap:7px;color:var(--text-2);box-shadow:var(--shadow);white-space:nowrap;padding:11px 8px;cursor:pointer;">
        <svg id="refresh-svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0;">
          <path d="M23 4v6h-6"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
        </svg>
        <span id="refresh-label" style="font:600 12px/1 var(--font);">Värskenda hinnad</span>
      </button>
      <button id="budget-btn" onclick="cycleBudget()" title="Vaheta eelarve klass" style="border:1px solid var(--border);border-radius:12px;background:var(--surface);box-shadow:var(--shadow);display:flex;flex-direction:column;align-items:flex-end;justify-content:center;padding:6px 12px;cursor:pointer;">
        <div id="budget-name" style="font:600 13px/1.2 var(--font);color:var(--text-1);">${_bc.name}</div>

function confirmShopping() {

  const checked = getChecked();

  const confirmedIds = STATE.shopping.products

/* ===== Barkoodiskänner (v0.9.4.7) =====
   1) Natiivne BarcodeDetector (Chrome Android, Safari iOS 17+)
   2) ZXing UMD fallback (usaldusväärne Brave/Safari iOS-is) */
let _barcodeStream   = null;
let _zxingControls   = null;

function _loadScript(src) {
  return new Promise((resolve, reject) => {
    const s = document.createElement('script');
    s.src = src;
    s.onload = resolve;
    s.onerror = () => reject(new Error('script load failed'));
    document.head.appendChild(s);
  });
}

function _openScannerOverlay() {
  const overlay = document.createElement('div');
  overlay.id = 'barcode-overlay';
  overlay.innerHTML = `
    <div class="barcode-modal">
      <div class="barcode-header">
        <span>📷 Suuna kaamera barkoodile</span>
        <button class="barcode-close-btn" onclick="closeBarcodeScanner()">✕</button>
      </div>
      <div class="barcode-viewport">
        <video id="barcode-video" autoplay muted playsinline></video>
        <div class="barcode-guide">
          <div class="barcode-guide-inner">
            <div class="barcode-scan-line"></div>
          </div>
        </div>
      </div>
      <div class="barcode-status" id="barcode-status">Valmistan kaamerat…</div>
      <button class="btn-ean-manual-fallback"
        onclick="closeBarcodeScanner(); showEanInput('Sisesta EAN kood käsitsi:');">
        ✏️ Sisesta kood käsitsi
      </button>
    </div>`;
  document.body.appendChild(overlay);
}
function _scanStatus(t) {
  const el = document.getElementById('barcode-status');
  if (el) el.textContent = t;
}
function _onBarcodeFound(code) {
  _scanStatus('✅ Leitud: ' + code);
  setTimeout(() => { closeBarcodeScanner(); lookupEAN(code); }, 400);
}

async function scanBarcode() {
  if (!(navigator.mediaDevices?.getUserMedia)) {
    showEanInput('Kaamera pole selles brauseris saadaval —');
    return;
  }
  _openScannerOverlay();

  // 1) Natiivne BarcodeDetector
  if ('BarcodeDetector' in window) {
    try { await _startNativeScanner(); return; }
    catch (e) { /* proovime ZXingi */ }
  }

  // 2) ZXing fallback
  _scanStatus('⏳ Laen skännerit…');
  try {
    if (!window.ZXingBrowser) {
      await _loadScript('https://cdn.jsdelivr.net/npm/@zxing/browser@0.1.5/umd/zxing-browser.min.js');
    }
  } catch (e) {
    closeBarcodeScanner();
    showEanInput('Skänner ei laadinud (kontrolli internetti) —');
    return;
  }
  if (!window.ZXingBrowser?.BrowserMultiFormatReader) {
    closeBarcodeScanner();
    showEanInput('Skänner pole selles brauseris saadaval —');
    return;
  }
  try {
    const video  = document.getElementById('barcode-video');
    if (!video) { closeBarcodeScanner(); return; }
    const reader = new window.ZXingBrowser.BrowserMultiFormatReader();
    _scanStatus('Otsin barkoodi…');
    _zxingControls = await reader.decodeFromConstraints(
      { video: { facingMode: 'environment' } },
      video,
      (result) => {
        if (result && document.getElementById('barcode-overlay')) {
          const code = result.getText();
          if (_zxingControls) { try { _zxingControls.stop(); } catch(e){} _zxingControls = null; }
          _onBarcodeFound(code);
        }
      }
    );
  } catch (e) {
    closeBarcodeScanner();
    showEanInput('Kaamera juurdepääs keelatud — luba kaamera brauseri seadetes või —');
  }
}

async function _startNativeScanner() {
  _barcodeStream = await navigator.mediaDevices.getUserMedia({
    video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } }
  });
  const video = document.getElementById('barcode-video');
  if (!video) { closeBarcodeScanner(); return; }
  video.srcObject = _barcodeStream;
  await video.play();
  _scanStatus('Otsin barkoodi…');

  const detector = new BarcodeDetector({
    formats: ['ean_13', 'ean_8', 'upc_a', 'upc_e', 'code_128', 'qr_code']
  });
  const scan = async () => {
    if (!document.getElementById('barcode-overlay')) return; // suletud
    try {
      const found = await detector.detect(video);
      if (found.length > 0) { _onBarcodeFound(found[0].rawValue); return; }
    } catch (e) { /* jätka */ }
    requestAnimationFrame(scan);
  };
  requestAnimationFrame(scan);
}

function closeBarcodeScanner() {
  if (_zxingControls) { try { _zxingControls.stop(); } catch(e){} _zxingControls = null; }
  if (_barcodeStream) {
    _barcodeStream.getTracks().forEach(t => t.stop());
    _barcodeStream = null;
  }
  document.getElementById('barcode-overlay')?.remove();
}

function showEanInput(prefixMsg) {
  const resultsEl = document.getElementById('custom-off-results');
  if (!resultsEl) return;
  const msg = prefixMsg ? `<div class="off-status" style="text-align:left;padding-bottom:4px;">${prefixMsg}</div>` : '';
  resultsEl.innerHTML = `
    ${msg}
    <div class="ean-manual-row">
      <input id="ean-manual-input" type="text" inputmode="numeric"
        placeholder="EAN kood (nt 4740098050208)" maxlength="14"
        onkeydown="if(event.key==='Enter'){event.preventDefault();lookupEAN(this.value.trim());}">
      <button onclick="lookupEAN(document.getElementById('ean-manual-input').value.trim())">Otsi</button>
    </div>`;
  setTimeout(() => document.getElementById('ean-manual-input')?.focus(), 50);
}

async function lookupEAN(ean) {
  if (!ean || ean.length < 8) {
    const el = document.getElementById('custom-off-results');
    if (el) el.innerHTML = `<div class="off-status">Sisesta vähemalt 8-kohaline EAN kood</div>`;
    return;
  }
  const resultsEl = document.getElementById('custom-off-results');
  if (resultsEl) resultsEl.innerHTML = `<div class="off-status">🔍 Otsin koodiga ${ean}...</div>`;

  try {
    const url = `https://world.openfoodfacts.org/api/v0/product/${encodeURIComponent(ean)}.json?fields=product_name,product_name_en,brands,nutriments,serving_size`;
    const r   = await fetch(url);
    const data = await r.json();

    if (data.status !== 1 || !data.product) {
      if (resultsEl) resultsEl.innerHTML =
        `<div class="off-status">Toodet ei leitud (${ean}) — sisesta kalorid käsitsi</div>`;
      return;
    }

    const p = data.product;
    const kcal100 = Math.round(p.nutriments?.['energy-kcal_100g'] || 0);
    if (!kcal100) {
      if (resultsEl) resultsEl.innerHTML =
        `<div class="off-status">Toode leitud, kuid kalorid puuduvad — sisesta käsitsi</div>`;
      return;
    }

    const rawName = p.product_name || p.product_name_en || '';
    const brand   = p.brands ? p.brands.split(',')[0].trim() : '';
    const name    = rawName + (brand && !rawName.toLowerCase().includes(brand.toLowerCase()) ? ` (${brand})` : '');

    // Salvesta 100g väärtused (sama loogika mis selectOFFResult) → elav grammiarvutus
    STATE.offSelected = {
      name,
      kcal100,
      prot100: p.nutriments?.['proteins_100g']      || 0,
      carb100: p.nutriments?.['carbohydrates_100g'] || 0,
      fat100:  p.nutriments?.['fat_100g']           || 0,
      serving: _parseServingG(p.serving_size)
    };
    const gramsInput = document.getElementById('custom-inp-grams');
    if (STATE.offSelected.serving > 0 && gramsInput && (!gramsInput.value || gramsInput.value === '100')) {
      gramsInput.value = STATE.offSelected.serving;
    }
    const set = (id, val) => { const el = document.getElementById(id); if (el) el.value = val; };
    set('custom-inp-name', name);
    applyOFFGrams();
    showOFFServingHint();

  } catch(e) {
    if (resultsEl) resultsEl.innerHTML =
      `<div class="off-status">Ühendus ebaõnnestus — sisesta käsitsi</div>`;
  }
}

async function searchOFF() {
  const nameInput = document.getElementById('custom-inp-name');
  const query = nameInput?.value?.trim();
  if (!query || query.length < 2) return;

  const btn = document.getElementById('btn-off-search');
  const resultsEl = document.getElementById('custom-off-results');
  if (!btn || !resultsEl) return;

  btn.disabled = true;
  btn.textContent = '...';
  resultsEl.innerHTML = `<div class="off-status">Otsin...</div>`;

  try {
    const url = `https://world.openfoodfacts.org/cgi/search.pl?search_terms=${encodeURIComponent(query)}&json=1&page_size=6&fields=product_name,nutriments,serving_size,brands&lc=et,en`;
    const r = await fetch(url);
    const data = await r.json();
    const products = (data.products || []).filter(p =>
      p.product_name &&
      p.nutriments?.['energy-kcal_100g'] > 0
    ).slice(0, 5);

    if (!products.length) {
      resultsEl.innerHTML = `<div class="off-status">Ei leidnud — sisesta kalorid käsitsi</div>`;
    } else {
      resultsEl.innerHTML = products.map((p, i) => {
        const kcal100 = Math.round(p.nutriments['energy-kcal_100g'] || 0);
        const name = p.product_name + (p.brands ? ` (${p.brands.split(',')[0].trim()})` : '');
        const servG = _parseServingG(p.serving_size);
        return `<div class="off-result-row" onclick="selectOFFResult(${i})" data-off-idx="${i}"
          data-kcal100="${kcal100}"
          data-prot100="${(p.nutriments['proteins_100g']||0).toFixed(1)}"
          data-carb100="${(p.nutriments['carbohydrates_100g']||0).toFixed(1)}"
          data-fat100="${(p.nutriments['fat_100g']||0).toFixed(1)}"
          data-serving="${servG}"
          data-name="${name.replace(/"/g,'&quot;')}">
          <span class="off-result-name">${name}</span>
          <span class="off-result-kcal">${kcal100} kcal/100g${servG ? ` · portsjon ${servG}g` : ''}</span>
          <span class="off-result-arrow">›</span>
        </div>`;
      }).join('');
    }
  } catch(e) {
    resultsEl.innerHTML = `<div class="off-status">Ühendus ebaõnnestus — sisesta käsitsi</div>`;
  }

  btn.disabled = false;
  btn.textContent = 'Otsi';
}

function selectOFFResult(idx) {
  const row = document.querySelector(`[data-off-idx="${idx}"]`);
  if (!row) return;

  // Salvesta 100g väärtused → gramme muutes arvutab elavalt ümber
  STATE.offSelected = {
    name:    row.dataset.name,
    kcal100: parseFloat(row.dataset.kcal100) || 0,
    prot100: parseFloat(row.dataset.prot100) || 0,
    carb100: parseFloat(row.dataset.carb100) || 0,
    fat100:  parseFloat(row.dataset.fat100)  || 0,
    serving: parseFloat(row.dataset.serving) || 0
  };

  const gramsInput = document.getElementById('custom-inp-grams');
  // Kui tootel on portsjonisuurus ja kasutaja pole gramme ise muutnud (100 = vaikeväärtus) → kasuta portsjonit
  if (STATE.offSelected.serving > 0 && gramsInput && (!gramsInput.value || gramsInput.value === '100')) {
    gramsInput.value = STATE.offSelected.serving;
  }
  document.getElementById('custom-inp-name').value = STATE.offSelected.name;
  applyOFFGrams();
  showOFFServingHint();
}

/* Kuvab portsjonivihje + kiirnupud (1 portsjon / 100g), et kasutaja saaks õige koguse ühe vajutusega */
function showOFFServingHint() {
  const el = document.getElementById('custom-off-results');
  const s = STATE.offSelected;
  if (!el || !s) return;
  const g = parseFloat(document.getElementById('custom-inp-grams')?.value) || 100;
  el.innerHTML = `
    <div style="background:var(--accent-bg);border-radius:10px;padding:9px 11px;margin-top:2px;">
      <div style="font:600 11px/1.4 var(--font);color:var(--accent);">${s.name}</div>
      <div style="font:500 10px/1.4 var(--font-mono);color:var(--text-2);margin-top:3px;">Praegu arvutan <b>${g}g</b> kohta · andmebaasis ${s.kcal100} kcal/100g</div>
      <div style="display:flex;gap:6px;margin-top:8px;flex-wrap:wrap;">
        ${s.serving > 0 ? `<button onclick="setOFFServing(${s.serving})" style="padding:6px 10px;border:1px solid var(--accent);border-radius:8px;background:${g === s.serving ? 'var(--accent)' : 'var(--surface)'};color:${g === s.serving ? '#fff' : 'var(--accent)'};font:600 11px/1 var(--font);cursor:pointer;">1 portsjon (${s.serving}g)</button>` : ''}
        <button onclick="setOFFServing(100)" style="padding:6px 10px;border:1px solid var(--border);border-radius:8px;background:${g === 100 ? 'var(--accent)' : 'var(--surface)'};color:${g === 100 ? '#fff' : 'var(--text-2)'};font:600 11px/1 var(--font);cursor:pointer;">100g</button>
        <span style="font:500 10px/1.6 var(--font);color:var(--text-3);align-self:center;">või muuda grammiväli ise ↑</span>
      </div>
    </div>`;
}

/* v0.9.4.6: portsjonisuuruse parser + elav grammiarvutus.
   OFF annab makrod 100g kohta; kasutaja sööb tihti ühe portsjoni (nt 40g kohuke). */
function _parseServingG(servStr) {
  if (!servStr) return 0;
  const m = String(servStr).match(/([\d.,]+)\s*g/i);
  return m ? (parseFloat(m[1].replace(',', '.')) || 0) : 0;
}

/* Arvutab kcal + makrod praeguste grammide järgi salvestatud 100g väärtustest */
function applyOFFGrams() {
  const s = STATE.offSelected;
  if (!s) return;
  const grams = parseFloat(document.getElementById('custom-inp-grams')?.value) || 100;
  const mult  = grams / 100;
  const set = (id, v) => { const el = document.getElementById(id); if (el) el.value = v; };
  set('custom-inp-kcal',    Math.round(s.kcal100 * mult));
  set('custom-inp-protein', (s.prot100 * mult).toFixed(1));
  set('custom-inp-carbs',   (s.carb100 * mult).toFixed(1));
  set('custom-inp-fat',     (s.fat100  * mult).toFixed(1));
}

// Gramme muutudes arvutab kohe ümber (kui toode on valitud)
function recalcOFFByGrams() {
  if (STATE.offSelected) applyOFFGrams();
}

/* Portsjoni-kiirnupp: sea grammiväli portsjonisuurusele ja arvuta ümber */
function setOFFServing(g) {
  const el = document.getElementById('custom-inp-grams');
  if (el) { el.value = g; }
  applyOFFGrams();
}

// TheMealDB kategooria kaart: ostukorvi kategooria → ingliskeelne otsing
const MEALDB_CAT = {
  V01: 'Chicken', V02: 'Beef', V03: 'Salmon',
  V04: 'Tuna',   V05: 'Eggs', V06: 'Pork'
};

// Cache — et ei päri iga Tab 2 aval uuesti
let RECIPE_CACHE = {
  cartKey:   '',
  custom:    null,   // isiklikust retseptikogu
  online:    null,   // TheMealDB
  loading:   false,
  error:     ''
};

// Leiab ostukorvist peamise valguallika TheMealDB otsingule
function getMealDBQuery() {
  const checked  = getChecked();
  if (!STATE.shopping) return null;
  const prots = ['V01','V02','V03','V04','V05','V06'];
  for (const cat of prots) {
    const found = STATE.shopping.products.find(p => checked[p.id] && p.category_id === cat);
    if (found) return MEALDB_CAT[cat] || null;
  }
  return null;
}

// Filtreerib isiklikust kogust ostukorvi koostisainete järgi
function filterCustomRecipes() {
  const custom = STATE.custom_recipes?.recipes || [];
  if (!custom.length) return [];
  const checked  = getChecked();
  if (!STATE.shopping) return custom.slice(0, 3);
  const checkedNames = STATE.shopping.products
    .filter(p => checked[p.id])
    .map(p => p.name.toLowerCase().split(' ')[0]); // esimene sõna
  // Tagasta retseptid mis kattuvad ostukorvi toodetega
  const scored = custom.map(r => {
    const ingText = (r.ingredients || []).join(' ').toLowerCase();
    const score = checkedNames.filter(n => ingText.includes(n)).length;
    return { r, score };
  });
  scored.sort((a, b) => b.score - a.score);
  return scored.slice(0, 3).map(s => s.r);
}

async function loadRecipeSuggestions() {
  const checked  = getChecked();
  const cartKey  = Object.keys(checked).filter(k => checked[k]).sort().join(',');
  if (RECIPE_CACHE.cartKey === cartKey && (RECIPE_CACHE.custom || RECIPE_CACHE.online)) return;

  RECIPE_CACHE = { cartKey, custom: null, online: null, loading: true, error: '' };
  renderRecipeSection();

  // 1) Isiklik kogu — sünkroonne, andmed juba STATE-s
  RECIPE_CACHE.custom = filterCustomRecipes();

  // 2) TheMealDB — asünkroonne
  const query = getMealDBQuery();
  if (query) {
    try {
      // Leia road valguallika järgi
      const r1 = await fetch(`https://www.themealdb.com/api/json/v1/1/filter.php?i=${encodeURIComponent(query)}`);
      const d1 = await r1.json();
      const meals = (d1.meals || []).slice(0, 6);
      // Leia täisretsept 2-le esimesele (piltide + juhiste jaoks)
      const detailed = await Promise.all(
        meals.slice(0, 2).map(m =>
          fetch(`https://www.themealdb.com/api/json/v1/1/lookup.php?i=${m.idMeal}`)
            .then(r => r.json())
            .then(d => d.meals?.[0] || null)
            .catch(() => null)
        )
      );
      RECIPE_CACHE.online = detailed
        .filter(Boolean)
        .map(m => {
          // Koosta koostisainete nimekiri (TheMealDB kasutab strIngredient1...20)
          const ingredients = [];
          for (let i = 1; i <= 20; i++) {
            const ing = m[`strIngredient${i}`]?.trim();
            const msr = m[`strMeasure${i}`]?.trim();
            if (ing) ingredients.push([msr, ing].filter(Boolean).join(' '));
          }
          return {
            name:        m.strMeal,
            image:       m.strMealThumb,
            source_url:  m.strSource || m.strYoutube || null,
            youtube:     m.strYoutube || null,
            ingredients,
            steps: m.strInstructions
              ? m.strInstructions.split(/\r?\n/).filter(s => s.trim()).slice(0, 6)
              : [],
            source: 'TheMealDB'
          };
        });
    } catch(e) {
      RECIPE_CACHE.error = e.message;
    }
  }

  RECIPE_CACHE.loading = false;
  renderRecipeSection();
}

function renderRecipeSection() {
  const el = document.getElementById('edamam-recipes-section');
  if (!el) return;
  el.innerHTML = buildRecipeSectionHTML();
}

function toggleRecipeSteps(id) {
  const el  = document.getElementById(`rcp-steps-${id}`);
  const btn = document.getElementById(`rcp-btn-${id}`);
  if (!el) return;
  const open = el.style.display !== 'none';
  el.style.display = open ? 'none' : 'block';
  if (btn) btn.textContent = open ? 'Juhised ▾' : 'Peida ▴';
}

function recipeCard(r, id) {
